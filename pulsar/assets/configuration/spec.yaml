name: pulsar
fleet_configurable: true
files:
- name: pulsar.yaml
  discovery:
    strategies:
      - template: discovery/openmetrics_from_ports
        overrides:
          port_hints:
            - 8080
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.value.example: http://localhost:8080/metrics
  - template: logs
    example:
    - type: file
      path: /pulsar/logs/pulsar.log
      source: pulsar

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - pulsar
  - template: auto_conf/discovery
