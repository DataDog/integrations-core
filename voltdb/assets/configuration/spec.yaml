name: VoltDB
fleet_configurable: true
files:
  - name: voltdb.yaml
    options:
      - template: init_config
        options:
          - template: init_config/db
          - template: init_config/default

      - template: instances
        options:
          - name: host
            description: Host of the VoltDB cluster member to connect to.
            fleet_configurable: true
            display_priority: 5
            value:
              type: string
              example: localhost

          - name: url
            description: |
              **Deprecated**: The legacy HTTP/JSON endpoint URL (e.g. `http://localhost:8080`).
              Use `host` and `port` instead. If `url` is set and `host` is not, the host is
              extracted from the URL and the default native client port (21212) is used.
            hidden: true
            deprecation:
              Agent version: 7.80.0
              Migration: |
                Use `host` and (optionally) `port` instead.
            value:
              type: string
              example: http://localhost:8080

          - name: port
            description: |
              Native client port of the VoltDB cluster member.

              See: https://docs.voltdb.com/UsingVoltDB/HostConfigPortOpts.php
            fleet_configurable: true
            display_priority: 4
            value:
              type: integer
              example: 21212

          - name: username
            description: The username to use to authenticate with VoltDB.
            display_priority: 3
            value:
              type: string
              example: <USERNAME>

          - name: password
            description: The password to use to authenticate with VoltDB.
            display_priority: 3
            secret: true
            value:
              type: string
              example: <PASSWORD>

          - name: use_ssl
            description: |
              Set to `true` to connect to VoltDB using TLS.

              See: https://docs.voltdb.com/UsingVoltDB/SecuritySSL.php
            display_priority: 2
            value:
              type: boolean
              example: false

          - name: ssl_config_file
            description: |
              Path to a VoltDB SSL configuration file that defines the Java keystore
              and truststore files used by the native Python client.

              See: https://docs.voltdb.com/UsingVoltDB/SecuritySSL.php
            display_priority: 2
            value:
              type: string
              example: <SSL_CONFIG_FILE_PATH>

          - name: connect_timeout
            description: Connection timeout (in seconds) when establishing the native client connection.
            display_priority: 1
            value:
              type: number
              example: 8

          - name: procedure_timeout
            description: |
              Timeout (in seconds) for individual stored procedure calls. Set to
              `0` to wait indefinitely for a response.
            display_priority: 1
            value:
              type: number
              example: 60
              default: 60

          - name: statistics_components
            fleet_configurable: true
            description: |
              List VoltDB components to collect metrics. A subset of components are collected by default.

              See: https://docs.voltdb.com/UsingVoltDB/sysprocstatistics.php
              The following components are supported:
               - COMMANDLOG
               - CPU
               - EXPORT
               - GC
               - IDLETIME
               - IMPORT
               - INDEX
               - IOSTATS
               - LATENCY
               - MEMORY
               - PROCEDURE
               - PROCEDUREOUTPUT
               - PROCEDUREPROFILE
               - QUEUE
               - SNAPSHOTSTATUS
               - TABLE
            display_priority: 1
            required: false
            value:
              type: array
              items:
                type: string
              example:
                - COMMANDLOG
                - CPU
                - GC
                - INDEX
                - IOSTATS
                - LATENCY
                - MEMORY
                - PROCEDURE
                - SNAPSHOTSTATUS
                - TABLE

          - template: instances/db
          - template: instances/default

      - template: logs
        example:
        - type: file
          path: /var/log/voltdb.log
          source: voltdb
