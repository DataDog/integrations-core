name: External DNS
fleet_configurable: true

files:
  - name: external_dns.yaml
    options:
      - template: init_config
        options:
          - template: init_config/openmetrics
      - template: instances
        options:
          - template: instances/openmetrics
            overrides:
              openmetrics_endpoint.required: false
              openmetrics_endpoint.enabled: true
              openmetrics_endpoint.display_priority: 3
              openmetrics_endpoint.value.example: http://%%host%%:7979/metrics
              openmetrics_endpoint.description: The URL where ExternalDNS exposes Prometheus metrics.
              tags.display_priority: 1
              tags.value.example:
                - "externaldns-pod:%%host%%"
          - template: instances/openmetrics_legacy_base
            hidden: true
            overrides:
              prometheus_url.required: false
              prometheus_url.hidden: false

  - name: auto_conf.yaml
    options:
      - template: ad_identifiers
        overrides:
          value.example:
            - external-dns
      - template: init_config
        options: []
      - template: instances
        options:
          - name: prometheus_url
            description: |
              To enable ExternalDNS metrics using the legacy OpenMetricsBaseCheckV1 you must specify the prometheus url.

              Either `prometheus_url` or `openmetrics_endpoint` must be specified.
              See documentation: https://docs.datadoghq.com/integrations/external_dns
            enabled: true
            legacy: true
            value:
              type: string
              example: "http://%%host%%:7979/metrics"
          - name: tags
            description: |
              List of tags to attach to every metric and service check emitted by this integration.

              Learn more about tagging: https://docs.datadoghq.com/tagging/
            required: true
            value:
              type: array
              items:
                type: string
              example:
                - "externaldns-pod:%%host%%"
          - name: send_monotonic_counter
            fleet_configurable: true
            description: |
              (Legacy OpenMetricsBaseCheckV1) To send counters as monotonic counter.
              See: https://github.com/DataDog/integrations-core/issues/1303
            legacy: true
            value:
              type: boolean
              example: true
          - name: openmetrics_endpoint
            description: |
              To enable ExternalDNS metrics using OpenMetricsBaseCheckV2 you must specify the openmetrics endpoint url.

              Either `prometheus_url` or `openmetrics_endpoint` must be specified.
              See documentation: https://docs.datadoghq.com/integrations/external_dns
            value:
              type: string
              example: "http://%%host%%:7979/metrics"
