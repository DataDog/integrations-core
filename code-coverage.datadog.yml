schema-version: v1
carryforward: true
gates:
- type: total_coverage_percentage
  config:
    threshold: 75
    services:
    - '*'
    - '!openstack'
    - '!teradata'
    - '!tokumx'
    - '!snmp'
    - '!sap_hana'
- type: total_coverage_percentage
  config:
    threshold: 50
    services:
    - openstack
    - teradata
    - tokumx
- type: total_coverage_percentage
  config:
    threshold: 30
    services:
    - snmp
    - sap_hana
