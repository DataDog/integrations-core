name: Prefect
files:
- name: prefect.yaml
  discovery:
    strategies:
    - strategy: from_ports
      port_hints:
      - 4200
      candidates:
      - prefect_url: "http://{service.host}:{port.number}/api"
  options:
  - template: init_config
    options:
    - template: init_config/default
  - template: instances
    options:
    - name: prefect_url
      required: true
      description: The URL of the Prefect Server API.
      value:
        type: string
        example: http://localhost:4200/api
      fleet_configurable: false
    - name: work_pool_names
      description: |
        A mapping of work pool name patterns to include or exclude, with each entry being a regular expression.

        Patterns defined in `exclude` will take precedence in case of overlap.
      value:
        type: object
        example:
          include:
            - <WORK_POOL_NAME_REGEX_1>
            - <WORK_POOL_NAME_REGEX_2>
          exclude:
            - <WORK_POOL_NAME_REGEX_1>
            - <WORK_POOL_NAME_REGEX_2>
        properties:
          - name: include
            type: array
            items:
              type: string
          - name: exclude
            type: array
            items:
              type: string
      fleet_configurable: false
    - name: work_queue_names
      description: |
        A mapping of work queue name patterns to include or exclude, with each entry being a regular expression.

        Patterns defined in `exclude` will take precedence in case of overlap.
      value:
        type: object
        example:
          include:
            - <WORK_QUEUE_NAME_REGEX_1>
            - <WORK_QUEUE_NAME_REGEX_2>
          exclude:
            - <WORK_QUEUE_NAME_REGEX_1>
            - <WORK_QUEUE_NAME_REGEX_2>
        properties:
          - name: include
            type: array
            items:
              type: string
          - name: exclude
            type: array
            items:
              type: string
      fleet_configurable: false
    - name: deployment_names
      description: |
        A mapping of deployment name patterns to include or exclude, with each entry being a regular expression.

        Patterns defined in `exclude` will take precedence in case of overlap.
      value:
        type: object
        example:
          include:
            - <DEPLOYMENT_NAME_REGEX_1>
            - <DEPLOYMENT_NAME_REGEX_2>
          exclude:
            - <DEPLOYMENT_NAME_REGEX_1>
            - <DEPLOYMENT_NAME_REGEX_2>
        properties:
          - name: include
            type: array
            items:
              type: string
          - name: exclude
            type: array
            items:
              type: string
      fleet_configurable: false
    - name: event_names
      description: |
        A mapping of event name patterns to include or exclude, with each entry being a regular expression.

        Patterns defined in `exclude` will take precedence in case of overlap.
      value:
        type: object
        example:
          include:
            - <EVENT_NAME_REGEX_1>
            - <EVENT_NAME_REGEX_2>
          exclude:
            - <EVENT_NAME_REGEX_1>
            - <EVENT_NAME_REGEX_2>
        default:
          include:
            - ^prefect\.task-run\..*$
            - ^prefect\.flow-run\..*$
            - ^prefect\.[a-z-]+\.(ready|not-ready)$
        properties:
          - name: include
            type: array
            items:
              type: string
          - name: exclude
            type: array
            items:
              type: string
      fleet_configurable: false
    - name: custom_headers
      description: |
        Additional HTTP headers to include in all requests to the Prefect API.
      value:
        type: object
        example:
          Authorization: "Bearer <YOUR_TOKEN>"
          Custom-Header: "CustomValue"
      fleet_configurable: false

    - name: collect_events
      description: |
        Whether or not to send Prefect events to Datadog.
      value:
        type: boolean
        example: false
        default: false
      fleet_configurable: false

    - template: instances/default

  - template: logs
    example:
    - type: file
      source: prefect
      service: prefect
      path: /var/log/prefect/dd_log_1
      log_processing_rules:
      - type: multi_line
        name: python_stack_trace
        pattern: '^\d{2}:\d{2}:\d{2}\.\d{3} \|'
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - prefect
  - template: auto_conf/discovery

