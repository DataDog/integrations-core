name: Gitlab Runner
fleet_configurable: true
files:
- name: gitlab_runner.yaml
  discovery:
    strategies:
    - strategy: from_ports
      port_hints:
      - 9252
      candidates:
      - prometheus_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - name: allowed_metrics
      description: |
        Additional Prometheus metrics to collect beyond the integration's built-in metric set.
        Leaving this empty only collects the built-in metrics.
      fleet_configurable: true
      value:
        type: array
        items:
          type: string
        default: []
        example:
        - gitlab_runner_concurrent
        - gitlab_runner_limit
        - gitlab_runner_request_concurrency
        - gitlab_runner_request_concurrency_exceeded_total
    - template: init_config/http
    - template: init_config/default
  - template: instances
    options:
      - name: gitlab_url
        fleet_configurable: true
        formats: ["url"]
        description: |
          Master URL to probe for service health status.
          If you are using GitLab CE and not EE, use this URL with
          the authorization token: http://localhost/?token=<TOKEN>.
        value:
          type: string
      - name: prometheus_endpoint
        fleet_configurable: true
        formats: ["url"]
        required: true
        description: URL of the metrics endpoint of prometheus
        value:
          type: string
          example: http://<PROMETHEUS_ENDPOINT>:<PROMETHEUS_PORT>/metrics
      - template: instances/openmetrics_legacy
        overrides:
          prometheus_url.hidden: true
          prometheus_url.required: false
          health_service_check.value.example: false
          health_service_check.value.default: false
          send_monotonic_counter.value.example: false
          send_monotonic_counter.value.default: false
  - template: logs
    example:
      - type: journald
        source: gitlab-runner

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - gitlab-runner
  - template: auto_conf/discovery
