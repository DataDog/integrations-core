name: Tekton
fleet_configurable: true
files:
- name: tekton.yaml
  discovery:
    strategies:
    - template: discovery/openmetrics_from_named_ports
      overrides:
        port_names:
        - metrics
        candidates:
        - pipelines_controller_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - name: pipelines_controller_endpoint
      description: |
        Endpoint exposing the Pipelines Controller's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://tekton-pipelines-controller:9090/metrics
        type: string
    - name: triggers_controller_endpoint
      description: |
        Endpoint exposing the Triggers Controller's Prometheus metrics.
      value:
        display_default: null
        example: http://tekton-triggers-controller:9000/metrics
        type: string
      fleet_configurable: false
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.required: false
        openmetrics_endpoint.hidden: true
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - controller-10a3e32792f33651396d02b6855a6e36
  - template: auto_conf/discovery
