                - organization_uuid
              target: ocsf.actor.user.org.uid
              preserveSource: true
              overrideOnConflict: false
            - type: schema-remapper
              name: Map `actor.user_id`, `actor.admin_api_key_id` to `ocsf.user.uid`
              sources:
                - actor.user_id
                - actor.admin_api_key_id
              target: ocsf.user.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `actor.email_address` to `ocsf.user.email_addr`
              sources:
                - actor.email_address
              target: ocsf.user.email_addr
              preserveSource: true
              overrideOnConflict: true
            - type: schema-category-mapper
              name: ocsf.actor.user.type_id
              categories:
                - filter:
                    query: "@actor.type:user_actor"
                  name: User
                  id: 1
                - filter:
                    query: "@actor.type:admin*"
                  name: Admin
                  id: 2
                - filter:
                    query: "-@actor.type:*"
                  name: Unknown
                  id: 0
                - filter:
                    query: "@actor.type:*"
