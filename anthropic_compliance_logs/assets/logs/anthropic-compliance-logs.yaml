    name: Class
    path: ocsf.class_name
    source: log
  - groups:
      - OCSF
    name: Class ID
    path: ocsf.class_uid
    source: log
    type: integer
  - groups:
      - OCSF
    name: Type ID
    path: ocsf.type_uid
    source: log
    type: integer
  - groups:
      - OCSF
    name: Severity ID
    path: ocsf.severity_id
    source: log
    type: integer
  - groups:
      - OCSF
    name: Status
    path: ocsf.status
    source: log
  - groups:
      - OCSF
    name: Status ID
    path: ocsf.status_id
    source: log
    type: integer
  - groups:
      - OCSF
    name: Event Code
    path: ocsf.metadata.event_code
    source: log
  - groups:
      - OCSF
    name: Product Name
    path: ocsf.metadata.product.name
    source: log
  - groups:
      - OCSF
    name: Vendor Name
    path: ocsf.metadata.product.vendor_name
    source: log
  - groups:
