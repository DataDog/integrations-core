              fallback:
                values:
                  ocsf.actor.user.type: Other
                  ocsf.actor.user.type_id: "99"
                sources:
                  ocsf.actor.user.type:
                    - actor.type
            - type: schema-category-mapper
              name: ocsf.activity_id
              categories:
                - filter:
                    query: "@ocsf.metadata.event_code:(*_api_key_created OR org_user_invite_accepted)"
                  name: Create
                  id: 1
                - filter:
                    query: "@ocsf.metadata.event_code:*_api_key_updated AND @updates.current_value:active"
                  name: Enable
                  id: 2
                - filter:
                    query: "@ocsf.metadata.event_code:*_api_key_updated AND @updates.current_value:archived"
                  name: Disable
