    name: Multi Factor Authentication
    path: ocsf.is_mfa
    source: log
    type: boolean
pipeline:
  type: pipeline
  name: Claude Compliance Logs
  enabled: true
  filter:
    query: source:claude-compliance-logs
  processors:
    - type: date-remapper
      name: Define `created_at` as the official date of the log
      enabled: true
      sources:
        - created_at
    - type: attribute-remapper
      name: Map `type` to `evt.name`
      enabled: true
      sources:
        - type
      sourceType: attribute
      target: evt.name
      targetType: attribute
      preserveSource: true
      overrideOnConflict: true
    - type: attribute-remapper
      name: Map `actor.email_address` to `usr.email`
      enabled: true
      sources:
        - actor.email_address
      sourceType: attribute
      target: usr.email
      targetType: attribute
      preserveSource: true
      overrideOnConflict: true
    - type: attribute-remapper
      name: Map `actor.user_id` to `usr.id`
      enabled: true
      sources:
        - actor.user_id
      sourceType: attribute
      target: usr.id
      targetType: attribute
      preserveSource: true
      overrideOnConflict: true
    - type: attribute-remapper
      name: Map `actor.ip_address` to `network.client.ip`
      enabled: true
      sources:
        - actor.ip_address
      sourceType: attribute
      target: network.client.ip
      targetType: attribute
      preserveSource: true
      overrideOnConflict: true
    - type: attribute-remapper
      name: Map `actor.user_agent` to `http.useragent`
      enabled: true
      sources:
        - actor.user_agent
      sourceType: attribute
      target: http.useragent
      targetType: attribute
      preserveSource: true
      overrideOnConflict: true
    - type: geo-ip-parser
      name: GeoIP parser on `network.client.ip`
      enabled: true
      sources:
        - network.client.ip
      target: network.client.geoip
    - type: user-agent-parser
      name: User-Agent parser on `http.useragent`
      enabled: true
      sources:
        - http.useragent
      target: http.useragent_details
      encoded: false
    - type: pipeline
      name: OCSF pre transformations
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "*"
      processors:
        - type: string-builder-processor
          name: Add product name
          enabled: true
          template: "Claude"
          target: ocsf.metadata.product.name
          replaceMissing: false
        - type: string-builder-processor
          name: Add product vendor
          enabled: true
          template: "Anthropic"
          target: ocsf.metadata.product.vendor_name
          replaceMissing: false
        - type: attribute-remapper
          name: Map `type` to `ocsf.metadata.event_code`
          enabled: true
          sources:
            - type
          sourceType: attribute
          target: ocsf.metadata.event_code
          targetType: attribute
          preserveSource: true
          overrideOnConflict: true
        - type: attribute-remapper
          name: Map `created_at` to `ocsf.metadata.original_time`
          enabled: true
          sources:
            - created_at
          sourceType: attribute
          target: ocsf.metadata.original_time
          targetType: attribute
          preserveSource: true
          overrideOnConflict: true
        - type: grok-parser
          name: Parse `created_at` to `ocsf.time`
          enabled: true
          source: created_at
          samples:
            - "2026-05-22T15:21:54.358426Z"
          grok:
            supportRules: ""
            matchRules: |
              parsing_time %{date("yyyy-MM-dd'T'HH:mm:ss.SSSSSS'Z'"):ocsf.time}
              parsing_time_ms %{date("yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"):ocsf.time}
              parsing_time_s %{date("yyyy-MM-dd'T'HH:mm:ss'Z'"):ocsf.time}
    - type: pipeline
      name: OCSF sub pipeline for class Account Change [3001] - target events
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "@ocsf.metadata.event_code:(org_user_deleted OR org_user_invite_sent)"
      processors:
        - type: schema-processor
          name: Apply OCSF schema for 3001
          enabled: true
          mappers:
            - type: schema-remapper
              name: Map `ocsf.metadata.product.name` to `ocsf.metadata.product.name`
              sources:
                - ocsf.metadata.product.name
              target: ocsf.metadata.product.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.product.vendor_name` to `ocsf.metadata.product.vendor_name`
              sources:
                - ocsf.metadata.product.vendor_name
              target: ocsf.metadata.product.vendor_name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.event_code` to `ocsf.metadata.event_code`
              sources:
                - ocsf.metadata.event_code
              target: ocsf.metadata.event_code
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `id` to `ocsf.metadata.uid`
              sources:
                - id
              target: ocsf.metadata.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.time` to `ocsf.time`
              sources:
                - ocsf.time
              target: ocsf.time
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.original_time` to `ocsf.metadata.original_time`
              sources:
                - ocsf.metadata.original_time
              target: ocsf.metadata.original_time
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `actor.email_address` to `ocsf.actor.user.email_addr`
              sources:
                - actor.email_address
              target: ocsf.actor.user.email_addr
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `actor.user_id`, `actor.admin_api_key_id` to `ocsf.actor.user.uid`
              sources:
                - actor.user_id
                - actor.admin_api_key_id
              target: ocsf.actor.user.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `actor.ip_address` to `ocsf.src_endpoint.ip`
              sources:
                - actor.ip_address
              target: ocsf.src_endpoint.ip
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `actor.user_agent` to `ocsf.http_request.user_agent`
              sources:
                - actor.user_agent
              target: ocsf.http_request.user_agent
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `organization_id`, `organization_uuid` to `ocsf.actor.user.org.uid`
              sources:
                - organization_id
                - organization_uuid
              target: ocsf.actor.user.org.uid
              preserveSource: true
              overrideOnConflict: false
            - type: schema-remapper
              name: Map `deleted_user_id` to `ocsf.user.uid`
              sources:
                - deleted_user_id
              target: ocsf.user.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `deleted_user_email`, `invited_email` to `ocsf.user.email_addr`
              sources:
                - deleted_user_email
                - invited_email
              target: ocsf.user.email_addr
              preserveSource: true
              overrideOnConflict: false
            - type: schema-remapper
              name: Map `deleted_user_email`, `invited_email` to `ocsf.user.name`
              sources:
                - deleted_user_email
                - invited_email
              target: ocsf.user.name
              preserveSource: true
              overrideOnConflict: false
            - type: schema-category-mapper
              name: ocsf.actor.user.type_id
              categories:
                - filter:
                    query: "@actor.type:user_actor"
                  name: User
                  id: 1
                - filter:
                    query: "@actor.type:admin*"
                  name: Admin
                  id: 2
                - filter:
                    query: "-@actor.type:*"
                  name: Unknown
                  id: 0
                - filter:
                    query: "@actor.type:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.actor.user.type
                id: ocsf.actor.user.type_id
              fallback:
                values:
                  ocsf.actor.user.type: Other
                  ocsf.actor.user.type_id: "99"
                sources:
                  ocsf.actor.user.type:
                    - actor.type
            - type: schema-category-mapper
              name: ocsf.activity_id
              categories:
                - filter:
                    query: "@ocsf.metadata.event_code:org_user_invite_sent"
                  name: Create
                  id: 1
                - filter:
                    query: "@ocsf.metadata.event_code:org_user_deleted"
                  name: Delete
                  id: 6
                - filter:
                    query: "@ocsf.metadata.event_code:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.activity_name
                id: ocsf.activity_id
              fallback:
                values:
                  ocsf.activity_name: Other
                  ocsf.activity_id: "99"
                sources:
                  ocsf.activity_name:
                    - type
            - type: schema-category-mapper
              name: ocsf.severity_id
              categories:
                - filter:
                    query: "*"
                  name: Informational
                  id: 1
              targets:
                name: ocsf.severity
                id: ocsf.severity_id
            - type: schema-category-mapper
              name: ocsf.status_id
              categories:
                - filter:
                    query: "*"
                  name: Success
                  id: 1
              targets:
                name: ocsf.status
                id: ocsf.status_id
          schema:
            schemaType: ocsf
            version: 1.5.0
            className: Account Change
            classUid: 3001
            extensions: []
            profiles: []
    - type: pipeline
      name: OCSF sub pipeline for class Account Change [3001] - self events
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "@ocsf.metadata.event_code:(org_user_invite_accepted OR claude_user_settings_updated OR *_api_key_*)"
      processors:
        - type: schema-processor
