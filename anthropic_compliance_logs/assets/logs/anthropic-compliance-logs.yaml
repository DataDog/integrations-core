    name: Client IP
    path: network.client.ip
    source: log
  - groups:
      - Event
    name: Actor ID
    path: actor.id
    source: log
  - groups:
      - Event
    name: Actor Type
    path: actor.type
    source: log
  - groups:
      - User
    name: User Email
    path: usr.email
    source: log
  - groups:
      - User
    name: User ID
    path: usr.id
    source: log
  - groups:
      - OCSF
    name: Activity ID
    path: ocsf.activity_id
    source: log
    type: integer
  - groups:
      - OCSF
    name: Activity Name
    path: ocsf.activity_name
    source: log
  - groups:
      - OCSF
    name: Category
    path: ocsf.category_name
    source: log
  - groups:
