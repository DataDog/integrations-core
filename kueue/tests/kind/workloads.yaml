apiVersion: batch/v1
kind: Job
metadata:
  name: scheduled-workload
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  suspend: true
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: workload
        image: alpine:3.19.1
        command: ['sh', '-c', 'sleep 3600']
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: unschedulable-workload
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  suspend: true
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: workload
        image: alpine:3.19.1
        command: ['sh', '-c', 'sleep 3600']
        resources:
          requests:
            cpu: '2'
            memory: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tas-gpu-workload
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  suspend: true
  parallelism: 1
  completions: 1
  template:
    metadata:
      annotations:
        kueue.x-k8s.io/podset-required-topology: kubernetes.io/hostname
    spec:
      restartPolicy: Never
      containers:
      - name: workload
        image: alpine:3.19.1
        command: ['sh', '-c', 'sleep 3600']
        resources:
          limits:
            nvidia.com/gpu: '1'
          requests:
            nvidia.com/gpu: '1'
