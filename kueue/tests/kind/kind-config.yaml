apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
networking:
  # Use non-default CIDRs to avoid colliding with the host environment's
  # Kubernetes service/pod networks, which otherwise hijacks in-cluster
  # traffic to the API server and breaks Kueue's webhook cert bootstrap.
  apiServerAddress: 127.0.0.1
  serviceSubnet: 10.245.0.0/16
  podSubnet: 10.246.0.0/16
nodes:
- role: control-plane
  image: kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256
