apiVersion: batch/v1
kind: Job
metadata:
  name: event-workload
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  suspend: true
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: workload
        image: alpine:3.19.1
        command: ['sh', '-c', 'sleep 3600']
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
