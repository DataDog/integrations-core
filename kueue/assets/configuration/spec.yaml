name: Kueue
fleet_configurable: true
files:
- name: kueue.yaml
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.required: true
        openmetrics_endpoint.hidden: false
        openmetrics_endpoint.value.example: http://localhost:8080/metrics
        openmetrics_endpoint.description: |
          Endpoint exposing Kueue's Prometheus metrics.
    - name: resource_name_map
      description: |
        Mapping of Kueue resource label values to metric name suffixes for resource metrics.

        By default, `cpu` is reported as `cpu`, `nvidia.com/gpu` is reported as `gpu`, and unmapped resources
        are reported as `other`. Built-in resource names cannot be overridden.
      value:
        type: object
        example:
          example.com/fpga: fpga
