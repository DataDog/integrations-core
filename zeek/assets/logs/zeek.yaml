              preserveSource: true
              overrideOnConflict: true
            - type: schema-category-mapper
              name: ocsf.severity_id
              categories:
                - filter:
                    query: "@severity.id:1"
                  name: Informational
                  id: 1
                - filter:
                    query: "@severity.id:2"
                  name: Low
                  id: 2
                - filter:
                    query: "@severity.id:3"
                  name: Medium
                  id: 3
                - filter:
                    query: "@severity.id:4"
                  name: High
                  id: 4
                - filter:
                    query: "@severity.id:5"
                  name: Critical
                  id: 5
                - filter:
                    query: "*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.severity
                id: ocsf.severity_id
              fallback:
                values:
                  ocsf.severity: Other
