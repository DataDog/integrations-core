services:
  teamcity:
    image: mockserver/mockserver:latest
    container_name: teamcity
    ports:
      - 8111:8111
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/initializerJson.json
      MOCKSERVER_WATCH_INITIALIZATION_JSON: true
      MOCKSERVER_SERVER_PORT: 8111
    volumes:
      - ./config:/config
