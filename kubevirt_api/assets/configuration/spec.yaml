name: KubeVirt API
fleet_configurable: true
files:
  - name: kubevirt_api.yaml
    discovery:
      strategies:
      - strategy: from_ports
        port_hints:
        - 8443
        candidates:
        - kubevirt_api_metrics_endpoint: "https://{service.host}:{port.number}/metrics"
          kubevirt_api_healthz_endpoint: "https://{service.host}:{port.number}/healthz"
          tls_verify: "false"
    options:
      - template: init_config
        options:
          - template: init_config/openmetrics
      - template: instances
        options:
          - name: kubevirt_api_metrics_endpoint
            description: |
              URL to the KubeVirt API Service /metrics endpoint.
            fleet_configurable: true
            value:
              display_default: null
              example: https://<YOUR_IP>:443/metrics
              type: string
          - name: kubevirt_api_healthz_endpoint
            description: |
              URL to check the KubeVirt API /healthz endpoint.
            fleet_configurable: true
            value:
              display_default: null
              example: https://<YOUR_IP>:443/healthz
              type: string
          - name: kube_namespace
            description: |
              The namespace where the KubeVirt API is running.  (Provided by autodiscovery template variables)
            fleet_configurable: true
            value:
              display_default: null
              example: kubevirt
              type: string
          - name: kube_pod_name
            description: |
              The name of the KubeVirt API pod. (Provided by autodiscovery template variables)
            fleet_configurable: true
            value:
              display_default: null
              example: virt-api-id-1234
              type: string
          - template: instances/openmetrics
            overrides:
              openmetrics_endpoint.required: false
              openmetrics_endpoint.hidden: true
  - name: auto_conf.yaml
    options:
      - template: ad_identifiers
        overrides:
          value.example:
          - virt-api
      - template: auto_conf/discovery
