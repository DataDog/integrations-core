name: Celery
fleet_configurable: true
files:
- name: celery.yaml
  discovery:
    ad_identifiers:
      - flower
    strategies:
      - strategy: from_ports
        port_hints:
          - 5555
        candidates:
          - openmetrics_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.required: true
        openmetrics_endpoint.value.example: http://localhost:5555/metrics
        openmetrics_endpoint.description: |
          Endpoint exposing the Celery Flower's Prometheus metrics. For more information refer to:
          https://docs.celeryq.dev/en/stable/userguide/monitoring.html#flower-real-time-celery-web-monitor
  - template: logs
    example:
    - type: file
      path: /var/log/celery/*.log
      source: celery
