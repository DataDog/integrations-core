name: Temporal
fleet_configurable: true
files:
- name: temporal.yaml
  discovery:
    strategies:
      - strategy: from_ports
        port_hints:
          - 8000
        candidates:
          - openmetrics_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.description: |
          The URL exposing metrics in the OpenMetrics format.

          Set this to <listenAddress>/<handlerPath> as configured in your Temporal server
          (see https://docs.temporal.io/references/configuration#prometheus).
  - template: logs
    example:
    - type: file
      path: /var/log/temporal/temporal-server.log
      source: temporal
      service: <SERVICE_NAME>

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - temporal
      - temporalio/server
      - temporalio/auto-setup
  - template: auto_conf/discovery
