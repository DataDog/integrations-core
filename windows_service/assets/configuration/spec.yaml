name: Windows Service
fleet_configurable: true

files:
  - name: windows_service.yaml
    options:
      - template: init_config
        options:
          - template: init_config/default
      - template: instances
        options:
          - name: services
            description: |
              List of services to monitor e.g. Dnscache, wmiApSrv, etc.

              Services can also be selectively monitored by their startup type and whether they have triggers
              The possible values for `startup_type` are:
                - disabled
                - manual
                - automatic
                - automatic_delayed_start

              The possible values for `trigger_start` are:
                - true
                - false

              Services can also be selectively monitored by whether they are Windows per-user services,
              which are instantiated per user logon session and named `<service name>_<LUID>`
              (for example `OneSyncSvc_443f50`). The possible values for `per_user` are:
                - true
                - false
              To exclude per-user services from collection, monitor only non-per-user services with
              `per_user: false`.

              If any service is set to `ALL`, all services registered with the SCM will be monitored, and
              all other patterns provided in this instance will be ignored.

              Service name patterns are case insensitive. `ALL` is case sensitive.

              NOTE: The service name patterns will match all services starting with the pattern. For example,
              if `service` is provided, it will match all services starting with `service` as if service.* is configured.
              For an exact match, use ^service$
            fleet_configurable: true
            required: true
            value:
              type: array
              items:
                anyOf:
                  - type: string
                  - type: object
              example:
                - <SERVICE_NAME_1>
                - name: <SERVICE_NAME_2>
                - startup_type: automatic
                  trigger_start: false
                - per_user: false
          - name: disable_legacy_service_tag
            description: |
              Whether or not to stop submitting the tag `service` that has been renamed
              to `windows_service` and disable the associated deprecation warning.
            fleet_configurable: true
            value:
              type: boolean
              example: false
          - name: windows_service_startup_type_tag
            description: |
              Whether or not to submit the `windows_service_startup_type` tag along
              with each service check.

              This tag indicates the Windows service startup type as shown in a service's properties,
              and can be used as a filter/scope in Monitors.
              Possible values for this tag are:
                - disabled
                - manual
                - automatic
                - automatic_delayed_start
            fleet_configurable: true
            value:
              type: boolean
              example: false
          - name: collect_display_name_as_tag
            description: |
              Whether or not to submit the Windows Service Display Name as the `display_name` tag.
              `display_name` will be formatted according to Datadog's tagging requirements:
              https://docs.datadoghq.com/getting_started/tagging/#define-tags

              Example of the default `windows_service` tag and `display_name` tag:
              windows_service:wuauserv
              display_name:windows_update
            fleet_configurable: true
            value:
              type: boolean
              example: false
          - name: group_per_user_services
            description: |
              Whether or not to group Windows per-user services under their template name.

              Per-user services are instantiated per user logon session and named
              `<service name>_<LUID>` (for example `OneSyncSvc_443f50`), which creates high
              cardinality in the `windows_service` and `display_name` tags. When enabled, the
              LUID suffix is stripped so all instances of a per-user service report under the
              same template name.
              See https://learn.microsoft.com/en-us/windows/application-management/per-user-services-in-windows
            fleet_configurable: true
            value:
              type: boolean
              example: false
          - template: instances/default
