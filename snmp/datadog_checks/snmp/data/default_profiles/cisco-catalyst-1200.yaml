# Cisco Catalyst 1200 Series Smart Switches
#
# These run the Cisco SMB switch OS (the same firmware family as CBS250/350 and
# the SG/SF SMB line), NOT IOS/IOS-XE — so they are modeled on cisco-sb.yaml,
# not cisco-catalyst.yaml.
#
# serial_number (and the chassis software rev) live in ENTITY-MIB at the fixed
# chassis entPhysicalIndex 67109120, which is a property of this SMB OS — the
# documented index for these devices:
#   https://www.cisco.com/c/en/us/support/docs/smb/switches/Cisco-Business-Switching/kmgmt3636-snmpv3-common-oids-cbs350.html
#
# sysObjectIDs are the named ciscoC1200* assignments under ciscoProducts
# (1.3.6.1.4.1.9.1) from the official CISCO-PRODUCTS-MIB
# (github.com/cisco/cisco-mibs, v2/CISCO-PRODUCTS-MIB.my). The range is
# contiguous (3210-3225); listed explicitly because 9.1.* is shared with
# mainstream IOS-XE Catalysts that must NOT match this profile.

extends:
  - _base.yaml
  - _generic-if.yaml
  # Deliberately does NOT import cisco.yaml (SMB OS, like cisco-sb.yaml).

device:
  vendor: "cisco"

sysobjectid:
  - 1.3.6.1.4.1.9.1.3210   # ciscoC12008TD     - C1200-8T-D
  - 1.3.6.1.4.1.9.1.3211   # ciscoC12008TE2G   - C1200-8T-E-2G
  - 1.3.6.1.4.1.9.1.3212   # ciscoC12008PE2G   - C1200-8P-E-2G
  - 1.3.6.1.4.1.9.1.3213   # ciscoC12008FP2G   - C1200-8FP-2G
  - 1.3.6.1.4.1.9.1.3214   # ciscoC120016T2G   - C1200-16T-2G
  - 1.3.6.1.4.1.9.1.3215   # ciscoC120016P2G   - C1200-16P-2G
  - 1.3.6.1.4.1.9.1.3216   # ciscoC120024T4G   - C1200-24T-4G
  - 1.3.6.1.4.1.9.1.3217   # ciscoC120024P4G   - C1200-24P-4G
  - 1.3.6.1.4.1.9.1.3218   # ciscoC120024FP4G  - C1200-24FP-4G
  - 1.3.6.1.4.1.9.1.3219   # ciscoC120048T4G   - C1200-48T-4G
  - 1.3.6.1.4.1.9.1.3220   # ciscoC120048P4G   - C1200-48P-4G
  - 1.3.6.1.4.1.9.1.3221   # ciscoC120024T4X   - C1200-24T-4X
  - 1.3.6.1.4.1.9.1.3222   # ciscoC120024P4X   - C1200-24P-4X
  - 1.3.6.1.4.1.9.1.3223   # ciscoC120024FP4X  - C1200-24FP-4X
  - 1.3.6.1.4.1.9.1.3224   # ciscoC120048T4X   - C1200-48T-4X
  - 1.3.6.1.4.1.9.1.3225   # ciscoC120048P4X   - C1200-48P-4X

metadata:
  device:
    fields:
      type:
        value: "switch"
      serial_number:
        symbol:
          MIB: ENTITY-MIB
          OID: 1.3.6.1.2.1.47.1.1.1.1.11.67109120
          name: entPhysicalSerialNum
      version:
        symbol:
          MIB: ENTITY-MIB
          OID: 1.3.6.1.2.1.47.1.1.1.1.10.67109120
          name: entPhysicalSoftwareRev

metrics:
  - MIB: CISCOSB-rndMng
    symbol:
      name: cpu.usage
      OID: 1.3.6.1.4.1.9.6.1.101.1.8