extends:
  - _base.yaml
  - _generic-if.yaml
  - _generic-ip.yaml
  - _generic-tcp.yaml
  - _generic-udp.yaml

sysobjectid:
  - 1.3.6.1.4.1.21671
  - 1.3.6.1.4.1.21671.*

metadata:
  device:
    fields:
      vendor:
        value: "netscout"
      type:
        value: "switch"
      model:
        symbol:
          MIB: NTCT-PFS-HEALTH-MIB
          OID: 1.3.6.1.4.1.21671.3.2.1.1.5.0
          name: nphDeviceModelName
      serial_number:
        symbol:
          MIB: NTCT-PFS-HEALTH-MIB
          OID: 1.3.6.1.4.1.21671.3.2.1.1.4.0
          name: nphDeviceSerialNumber

metrics:
  - MIB: NTCT-PFS-HEALTH-MIB
    table:
      OID: 1.3.6.1.4.1.21671.3.2.1.1.6
      name: nphMemoryTable
    symbols:
      - OID: 1.3.6.1.4.1.21671.3.2.1.1.6.1.2
        name: memory.total
        scale_factor: 1024
      - OID: 1.3.6.1.4.1.21671.3.2.1.1.6.1.3
        name: memory.free
        scale_factor: 1024
    metric_tags:
      - index: 1
        tag: nph_mgmt_index

  - MIB: NTCT-PFS-HEALTH-MIB
    table:
      OID: 1.3.6.1.4.1.21671.3.2.1.1.7
      name: nphCPUTable
    symbols:
      - OID: 1.3.6.1.4.1.21671.3.2.1.1.7.1.2
        name: cpu.usage
        metric_type: gauge
    metric_tags:
      - index: 1
        tag: nph_mgmt_index
