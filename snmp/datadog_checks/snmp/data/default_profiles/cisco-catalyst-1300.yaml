# Cisco Catalyst 1300 / 1300X Series Managed Switches
#
# These run the Cisco SMB switch OS (the same firmware family as CBS250/350 and
# the SG/SF SMB line), NOT IOS/IOS-XE — so they are modeled on cisco-sb.yaml,
# not cisco-catalyst.yaml.
#
# serial_number (and the chassis software rev) live in ENTITY-MIB at the fixed
# chassis entPhysicalIndex 67109120, which is a property of this SMB OS — the
# documented index for these devices:
#   https://www.cisco.com/c/en/us/support/docs/smb/switches/Cisco-Business-Switching/kmgmt3636-snmpv3-common-oids-cbs350.html
#
# sysObjectIDs are the named ciscoC1300* / ciscoC1300X* assignments under
# ciscoProducts (1.3.6.1.4.1.9.1) from the official CISCO-PRODUCTS-MIB
# (github.com/cisco/cisco-mibs, v2/CISCO-PRODUCTS-MIB.my): Catalyst 1300 =
# 3226-3253, Catalyst 1300X = 3410-3417. Listed explicitly because 9.1.* is
# shared with mainstream IOS-XE Catalysts that must NOT match this profile.

extends:
  - _base.yaml
  - _generic-if.yaml
  # Deliberately does NOT import cisco.yaml (SMB OS, like cisco-sb.yaml).

device:
  vendor: "cisco"

sysobjectid:
  # --- Catalyst 1300 (ciscoProducts 3226-3253) ---
  - 1.3.6.1.4.1.9.1.3226   # ciscoC13008TE2G    - C1300-8T-E-2G
  - 1.3.6.1.4.1.9.1.3227   # ciscoC13008PE2G    - C1300-8P-E-2G
  - 1.3.6.1.4.1.9.1.3228   # ciscoC13008FP2G    - C1300-8FP-2G
  - 1.3.6.1.4.1.9.1.3229   # ciscoC130016T2G    - C1300-16T-2G
  - 1.3.6.1.4.1.9.1.3230   # ciscoC130016P2G    - C1300-16P-2G
  - 1.3.6.1.4.1.9.1.3231   # ciscoC130016FP2G   - C1300-16FP-2G
  - 1.3.6.1.4.1.9.1.3232   # ciscoC130024T4G    - C1300-24T-4G
  - 1.3.6.1.4.1.9.1.3233   # ciscoC130024P4G    - C1300-24P-4G
  - 1.3.6.1.4.1.9.1.3234   # ciscoC130024FP4G   - C1300-24FP-4G
  - 1.3.6.1.4.1.9.1.3235   # ciscoC130048T4G    - C1300-48T-4G
  - 1.3.6.1.4.1.9.1.3236   # ciscoC130048P4G    - C1300-48P-4G
  - 1.3.6.1.4.1.9.1.3237   # ciscoC130048FP4G   - C1300-48FP-4G
  - 1.3.6.1.4.1.9.1.3238   # ciscoC130016P4X    - C1300-16P-4X
  - 1.3.6.1.4.1.9.1.3239   # ciscoC130024T4X    - C1300-24T-4X
  - 1.3.6.1.4.1.9.1.3240   # ciscoC130024P4X    - C1300-24P-4X
  - 1.3.6.1.4.1.9.1.3241   # ciscoC130024FP4X   - C1300-24FP-4X
  - 1.3.6.1.4.1.9.1.3242   # ciscoC130048T4X    - C1300-48T-4X
  - 1.3.6.1.4.1.9.1.3243   # ciscoC130048P4X    - C1300-48P-4X
  - 1.3.6.1.4.1.9.1.3244   # ciscoC130048FP4X   - C1300-48FP-4X
  - 1.3.6.1.4.1.9.1.3245   # ciscoC13008MGP2X   - C1300-8MGP-2X
  - 1.3.6.1.4.1.9.1.3246   # ciscoC130024MGP4X  - C1300-24MGP-4X
  - 1.3.6.1.4.1.9.1.3247   # ciscoC130048MGP4X  - C1300-48MGP-4X
  - 1.3.6.1.4.1.9.1.3248   # ciscoC130012XT2X   - C1300-12XT-2X
  - 1.3.6.1.4.1.9.1.3249   # ciscoC130012XS     - C1300-12XS
  - 1.3.6.1.4.1.9.1.3250   # ciscoC130024XT     - C1300-24XT
  - 1.3.6.1.4.1.9.1.3251   # ciscoC130024XS     - C1300-24XS
  - 1.3.6.1.4.1.9.1.3252   # ciscoC130016XTS    - C1300-16XTS
  - 1.3.6.1.4.1.9.1.3253   # ciscoC130024XTS    - C1300-24XTS
  # --- Catalyst 1300X (ciscoProducts 3410-3417) ---
  - 1.3.6.1.4.1.9.1.3410   # ciscoC1300X10NU2X  - 10*5G+2SFP28
  - 1.3.6.1.4.1.9.1.3411   # ciscoC1300X24MU4X  - 24*2.5G+4SFP28
  - 1.3.6.1.4.1.9.1.3412   # ciscoC1300X24NGU4X - 16GE+8*5G+4SFP28
  - 1.3.6.1.4.1.9.1.3413   # ciscoC1300X24P4X   - 24GE+4SFP28, PoE
  - 1.3.6.1.4.1.9.1.3414   # ciscoC1300X24T4X   - 24GE+4SFP28
  - 1.3.6.1.4.1.9.1.3415   # ciscoC1300X48NGU4X - 40GE+8*5G+4SFP28
  - 1.3.6.1.4.1.9.1.3416   # ciscoC1300X48P4X   - 48GE+4SFP28, PoE
  - 1.3.6.1.4.1.9.1.3417   # ciscoC1300X48T4X   - 48GE+4SFP28

metadata:
  device:
    fields:
      type:
        value: "switch"
      serial_number:
        symbol:
          MIB: ENTITY-MIB
          OID: 1.3.6.1.2.1.47.1.1.1.1.11.67109120
          name: entPhysicalSerialNum
      version:
        symbol:
          MIB: ENTITY-MIB
          OID: 1.3.6.1.2.1.47.1.1.1.1.10.67109120
          name: entPhysicalSoftwareRev

metrics:
  - MIB: CISCOSB-rndMng
    symbol:
      name: cpu.usage
      OID: 1.3.6.1.4.1.9.6.1.101.1.8
