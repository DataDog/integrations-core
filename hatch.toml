[envs.docs]
dependencies = [
  "zensical>=0.0.36",
  # Plugins
  "mkdocs-git-revision-date-localized-plugin~=1.2.0",
  "mkdocstrings-python~=1.18.2",
  "mkdocs-redirects~=1.2.1",
  "mkdocs-glightbox~=0.3.4",
  # Extensions
  "mkdocs-click~=0.8.0",
  "pymdown-extensions>=10.21.2",
  # Necessary for syntax highlighting in code blocks
  "pygments>=2.20",
  # Validation
  "linkchecker~=10.6.0",
]
# API & CLI documentation
post-install-commands = [
  "uv pip install -e ./datadog_checks_base[deps,http] -e ./datadog_checks_dev[cli]",
  "uv pip install -e ./ddev",
]
[envs.docs.env-vars]
# Use a set timestamp for reproducible builds, see:
# https://reproducible-builds.org/specs/source-date-epoch/
SOURCE_DATE_EPOCH = "1580601600"
[envs.docs.scripts]
prepare = "python docs/developer/.scripts/prepare_docs.py"
build = [
  "prepare",
  "zensical build --clean --strict {args}",
]
serve = [
  "prepare",
  "zensical serve --dev-addr localhost:8000 {args}",
]
validate = "linkchecker --config .linkcheckerrc site"
# https://github.com/linkchecker/linkchecker/issues/678
build-check = [
  "build",
  "validate",
]
