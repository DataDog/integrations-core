name: Boundary
fleet_configurable: true
files:
- name: boundary.yaml
  discovery:
    strategies:
    - strategy: from_ports
      port_hints:
      - 9203
      candidates:
      - health_endpoint: "http://{service.host}:{port.number}/health"
        openmetrics_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - name: health_endpoint
      fleet_configurable: true
      display_priority: 5
      required: true
      description: |
        The Boundary controller's health endpoint.
      value:
        type: string
        example: http://localhost:9203/health
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.display_priority: 3
        openmetrics_endpoint.value.example: http://localhost:9203/metrics
        openmetrics_endpoint.description: |
          The URL where Boundary exposes Prometheus metrics.
  - template: logs
    example:
      - type: file
        source: boundary
        path: /var/log/boundary/events.ndjson

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - boundary
  - template: auto_conf/discovery
