[env.collectors.datadog-checks]
base-package-features = ["deps", "db", "json"]

[[envs.default.matrix]]
python = ["3.13"]

[envs.default]
# Unit tests only — no Docker needed. Integration tests against a real
# Spanner instance will be added once a GCP project is provisioned.
test-path = "tests"

[envs.default.env-vars]
DDEV_SKIP_GENERIC_TAGS_CHECK = "true"
