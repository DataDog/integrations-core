name: KubeVirt Handler
fleet_configurable: true
files:
  - name: kubevirt_handler.yaml
    discovery:
      strategies:
      - strategy: local:from_kubevirt_handler_named_metrics_port
        provides:
        - instance
        inputs: {}
        candidates:
        - kubevirt_handler_metrics_endpoint: "{instance.metrics_endpoint}"
          kubevirt_handler_healthz_endpoint: "{instance.healthz_endpoint}"
          kube_namespace: "{instance.kube_namespace}"
          kube_pod_name: "{instance.kube_pod_name}"
          tls_verify: "false"
    options:
      - template: init_config
        options:
          - template: init_config/openmetrics
      - template: instances
        options:
          - name: kubevirt_handler_metrics_endpoint
            description: |
              URL to the KubeVirt Handler Service /metrics endpoint.
            fleet_configurable: true
            value:
              display_default: null
              example: https://10.244.0.38:443/metrics
              type: string
          - name: kubevirt_handler_healthz_endpoint
            description: |
              URL to check the KubeVirt Handler /healthz endpoint.
            fleet_configurable: true
            value:
              display_default: null
              example: https://10.244.0.38:443/healthz
              type: string
          - name: kube_namespace
            description: |
              The namespace where the KubeVirt Handler is running.  (Provided via autodiscovery template variables)
            fleet_configurable: true
            value:
              display_default: null
              example: kubevirt
              type: string
          - name: kube_pod_name
            description: |
              The name of the KubeVirt Handler pod. (Provided via autodiscovery template variables)
            fleet_configurable: true
            value:
              display_default: null
              example: virt-handler-id-1234
              type: string
          - template: instances/openmetrics
            overrides:
              openmetrics_endpoint.required: false
              openmetrics_endpoint.hidden: true
  - name: auto_conf.yaml
    options:
      - template: ad_identifiers
        overrides:
          value.example:
          - virt-handler
      - template: auto_conf/discovery
