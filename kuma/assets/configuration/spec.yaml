name: Kuma
fleet_configurable: true
files:
- name: kuma.yaml
  discovery:
    strategies:
    - template: discovery/openmetrics_from_named_ports
      overrides:
        port_names:
        - diagnostics
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.value.example: http://%%host%%:5680/metrics
        openmetrics_endpoint.description: |
          Set this to the endpoint that Kuma exposes.
  - template: logs
    example:
    - type: docker
      source: kuma
      service: <SERVICE>
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - kuma-cp
  - template: auto_conf/discovery
