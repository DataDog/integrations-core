type: flow
config:
  name: openmetrics
  description: >-
    Generate an OpenMetrics integration.
  inputs:
    - name: endpoints
      label: Endpoints
      type: object
      multi: true
      required: true
      fields:
        - name: name
          label: Name
          type: string
          required: true
        - name: url
          label: URL
          type: string
          required: true
    - name: integration
      label: Integration name
      type: string
      required: true
    - name: docker_source_path
      label: Docker folder
      type: path
      required: true
    - name: fanout_threshold
      label: Metric fan-out threshold
      type: number
      required: false
      default: 100
  flow:
    - phase: inspect_endpoint
    - phase: rename_metrics
      dependencies: [inspect_endpoint]
    - phase: build_integration
      dependencies: [rename_metrics]
    - phase: write_tests
      dependencies: [build_integration]
    - phase: write_readme
      dependencies: [write_tests]
