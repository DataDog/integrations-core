# Generated by evalya init — hidden GitLab CI templates.
# Regenerate with `evalya init --force`. See .evalya/init.yml for config.
variables:
  EVALYA_IMAGE: registry.ddbuild.io/ci/evalya:${EVALYA_TAG}
  EVALYA_TAG: main
.evalya:generate-pipeline:
  image: $EVALYA_IMAGE
  tags:
    - arch:amd64
  script:
    - sh /usr/local/share/evalya/scripts/generate-pipeline.sh -l "evalya.io/ci=e2e" --build-publish-tasks
  variables:
    DD_METRICS_TAGS: evalya:true,evalya-stage:generate
  artifacts:
    paths:
      - evalya-pipeline.yml
      - evalya-impact-summary.txt

.evalya:publish-metadata:
  image: $EVALYA_IMAGE
  tags:
    - arch:amd64
  id_tokens:
    DDSIGN_ID_TOKEN:
      aud: image-integrity
  before_script:
    - docker buildx create --driver docker-container --name evalya-builder --use || docker buildx use evalya-builder || true
    - docker buildx inspect --bootstrap > /dev/null 2>&1 || exit 75
  script:
    - evalya metadata publish --push --sign --platform linux/amd64,linux/arm64 --metadata-file /tmp/evalya-meta-buildx-metadata.json --tag "${CI_COMMIT_SHORT_SHA}" --tag "${CI_COMMIT_REF_NAME}"
  variables:
    DD_METRICS_TAGS: evalya:true,evalya-stage:publish

.evalya:run-tests:
  variables:
    PARENT_PIPELINE_SOURCE: $CI_PIPELINE_SOURCE
  trigger:
    include:
      - artifact: evalya-pipeline.yml
        job: evalya:generate-pipeline
    strategy: depend
    forward:
      pipeline_variables: true

.evalya:validate-manifests:
  image: $EVALYA_IMAGE
  tags:
    - arch:amd64
  script:
    - evalya manifest validate-all
  variables:
    DD_METRICS_TAGS: evalya:true,evalya-stage:validate

