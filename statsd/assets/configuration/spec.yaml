name: StatsD
fleet_configurable: true

files:
  - name: statsd.yaml
    discovery:
      strategies:
      - strategy: from_ports
        port_hints:
        - 8126
        candidates:
        - host: "{service.host}"
          port: "{port.number}"
    options:
      - template: init_config
        options:
          - template: init_config/default
      - template: instances
        options:
          - name: host
            description: Host to collect StatsD data from.
            fleet_configurable: true
            value:
              example: localhost
              type: string
          - name: port
            description: Port to use to collect StatsD data.
            fleet_configurable: true
            value:
              example: 8126
              type: integer
          - name: timeout
            description: Custom timeout for your check request.
            value:
              type: number
              example: 10
            fleet_configurable: false
          - template: instances/default
      - template: logs
        example:
          - type: file
            path: /var/log/statsd/statsd.log
            source: statsd
  - name: auto_conf.yaml
    options:
    - template: ad_identifiers
      overrides:
        value.example:
        - statsd
    - template: auto_conf/discovery
