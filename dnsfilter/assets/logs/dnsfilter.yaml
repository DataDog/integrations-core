pipeline:
  type: pipeline
  name: DNSFilter
  enabled: true
  filter:
    query: source:dnsfilter
  processors:
    - type: grok-parser
      name: Convert to epoch time
      enabled: true
      source: time
      samples:
        - 2025-05-02 07:05:46.529
      grok:
        supportRules: ""
        matchRules: rule %{date("yyyy-M-d H:m:s.SSS"):timestamp}
    - type: date-remapper
      name: Define `timestamp` as the official date of the log
      enabled: true
      sources:
        - timestamp
    - type: attribute-remapper
      name: Map `local_user_id` to `usr.id`
      enabled: true
      sources:
        - local_user_id
      sourceType: attribute
      target: usr.id
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: attribute-remapper
      name: Map `local_user_name` to `usr.name`
      enabled: true
      sources:
        - local_user_name
      sourceType: attribute
      target: usr.name
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: attribute-remapper
      name: Map `request_address` to `network.client.ip`
      enabled: true
      sources:
        - request_address
      sourceType: attribute
      target: network.client.ip
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: geo-ip-parser
      name: Extracting geolocation information from the Client IP
      enabled: true
      sources:
        - network.client.ip
      target: network.client.geoip
      ip_processing_behavior: do-nothing
    - type: attribute-remapper
      name: Map `domain` to `dns.question.name`
      enabled: true
      sources:
        - domain
      sourceType: attribute
      target: dns.question.name
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: attribute-remapper
      name: Map `result` to `evt.outcome`
      enabled: true
      sources:
        - result
      sourceType: attribute
      target: evt.outcome
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: attribute-remapper
      name: Map `question_type` to `dns.question.type`
      enabled: true
      sources:
        - question_type
      sourceType: attribute
      target: dns.question.type
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: category-processor
      name: Define `status` based on `threat` and `evt.outcome`
      enabled: true
      categories:
        - name: info
          filter:
            query: (@threat:true @evt.outcome:blocked) OR (@threat:false
              @evt.outcome:allowed) OR (@threat:false @evt.outcome:blocked)
        - name: warning
          filter:
            query: "@threat:true @evt.outcome:allowed"
      target: status
    - type: status-remapper
      name: Define `status` as the official status of the log
      enabled: true
      sources:
        - status
    - type: attribute-remapper
      name: Map `code` to `dns.flags.rcode`
      enabled: true
      sources:
        - code
      sourceType: attribute
      target: dns.flags.rcode
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: pipeline
      name: OCSF sub pipeline for class DNS Activity [4003]
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "*"
      processors:
        - type: string-builder-processor
          name: Add product name
          enabled: true
          template: DNSFilter
          target: ocsf.metadata.product.name
          replaceMissing: false
        - type: string-builder-processor
          name: Add product vendor
          enabled: true
          template: DNSFilter
          target: ocsf.metadata.product.vendor_name
          replaceMissing: false
        - type: array-processor
          name: Append request_address to intermediate_ips array
          enabled: true
          operation:
            source: request_address
            target: ocsf.src_endpoint.intermediate_ips
            preserveSource: true
            type: append
        - type: schema-processor
          name: Apply OCSF schema for 4003
          enabled: true
          schema:
            schemaType: ocsf
            version: 1.5.0
            className: DNS Activity
            classUid: 4003
            extensions: []
            profiles:
              - security_control
          mappers:
            - name: ocsf.activity_id
              categories:
                - filter:
                    query: "*"
                  name: Query
                  id: 1
              targets:
                name: ocsf.activity_name
                id: ocsf.activity_id
              type: schema-category-mapper
            - name: ocsf.status_id
              categories:
                - filter:
                    query: "@result:allowed"
                  name: Success
                  id: 1
                - filter:
                    query: "@result:blocked"
                  name: Failure
                  id: 2
                - filter:
                    query: "@result:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.status
                id: ocsf.status_id
              fallback:
                values:
                  ocsf.status: Other
                  ocsf.status_id: "99"
                sources:
                  ocsf.status:
                    - result
              type: schema-category-mapper
            - name: ocsf.severity_id
              categories:
                - filter:
                    query: "@threat:true"
                  name: Medium
                  id: 3
                - filter:
                    query: "*"
                  name: Informational
                  id: 1
              targets:
                name: ocsf.severity
                id: ocsf.severity_id
              fallback:
                values: {}
                sources: {}
              type: schema-category-mapper
            - name: ocsf.rcode_id
              categories:
                - filter:
                    query: "@code:NOERROR"
                  name: NoError
                  id: 0
                - filter:
                    query: "@code:FORMERR"
                  name: FormError
                  id: 1
                - filter:
                    query: "@code:SERVFAIL"
                  name: ServError
                  id: 2
                - filter:
                    query: "@code:NXDOMAIN"
                  name: NXDomain
                  id: 3
                - filter:
                    query: "@code:NOTIMP"
                  name: NotImp
                  id: 4
                - filter:
                    query: "@code:REFUSED"
                  name: Refused
                  id: 5
                - filter:
                    query: "@code:YXDOMAIN"
                  name: YXDomain
                  id: 6
                - filter:
                    query: "@code:(YXRRSET OR XRRSET)"
                  name: YXRRSet
                  id: 7
                - filter:
                    query: "@code:NXRRSET"
                  name: NXRRSet
                  id: 8
                - filter:
                    query: "@code:NOTAUTH"
                  name: NotAuth
                  id: 9
                - filter:
                    query: "@code:NOTZONE"
                  name: NotZone
                  id: 10
                - filter:
                    query: "@code:DSOTYPENI"
                  name: DSOTYPENI
                  id: 11
                - filter:
                    query: "@code:(BADSIG OR BADVERS)"
                  name: BADSIG_VERS
                  id: 16
                - filter:
                    query: "@code:BADKEY"
                  name: BADKEY
                  id: 17
                - filter:
                    query: "@code:BADTIME"
                  name: BADTIME
                  id: 18
                - filter:
                    query: "@code:BADMODE"
                  name: BADMODE
                  id: 19
                - filter:
                    query: "@code:BADNAME"
                  name: BADNAME
                  id: 20
                - filter:
                    query: "@code:BADALG"
                  name: BADALG
                  id: 21
                - filter:
                    query: "@code:BADTRUNC"
                  name: BADTRUNC
                  id: 22
                - filter:
                    query: "@code:BADCOOKIE"
                  name: BADCOOKIE
                  id: 23
                - filter:
                    query: "@code:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.rcode
                id: ocsf.rcode_id
              fallback:
                values:
                  ocsf.rcode: Other
                  ocsf.rcode_id: "99"
                sources:
                  ocsf.rcode:
                    - code
              type: schema-category-mapper
            - name: ocsf.connection_info.direction_id
              categories:
                - filter:
                    query: "*"
                  name: Outbound
                  id: 2
              targets:
                name: ocsf.connection_info.direction
                id: ocsf.connection_info.direction_id
              fallback:
                values: {}
                sources: {}
              type: schema-category-mapper
            - name: ocsf.disposition_id
              categories:
                - filter:
                    query: "@result:allowed"
                  name: Allowed
                  id: 1
                - filter:
                    query: "@result:blocked"
                  name: Blocked
                  id: 2
                - filter:
                    query: "@result:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.disposition
                id: ocsf.disposition_id
              fallback:
                values:
                  ocsf.disposition: Other
                  ocsf.disposition_id: "99"
                sources:
                  ocsf.disposition:
                    - result
              type: schema-category-mapper
            - name: ocsf.action_id
              categories:
                - filter:
                    query: "@result:allowed"
                  name: Allowed
                  id: 1
                - filter:
                    query: "@result:blocked"
                  name: Denied
                  id: 2
                - filter:
                    query: "@result:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.action
                id: ocsf.action_id
              fallback:
                values:
                  ocsf.action: Other
                  ocsf.action_id: "99"
                sources:
                  ocsf.action:
                    - result
              type: schema-category-mapper
            - name: Map `ocsf.metadata.product.name` to `ocsf.metadata.product.name`
              sources:
                - ocsf.metadata.product.name
              sourceType: attribute
              target: ocsf.metadata.product.name
              preserveSource: true
              overrideOnConflict: true
              type: schema-remapper
            - name: Map `ocsf.metadata.product.vendor_name` to `ocsf.metadata.product.vendor_name`
              sources:
                - ocsf.metadata.product.vendor_name
              sourceType: attribute
              target: ocsf.metadata.product.vendor_name
              preserveSource: true
              overrideOnConflict: true
              type: schema-remapper
            - name: Map `ocsf.message` to `ocsf.message`
              sources:
                - ocsf.message
              sourceType: attribute
              target: ocsf.message
              preserveSource: true
              overrideOnConflict: true
              type: schema-remapper
            - name: Map `ocsf.src_endpoint.intermediate_ips` to `ocsf.src_endpoint.intermediate_ips`
              sources:
                - ocsf.src_endpoint.intermediate_ips
              sourceType: attribute
              target: ocsf.src_endpoint.intermediate_ips
              preserveSource: true
              overrideOnConflict: true
