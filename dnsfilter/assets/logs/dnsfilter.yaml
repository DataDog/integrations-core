    name: Status
    path: ocsf.status
    source: log
  - groups:
      - OCSF
    name: Status ID
    path: ocsf.status_id
    source: log
    type: integer
  - groups:
      - OCSF
    name: Severity
    path: ocsf.severity
    source: log
  - groups:
