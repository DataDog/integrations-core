name: Slurm
fleet_configurable: true
files:
- name: slurm.yaml
  options:
  - template: init_config
    options:
      - name: slurm_binaries_dir
        description: |
          The directory in which all the Slurm binaries are located. These are mainly:
          sinfo, sacct, sdiag, sshare and sdiag.
        value:
          type: string
          require_trusted_provider: true
          example: /usr/bin/
        fleet_configurable: false
      - template: init_config/default
  - template: instances
    options:
    - name: collect_sinfo_stats
      description: Whether or not to collect statistics from the sinfo command.
      fleet_configurable: true
      value:
        type: boolean
        example: True
    - name: collect_sdiag_stats
      description: Whether or not to collect statistics from the sdiag command.
      fleet_configurable: true
      value:
        type: boolean
        example: True
    - name: collect_squeue_stats
      description: Whether or not to collect statistics from the squeue command.
      fleet_configurable: true
      value:
        type: boolean
        example: True
    - name: collect_sacct_stats
      description: Whether or not to collect statistics from the sacct command.
      fleet_configurable: true
      value:
        type: boolean
        example: True
    - name: collect_sshare_stats
      description: Whether or not to collect statistics from the sshare command.
      fleet_configurable: true
      value:
        type: boolean
        example: True
    - name: collect_scontrol_stats
      description: |
        Whether or not to collect statistics from the scontrol command. This is mainly used in the worker
        node to collect the list of running jobs along with their PIDs.
      fleet_configurable: true
      value:
        type: boolean
        example: False
    - name: resolve_scontrol_host_pids
      description: |
        Whether or not to resolve PIDs reported by scontrol through the host proc filesystem before collecting
        process tags. Enable this when scontrol reports namespace PIDs instead of host PIDs.
      fleet_configurable: true
      value:
        type: boolean
        example: False
    - name: collect_gpu_stats
      description: Whether or not to collect GPU statistics when Slurm is configured to use GPUs.
      fleet_configurable: true
      value:
        type: boolean
        example: False
    - name: collect_seff_stats
      description: Whether or not to collect seff statistics.
      fleet_configurable: true
      value:
        type: boolean
        example: False
    - name: sinfo_collection_level
      description: |
        The level of detail to collect from the sinfo command. The default is 'basic'. Available options are 1, 2 and
        3. Level 1 collects data only for partitions. Level 2 collects data from individual nodes. Level 3
        collects data from from individual nodes as well but is more verbose and includes data such as CPU and
        memory usage as reported from the OS, as well as additional tags.
      fleet_configurable: true
      value:
        type: integer
        example: 1
    - name: slurm_rest_api_url
      description: |
        Base URL of the Slurm REST API (slurmrestd), for example http://slurm-restapi:6820.
        When set, the check collects metrics over the REST API instead of executing the Slurm
        CLI binaries. This lets the check run without co-located Slurm binaries or munge/auth
        access (for example, as a cluster check against a containerized Slurm deployment such
        as SUNK/Slinky). Leave unset to use the default CLI collection mode. slurmrestd is
        optional in Slurm, so this mode requires it to be enabled on the cluster.
      fleet_configurable: true
      value:
        type: string
        display_default: null
        example: http://slurm-restapi:6820
    - name: slurm_openapi_version
      description: |
        The slurmrestd OpenAPI data_parser version to query (for example v0.0.42). Only used
        when slurm_rest_api_url is set.
      fleet_configurable: true
      value:
        type: string
        example: v0.0.42
    - name: slurm_rest_api_token
      description: |
        The Slurm JWT (auth/jwt) used to authenticate to slurmrestd, sent in the
        X-SLURM-USER-TOKEN header. Only used when slurm_rest_api_url is set. Prefer
        slurm_rest_api_token_file for tokens that are rotated.
      fleet_configurable: false
      value:
        type: string
        secret: true
        example: <SLURM_JWT>
    - name: slurm_rest_api_token_file
      description: |
        Path to a file containing the Slurm JWT used to authenticate to slurmrestd. The file is
        re-read on every check run so rotated tokens are picked up. Takes precedence over
        slurm_rest_api_token. Only used when slurm_rest_api_url is set.
      fleet_configurable: true
      value:
        type: string
        display_default: null
        example: /etc/datadog-agent/slurm.d/token
    - name: slurm_rest_api_user
      description: |
        Slurm username to send in the X-SLURM-USER-NAME header, in addition to the JWT token.
        Only needed when slurmrestd sits behind an authenticating proxy that uses one shared
        privileged token to act on behalf of multiple users (see
        https://slurm.schedmd.com/jwt.html). Not needed for a JWT generated directly for a
        single user (e.g. via `scontrol token`), since the token's own `sun` claim already
        identifies the user in that case. Only used when slurm_rest_api_url is set.
      fleet_configurable: true
      value:
        type: string
        display_default: null
        example: datadog
    - name: sinfo_path
      description: Full path to the sinfo binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/sinfo
    - name: sacct_path
      description: Full path to the sacct binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/sacct
    - name: sdiag_path
      description: Full path to the sdiag binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/sdiag
    - name: sshare_path
      description: Full path to the sshare binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/sshare
    - name: squeue_path
      description: Full path to the squeue binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/squeue
    - name: scontrol_path
      description: Full path to the scontrol binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/scontrol
    - name: seff_path
      description: Full path to the seff binary.
      fleet_configurable: true
      value:
        type: string
        require_trusted_provider: true
        example: /usr/bin/seff
    - name: debug_sinfo_stats
      description: |
        Whether or not to enable debug logging for the sinfo command. This logs the output of the sinfo command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - name: debug_sdiag_stats
      description: |
        Whether or not to enable debug logging for the sdiag command. This logs the output of the sdiag command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - name: debug_squeue_stats
      description: |
        Whether or not to enable debug logging for the squeue command. This logs the output of the squeue command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - name: debug_sshare_stats
      description: |
        Whether or not to enable debug logging for the sshare command. This logs the output of the sshare command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - name: debug_sacct_stats
      description: |
        Whether or not to enable debug logging for the sacct command. This logs the output of the sacct command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - name: debug_scontrol_stats
      description: |
        Whether or not to enable debug logging for the scontrol command. This logs the output of the scontrol command
        to the Agent log.
      value:
        type: boolean
        example: False
      hidden: True
      fleet_configurable: false
    - template: instances/default
      overrides:
        min_collection_interval.description: |
          This changes the collection interval of the check. For more information, see:
          https://docs.datadoghq.com/developers/write_agent_check/#collection-interval

          Most Slurm metrics are collected from calling the different binaries. Depending on the size of the Slurm cluster,
          this can be a very expensive operation. It is recommended to set this to a higher value than the default 15
          seconds, but this can be adjusted based on the size of the cluster and the desired granularity of the metrics.
        min_collection_interval.value.display_default: 60
        min_collection_interval.value.default: 60
        min_collection_interval.value.example: 60
        min_collection_interval.enabled: true
  - template: logs
    example:
    - type: file
      path: /var/log/slurm/slurmd.log
      source: slurm
      service: slurm
    - type: file
      path: /var/log/slurm/slurmdbd.log
      source: slurm
      service: slurm
    - type: file
      path: /var/log/slurm/slurmctld.log
      source: slurm
      service: slurm
