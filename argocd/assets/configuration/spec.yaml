name: "ArgoCD"
fleet_configurable: true
files:
- name: argocd.yaml
  discovery:
    strategies:
    - strategy: local:from_argocd_kube_app_name
      provides:
      - endpoints
      inputs: {}
      candidates:
      - app_controller_endpoint: "{endpoints.app_controller_endpoint}"
        appset_controller_endpoint: "{endpoints.appset_controller_endpoint}"
        api_server_endpoint: "{endpoints.api_server_endpoint}"
        repo_server_endpoint: "{endpoints.repo_server_endpoint}"
        notifications_controller_endpoint: "{endpoints.notifications_controller_endpoint}"
        commit_server_endpoint: "{endpoints.commit_server_endpoint}"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - name: app_controller_endpoint
      description: |
        Endpoint exposing the Application Controller's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://argocd-metrics:8082/metrics
        type: string
    - name: appset_controller_endpoint
      description: |
        Endpoint exposing the ApplicationSet Controller's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://argocd-applicationset-controller:8080/metrics
        type: string
    - name: api_server_endpoint
      description: |
        Endpoint exposing the API Server's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://argocd-server-metrics:8083/metrics
        type: string
    - name: repo_server_endpoint
      description: |
        Endpoint exposing the Repo Server's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://argocd-repo-server:8084/metrics
        type: string
    - name: notifications_controller_endpoint
      description: |
        Endpoint exposing Notification Controller's Prometheus metrics.
      fleet_configurable: true
      value:
        display_default: null
        example: http://argocd-notifications-controller:9001/metrics
        type: string
    - name: commit_server_endpoint
      description: |
        Endpoint exposing Commit Server's Prometheus metrics.
      fleet_configurable: false
      value:
        display_default: null
        example: http://argocd-commit-server:8087/metrics
        type: string
    - name: collect_openmetrics
      hidden: true
      fleet_configurable: false
      description: |
        Collect the Argo CD Prometheus (OpenMetrics) endpoints, the check's
        default metrics. Enabled by default. Set to ``false`` to run only the
        generic resources collector (``collect_genresources``) without scraping
        metrics; in that mode the ``*_endpoint`` options are not required.
      value:
        type: boolean
        example: true
    - name: collect_genresources
      hidden: true
      fleet_configurable: false
      description: |
        Enable the generic resources pilot collector that ships ArgoCD
        Applications, Clusters, and Repositories to Datadog as generic
        resources. Disabled by default.
      value:
        type: boolean
        example: false
    - name: genresources_endpoint
      hidden: true
      fleet_configurable: false
      description: |
        Base URL of the ArgoCD REST API (for example, ``https://argocd.example.com``).
        Required when ``collect_genresources`` is set to ``true``.
      value:
        display_default: null
        example: https://<ARGOCD_HOST>
        type: string
    - name: genresources_auth_token
      hidden: true
      fleet_configurable: false
      description: |
        Raw bearer token used to authenticate against the ArgoCD REST API.
        When set, the collector adds ``Authorization: Bearer <token>`` to
        each REST request. Leave unset to inherit the request authentication
        configured on the instance (for example, the structured ``auth_token``
        config object handled by the HTTP wrapper).
      secret: true
      value:
        display_default: null
        example: <BEARER_TOKEN>
        type: string
    - name: genresources_ttl_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Time-to-live in seconds applied to every emitted resource. Resources
        expire this many seconds after their last observation, so it also bounds
        how long a deleted resource lingers in Datadog. Must be at least as long
        as the longest scrape interval, or resources expire before their next
        refresh. Defaults to 1800 (three times the application full scrape interval).
        Minimum of 1.
      value:
        type: integer
        example: 1800
        minimum: 1
    - name: genresources_application_poll_interval_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Seconds between dedup polls of Applications when streaming is disabled
        (``genresources_stream_applications_enabled: false``). Each poll fetches
        Applications and submits only the ones that changed. Ignored when
        streaming is enabled, since the stream delivers changes in real time.
        Minimum of 1.
      value:
        type: integer
        example: 120
        minimum: 1
    - name: genresources_application_full_scrape_interval_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Seconds between full Application scrapes, in both streaming and polling
        modes. A full scrape re-submits every Application to refresh its
        time-to-live (TTL) and backfill anything the stream missed. While
        streaming, the dedup poll is disabled, so during a stream outage a newly
        created Application is not collected until the next full scrape. This
        value is the worst-case discovery lag. Minimum of 1.
      value:
        type: integer
        example: 600
        minimum: 1
    - name: genresources_max_resources_per_cycle
      hidden: true
      fleet_configurable: false
      description: |
        Maximum number of items emitted per resource type per check cycle.
        When an ArgoCD API endpoint returns more than this, the excess is
        dropped and a warning is logged. Applied independently to
        Applications, Clusters, and Repositories.
      value:
        type: integer
        example: 10000
        minimum: 1
    - name: genresources_extra_include_paths
      hidden: true
      fleet_configurable: false
      description: |
        Additional dotted JSON paths appended to the baseline allowlist of
        every collected resource type. Only enumerated paths are shipped;
        anything not listed never leaves the Agent. ``[*]`` denotes array
        iteration. A path that does not match any field for a given type is
        silently skipped. This list is additive; it can add fields to ship but
        cannot remove baseline fields. Each path must resolve to a value, or a
        list of values, not a whole object: a path that lands on an object
        causes that resource to be dropped, so enumerate leaf fields rather
        than their parents.
      value:
        type: array
        items:
          type: string
        example: []
    - name: genresources_exclude_paths
      hidden: true
      fleet_configurable: false
      description: |
        Dotted JSON paths to remove from the baseline allowlist of every
        collected resource type, applied after ``genresources_extra_include_paths``.
        An entry removes any allowlisted path equal to it or nested beneath it;
        for example, ``status.history`` drops every ``status.history[*]`` field
        while ``status.conditions[*].message`` drops only that leaf. Use this to
        stop shipping a field without a code change. Removing fields only ever
        ships less, never more.
      value:
        type: array
        items:
          type: string
        example: []
    - name: genresources_stream_applications_enabled
      hidden: true
      fleet_configurable: false
      description: |
        When enabled, the check maintains a persistent stream to the Argo CD
        ``/api/v1/stream/applications`` endpoint and emits Application changes in
        near real time instead of waiting for the next poll. When disabled,
        Applications are polled every ``genresources_application_poll_interval_seconds``
        instead. Clusters and Repositories are always polled regardless of this
        setting. Enabled by default; only takes effect when ``collect_genresources``
        is ``true``.
      value:
        type: boolean
        example: true
    - name: genresources_cluster_scrape_interval_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Seconds between full Cluster scrapes. Clusters are always polled (never
        streamed); each scrape re-submits every Cluster to refresh its
        time-to-live (TTL). Minimum of 1.
      value:
        type: integer
        example: 300
        minimum: 1
    - name: genresources_repository_scrape_interval_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Seconds between full Repository scrapes. Repositories are always polled
        (never streamed); each scrape re-submits every Repository to refresh its
        time-to-live (TTL). Minimum of 1.
      value:
        type: integer
        example: 300
        minimum: 1
    - name: genresources_stream_backoff_max_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Maximum backoff, in seconds, between application stream reconnection
        attempts. Backoff starts at 1 second and doubles up to this cap,
        resetting on a successful connection. Minimum of 1.
      value:
        type: integer
        example: 30
        minimum: 1
    - name: genresources_stream_read_timeout_seconds
      hidden: true
      fleet_configurable: false
      description: |
        Socket read timeout, in seconds, for the application watch stream. Argo CD
        does not send keepalives on an idle stream, so this is effectively how long
        an idle but healthy connection is held before it is treated as dead and
        reconnected. Larger values reduce reconnect churn on low-traffic instances;
        smaller values detect a silently dropped connection sooner. Minimum of 1.
      value:
        type: integer
        example: 300
        minimum: 1
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.required: false
        openmetrics_endpoint.hidden: true
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - argocd
  - template: auto_conf/discovery
