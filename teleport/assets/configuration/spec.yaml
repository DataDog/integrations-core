name: Teleport
fleet_configurable: true
files:
  - name: teleport.yaml
    discovery:
      strategies:
      - strategy: from_ports
        port_hints:
        - 3000
        candidates:
        - teleport_url: "http://{service.host}"
          diag_port: "{port.number}"
    options:
      - template: init_config
        options:
          - template: init_config/openmetrics
      - template: instances
        options:
          - name: "teleport_url"
            fleet_configurable: true
            required: true
            description: "The Teleport URL to connect to."
            value:
              type: string
              example: "http://127.0.0.1"
          - name: "diag_port"
            fleet_configurable: true
            description: "The Teleport Diagnostic Port."
            value:
              type: integer
              example: 3000
          - template: instances/openmetrics
            overrides:
              openmetrics_endpoint.hidden: true
              openmetrics_endpoint.required: false
  - name: auto_conf.yaml
    options:
    - template: ad_identifiers
      overrides:
        value.example:
        - teleport-distroless
        - teleport-ent-distroless
        - teleport-ent-fips-distroless
    - template: auto_conf/discovery
