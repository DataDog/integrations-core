name: Milvus
fleet_configurable: true
files:
- name: milvus.yaml
  discovery:
    strategies:
    - template: discovery/openmetrics_from_ports
      overrides:
        port_hints:
        - 9091
  options:
    - template: init_config
      options:
        - template: init_config/openmetrics
    - template: instances
      options:
        - template: instances/openmetrics
          overrides:
            openmetrics_endpoint.value.example: http://localhost:9091/metrics
            openmetrics_endpoint.description: |
              Endpoint exposing Milvus' Prometheus metrics. For more information, refer to 
              https://milvus.io/docs/monitor.md#Monitor-metrics-with-Prometheus.
    - template: logs
      example:
      - type: docker
        source: milvus
        service: <SERVICE>
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - milvus
  - template: auto_conf/discovery
