name: SAP HANA
fleet_configurable: true
files:
- name: sap_hana.yaml
  options:
  - template: init_config
    options:
      - name: persist_db_connections
        description: Whether or not to persist database connections.
        fleet_configurable: true
        value:
          type: boolean
          example: true
      - template: init_config/db
      - template: init_config/default
  - template: instances
    options:
      - name: server
        description: The hostname used to connect to the system.
        fleet_configurable: true
        required: true
        value:
          type: string
      - name: port
        description: The port used to connect to the system.
        fleet_configurable: true
        value:
          type: integer
          display_default: 30015
      - name: username
        description: The database user to authenticate as.
        fleet_configurable: true
        required: true
        value:
          type: string
      - name: password
        description: The password of `username`.
        fleet_configurable: true
        required: true
        secret: true
        value:
          type: string
      - name: schema
        description: The schema containing the tenant databases views.
        fleet_configurable: true
        value:
          type: string
          display_default: SYS_DATABASES
          example: SYS_DATABASES
      - name: connection_properties
        description: |
          When `hdbcli` is installed, this defines the properties of the database connections. Any property
          defined here overrides any default value set by the check. For more information, see:
          https://help.sap.com/viewer/f1b440ded6144a54ada97ff95dac7adf/2.10/en-US/ee592e89dcce4480a99571a4ae7a702f.html
        value:
          example:
            key: hdbuserid
            sslUseDefaultTrustStore: false
          type: object
          additionalProperties: true
        fleet_configurable: false
      - name: use_hana_hostnames
        description: |
          Whether or not to use the hostnames contained in HANA's monitoring
          views instead of the Agent hostname.
        fleet_configurable: true
        value:
          type: boolean
          example: false
      - name: database_identifier
        display_priority: 0
        description: |
          Controls how the database is identified in Data Observability. Each unique value appears as a
          separate billable instance.

          The default value is the host of the instance.

          This value will be used as-is for the display name of the instance but will be normalized
          when applied as the `database_instance` tag. See https://docs.datadoghq.com/getting_started/tagging/
          for more details on Datadog tag normalization.
        options:
          - name: template
            value:
              type: string
              display_default: "$host"
              example: "saphana_myorg_$env"
            description: |
              The template to use for the database identifier. The default value is `$host`.
              You can use the following variables, prefixed by `$` in the template:
              - host: The provided host of the instance.
              - port: The port number of the instance.
              In addition, you can use any key from the `tags` section of the configuration.
            fleet_configurable: false
      - name: batch_size
        description: The number of rows to return with each query result.
        fleet_configurable: true
        value:
          type: integer
          example: 1000
      - name: timeout
        description: The timeout in seconds for connecting to `server`.
        value:
          type: number
          example: 10
        fleet_configurable: false
      - template: instances/db
      - name: persist_db_connections
        description: Whether or not to persist database connections.
        value:
          type: boolean
          example: true
        fleet_configurable: false
      - name: use_tls
        description: |
          Instructs the SAP HANA integration to connect using TLS.
        fleet_configurable: true
        value:
          example: false
          type: boolean
      - template: instances/tls
      - name: collect_schemas
        hidden: true
        description: |
          Configure collection of SAP HANA catalog metadata (schemas, tables,
          views, and columns) for Data Quality features in Data Observability.
        options:
          - name: enabled
            description: |
              Enable collection of catalog metadata. When enabled, the Agent
              queries `SYS.M_TABLES`, `SYS.VIEWS`, `SYS.TABLE_COLUMNS`, and
              `SYS.VIEW_COLUMNS` and emits schema metadata payloads.
            value:
              type: boolean
              example: false
          - name: collection_interval
            description: |
              Set the schema collection interval (in seconds). Catalog data
              changes slowly; 600s (10 min) is a reasonable default.
            value:
              type: number
              example: 600
          - name: max_tables
            description: |
              Maximum number of tables to collect per cycle across all schemas.
            value:
              type: integer
              example: 2000
          - name: max_columns
            description: |
              Maximum number of columns to collect per table.
            value:
              type: integer
              example: 500
          - name: max_views
            description: |
              Maximum number of views to collect per cycle across all schemas.
            value:
              type: integer
              example: 2000
          - name: include_schemas
            description: |
              A list of schema names to include. Any schema whose name is in
              this list is included. If empty, all schemas (other than
              those excluded) are included.
            value:
              type: array
              items:
                type: string
              example:
                - "MY_SCHEMA"
          - name: exclude_schemas
            description: |
              A list of schema names to exclude. Any schema whose name is in
              this list is excluded. SAP HANA system schemas are always
              excluded regardless of this setting.
            value:
              type: array
              items:
                type: string
              example:
                - "TMP_SCHEMA"
      - name: data_observability
        hidden: true
        display_priority: 0
        fleet_configurable: true
        description: |
          Configure the Data Observability async job, which executes monitoring
          queries delivered through Remote Configuration.
        options:
          - name: enabled
            fleet_configurable: true
            description: Enable the Data Observability job.
            value:
              type: boolean
              example: false
              display_default: false
          - name: collection_interval
            fleet_configurable: true
            description: |
              How often (in seconds) the job wakes up to check which queries are
              due. Individual queries have their own interval_seconds.
            value:
              type: number
              example: 10
              display_default: 10
          - name: run_sync
            hidden: true
            description: Run the job synchronously (for testing).
            value:
              type: boolean
              example: false
              display_default: false
            fleet_configurable: false
          - name: config_id
            hidden: true
            description: |
              Unique identifier of the Remote Configuration payload that populated
              this data_observability block. Set automatically by the Datadog Agent
              Go RC handler; do not set this field manually.
            value:
              type: string
            fleet_configurable: false
          - name: queries
            hidden: true
            description: |
              List of monitor queries to execute. Populated automatically by the
              Datadog Agent Go RC handler; do not set this field manually.
            value:
              type: array
              items:
                type: object
                required:
                  - query
                properties:
                - name: monitor_id
                  type: integer
                - name: query
                  type: string
                - name: interval_seconds
                  description: |
                    How often (in seconds) to run this query. Ignored when schedule is set
                    (see schedule for the precedence rule).
                  type: integer
                - name: schedule
                  description: |
                    A standard 5-field cron expression (minute hour dom month dow) specifying
                    when to run this query. When both schedule and interval_seconds are set,
                    schedule wins and interval_seconds is ignored. If neither is set, the
                    query is skipped at runtime with a warning.
                  type: string
                - name: query_timeout
                  description: |
                    Statement timeout for this query in milliseconds. Applied as a connection-level
                    statementTimeout when executing the query.
                  type: integer
                - name: dbname
                  type: string
                - name: type
                  type: string
                - name: entity
                  type: object
                  properties:
                  - name: platform
                    type: string
                  - name: account
                    type: string
                  - name: database
                    type: string
                  - name: schema
                    type: string
                  - name: table
                    type: string
                - name: custom_sql_select_fields
                  type: object
                  properties:
                  - name: metric_config_id
                    type: integer
                  - name: entity_id
                    type: string
            fleet_configurable: false
      - template: instances/default
  - template: logs
    example:
    - type: integration
      source: sap_hana
      service: sap_hana
