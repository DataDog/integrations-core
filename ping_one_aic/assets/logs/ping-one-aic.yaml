                id: ocsf.activity_id
              fallback:
                values:
                  ocsf.activity_id: "99"
                  ocsf.activity_name: Other
                sources:
                  ocsf.activity_name:
                    - type
              type: schema-category-mapper
            - name: ocsf.severity_id
              categories:
                - filter:
                    query: "@ocsf.metadata.event_code:*"
                  name: Informational
                  id: 1
              targets:
