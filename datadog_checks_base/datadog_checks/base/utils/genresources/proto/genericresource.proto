syntax = "proto3";

// Public-repo-safe wire envelope for the `genresources` event-platform track.
// Field numbers preserved from upstream so bytes are wire-compatible with REDAPL.
// Do not add fields without REDAPL eng approval.

package datadog.genresources.v1;

option go_package = "github.com/DataDog/datadog-agent/pkg/proto/pbgo/genresources";

import "google/protobuf/timestamp.proto";

message GenericResource {
  reserved 1, 3, 4, 5, 8, 9, 10, 11, 14;
  string type = 2;
  google.protobuf.Timestamp seen_at = 6;
  google.protobuf.Timestamp expire_at = 7;
  bytes fields_json = 12;
  string key = 13;
}

message GenericResourceEvent {
  string source = 1;
  reserved 2;
  GenericResource resource = 3;
}
