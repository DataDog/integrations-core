name: Keda
fleet_configurable: true
files:
- name: keda.yaml
  discovery:
    ad_identifiers:
      - keda
    strategies:
      - strategy: from_ports
        port_hints:
          - 8080
        candidates:
          - openmetrics_endpoint: "http://{service.host}:{port.number}/metrics"
  options:
  - template: init_config
    options:
    - template: init_config/default
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.value.example: http://localhost:8080/metrics
        openmetrics_endpoint.description: |
          Endpoint exposing the Keda's Prometheus metrics. For more information refer to:
          https://keda.sh/docs/2.16/integrations/prometheus/