pipeline:
  type: pipeline
  name: Palo Alto Networks Cortex XSOAR
  enabled: true
  filter:
    query: source:palo-alto-networks-cortex-xsoar
  processors:
    - type: category-processor
      name: For `modified`
      enabled: true
      categories:
        - filter:
            query: '@modified:"1970-01-01T00:00:00Z"'
          name: N/A
      target: modified
    - type: pipeline
      name: Date remapper using modified
      enabled: true
      filter:
        query: -@modified:"N/A"
      processors:
        - type: attribute-remapper
          name: Map `modified` to `timestamp`
          enabled: true
          sources:
            - modified
          sourceType: attribute
          target: timestamp
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
    - type: attribute-remapper
      name: Map `created` to `timestamp`
      enabled: true
      sources:
        - created
      sourceType: attribute
      target: timestamp
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: pipeline
      name: Parse Incident logs
      enabled: true
      filter:
        query: "@vendor.endpoint:incidents"
      processors:
        - type: date-remapper
          name: Define `timestamp` as the official date of the log
          enabled: true
          sources:
            - timestamp
        - type: message-remapper
          name: Define `details` as the official message of the log
          enabled: true
          sources:
            - details
        - name: Lookup on `severity` to `severity_value`
          enabled: true
          source: severity
          target: severity_value
          lookupTable: |-
            0,Unknown
            0.5,Informational
            1,Low
            2,Medium
            3,High
            4,Critical
          type: lookup-processor
        - name: Lookup on `status` to `status_value`
          enabled: true
          source: status
          target: status_value
          lookupTable: |-
            0,Pending
            1,Active
            2,Closed
          type: lookup-processor
        - type: attribute-remapper
          name: Map `owner` to `usr.name`
          enabled: true
          sources:
            - owner
          sourceType: attribute
          target: usr.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - name: Lookup on `severity_value` to `incident_severity`
          enabled: true
          source: severity_value
          target: incident_severity
          lookupTable: |-
            Unknown,info
            Informational,info
            Low,notice
            Medium,warning
            High,warning
            Critical,critical
          type: lookup-processor
        - type: status-remapper
          name: Define `incident_severity` as the official status of the log
          enabled: true
          sources:
            - incident_severity
    - type: pipeline
      name: Parse Audit logs
      enabled: true
      filter:
        query: "@vendor.endpoint:audit-logs"
      processors:
        - type: date-remapper
          name: Define `AUDIT_INSERT_TIME` as the official date of the log
          enabled: true
          sources:
            - AUDIT_INSERT_TIME
        - type: message-remapper
          name: Define `AUDIT_DESCRIPTION` as the official message of the log
          enabled: true
          sources:
            - AUDIT_DESCRIPTION
        - type: attribute-remapper
          name: Map `AUDIT_OWNER_NAME` to `usr.name`
          enabled: true
          sources:
            - AUDIT_OWNER_NAME
          sourceType: attribute
          target: usr.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `AUDIT_OWNER_EMAIL` to `usr.email`
          enabled: true
          sources:
            - AUDIT_OWNER_EMAIL
          sourceType: attribute
          target: usr.email
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `AUDIT_ENTITY` to `evt.name`
          enabled: true
          sources:
            - AUDIT_ENTITY
          sourceType: attribute
          target: evt.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `AUDIT_RESULT` to `evt.outcome`
          enabled: true
          sources:
            - AUDIT_RESULT
          sourceType: attribute
          target: evt.outcome
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: "Map `AUDIT_SOURCE_IP` to `network.client.ip` "
          enabled: true
          sources:
            - AUDIT_SOURCE_IP
          sourceType: attribute
          target: network.client.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `AUDIT_USER_AGENT` to `http.useragent`
          enabled: true
          sources:
            - AUDIT_USER_AGENT
          sourceType: attribute
          target: http.useragent
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: user-agent-parser
          name: Extracting useragent details from http.useragent
          enabled: true
          sources:
            - http.useragent
          target: http.useragent_details
          encoded: false
          combineVersionDetails: false
        - type: geo-ip-parser
          name: Extract Geolocation information from Client IP
          enabled: true
          sources:
            - network.client.ip
          target: network.client.geoip
          ip_processing_behavior: do-nothing
    - type: pipeline
      name: " OCSF pre transformations"
      enabled: true
      filter:
        query: ""
      processors:
        - type: string-builder-processor
          name: Add product name
          enabled: true
          template: Cortex XSOAR
          target: ocsf.metadata.product.name
          replaceMissing: false
        - type: string-builder-processor
          name: Add product vendor
          enabled: true
          template: Palo Alto Networks
          target: ocsf.metadata.product.vendor_name
          replaceMissing: false
        - type: grok-parser
          name: Convert timestamp to Epoch
          enabled: true
          source: timestamp
          samples:
            - 2026-03-25T09:23:17.684Z
            - 2026-03-25T09:23:17.68Z
          grok:
            supportRules: ""
            matchRules: |-
              time_1 %{date("yyyy-MM-dd'T'HH:mm:ss.SSSZ"):ocsf.time}
              time_2 %{date("yyyy-MM-dd'T'HH:mm:ss.SSZ"):ocsf.time}
