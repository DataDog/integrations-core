# Trust policy for the validate-skip-qa workflow in DataDog/integrations-core
#
# This policy grants the workflow permission to create and update PR comments
# that recommend adding or removing the qa/skip-qa label.
#
# Naming convention:
#   self:               Only this repository (DataDog/integrations-core) can use this policy
#   validate-skip-qa:   Grants permissions for the skip-qa validation workflow
#   pull-request:       Intended for workflows triggered by pull_request events
#
# Security model:
#   - Workflow runs on pull_request events from any branch
#   - job_workflow_ref is matched by pattern since PR events reference refs/pull/N/merge
#   - No ref_protected constraint — PRs originate from any branch
#
# Permissions granted:
#   - pull_requests: write  - Create and update comments on the pull request
#
# Usage in workflows:
#   - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
#     with:
#       scope: DataDog/integrations-core
#       policy: self.validate-skip-qa.pull-request

issuer: https://token.actions.githubusercontent.com

subject_pattern: repo:DataDog/integrations-core:pull_request

claim_pattern:
  event_name: pull_request
  job_workflow_ref: DataDog/integrations-core/\.github/workflows/validate-skip-qa\.yml@.*
  repository: DataDog/integrations-core

permissions:
  pull_requests: write
