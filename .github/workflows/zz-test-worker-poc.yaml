name: Replay validation POC
run-name: >-
  Replay validation POC / ${{ inputs.mode }} /
  ${{ inputs.combine_reports && format('combine {0}', inputs.run_group) || inputs.dispatch_batches && (inputs.batch_indices != '' && format('dispatch batches {0} of {1}', inputs.batch_indices, inputs.batch_count) || format('dispatch {0} batches', inputs.batch_count)) || format('batch {0} of {1} / {2}', inputs.batch_index, inputs.batch_count, inputs.run_group) }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which integration/env targets to include
        required: true
        default: all-declared
        type: choice
        options:
        - changed
        - all-cached
        - all-declared
      runner:
        description: Which runner to drive each target with
        required: true
        default: no-agent
        type: choice
        options:
        - no-agent
        - agent
      record_image:
        description: Agent image used for the record run when runner=agent
        required: false
        default: datadog/agent:7.78.0
        type: string
      replay_image:
        description: Agent image used for the replay run when runner=agent (defaults to record_image)
        required: false
        default: datadog/agent:7.78.1
        type: string
      seed_missing_caches:
        description: Start E2E envs and seed compare-check caches when no suitable cache is restored
        required: true
        default: false
        type: boolean
      target_ref:
        description: Git ref under test
        required: true
        default: HEAD
        type: string
      base_ref:
        description: Base ref for mode=changed
        required: true
        default: origin/master
        type: string
      max_targets:
        description: Maximum targets in this dispatch after batching
        required: true
        default: 200
        type: number
      allow_truncation:
        description: Allow dropping targets after max_targets. Keep false for full coverage runs.
        required: true
        default: false
        type: boolean
      batch_index:
        description: Zero-based batch index
        required: true
        default: 0
        type: number
      batch_count:
        description: Total batch count
        required: true
        default: 1
        type: number
      readings:
        description: Number of check readings to replay
        required: true
        default: 2
        type: number
      dispatch_batches:
        description: Dispatch every batch from this existing master-visible worker workflow instead of running one batch
        required: true
        default: false
        type: boolean
      worker_ref:
        description: Git ref containing this worker workflow. Defaults to the dispatch ref.
        required: false
        default: ""
        type: string
      dry_run:
        description: Print worker dispatches without starting them; only used when dispatch_batches=true
        required: true
        default: false
        type: boolean
      batch_indices:
        description: Optional comma-separated batch indices to dispatch. Empty means every batch.
        required: false
        default: ""
        type: string
      run_group:
        description: Shared identifier linking batch worker runs and the combined report. Dispatcher generates one when empty.
        required: false
        default: ""
        type: string
      run_group_expected_batches:
        description: Number of batch runs expected in run_group. Dispatcher sets this automatically.
        required: false
        default: 0
        type: number
      auto_combine:
        description: Coordinator worker waits for sibling batches in run_group and dispatches combine mode.
        required: true
        default: false
        type: boolean
      combine_reports:
        description: Combine completed batch report artifacts from report_run_ids.
        required: true
        default: false
        type: boolean
      report_run_ids:
        description: Comma-separated workflow run IDs to combine.
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.mode }}-${{ inputs.dispatch_batches }}-${{ inputs.batch_index }}-${{ inputs.batch_count }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  dispatch-batches:
    name: Dispatch Replay validation worker batches
    if: ${{ inputs.dispatch_batches }}
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
    - name: Validate dispatcher inputs
      run: |
        python - <<'PY'
        import os
        import re
        import sys

        int_values = {
            'batch_count': os.environ['BATCH_COUNT'],
            'max_targets': os.environ['MAX_TARGETS'],
            'readings': os.environ['READINGS'],
        }
        for name, value in int_values.items():
            try:
                parsed = int(value)
            except ValueError:
                print(f'Invalid integer {name}: {value!r}', file=sys.stderr)
                sys.exit(2)
            if parsed < 1:
                print(f'{name} must be >= 1, got {parsed}', file=sys.stderr)
                sys.exit(2)

        refs = {
            'base_ref': os.environ['BASE_REF'],
            'target_ref': os.environ['TARGET_REF'],
            'worker_ref': os.environ['WORKER_REF'],
        }
        pattern = re.compile(r'^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$')
        for name, value in refs.items():
            if not value:
                continue
            if not pattern.fullmatch(value) or '..' in value or value.endswith('/'):
                print(f'Invalid {name}: {value!r}', file=sys.stderr)
                sys.exit(2)
        PY
      env:
        BASE_REF: ${{ inputs.base_ref }}
        TARGET_REF: ${{ inputs.target_ref }}
        WORKER_REF: ${{ inputs.worker_ref || github.ref_name }}
        BATCH_COUNT: ${{ inputs.batch_count }}
        MAX_TARGETS: ${{ inputs.max_targets }}
        READINGS: ${{ inputs.readings }}

    - name: Dispatch worker batches
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        MODE: ${{ inputs.mode }}
        SEED_MISSING_CACHES: ${{ inputs.seed_missing_caches }}
        TARGET_REF: ${{ inputs.target_ref }}
        BASE_REF: ${{ inputs.base_ref }}
        MAX_TARGETS: ${{ inputs.max_targets }}
        ALLOW_TRUNCATION: ${{ inputs.allow_truncation }}
        BATCH_COUNT: ${{ inputs.batch_count }}
        READINGS: ${{ inputs.readings }}
        WORKER_REF: ${{ inputs.worker_ref || github.ref_name }}
        DRY_RUN: ${{ inputs.dry_run }}
        BATCH_INDICES: ${{ inputs.batch_indices }}
        RUN_GROUP: ${{ inputs.run_group }}
        RUNNER: ${{ inputs.runner }}
        RECORD_IMAGE: ${{ inputs.record_image }}
        REPLAY_IMAGE: ${{ inputs.replay_image }}
      with:
        script: |
          const batchCount = Number(process.env.BATCH_COUNT);
          const workerRef = process.env.WORKER_REF;
          const dryRun = process.env.DRY_RUN === 'true';
          const runGroup = process.env.RUN_GROUP || `replay-pbt-${context.runId}`;
          const batchIndices = process.env.BATCH_INDICES.trim()
            ? process.env.BATCH_INDICES.split(',').map(value => Number(value.trim()))
            : Array.from({length: batchCount}, (_, index) => index);
          for (const batchIndex of batchIndices) {
            if (!Number.isInteger(batchIndex) || batchIndex < 0 || batchIndex >= batchCount) {
              throw new Error(`Invalid batch index ${batchIndex}; expected 0 <= index < ${batchCount}`);
            }
          }
          const coordinatorBatch = batchIndices[batchIndices.length - 1];
          const workflow_id = 'zz-test-worker-poc.yaml';
          const baseInputs = {
            mode: process.env.MODE,
            seed_missing_caches: process.env.SEED_MISSING_CACHES,
            target_ref: process.env.TARGET_REF,
            base_ref: process.env.BASE_REF,
            max_targets: process.env.MAX_TARGETS,
            allow_truncation: process.env.ALLOW_TRUNCATION,
            batch_count: process.env.BATCH_COUNT,
            readings: process.env.READINGS,
            dispatch_batches: 'false',
            worker_ref: '',
            dry_run: 'false',
            batch_indices: '',
            run_group: runGroup,
            run_group_expected_batches: String(batchIndices.length),
            auto_combine: 'false',
            combine_reports: 'false',
            report_run_ids: '',
            runner: process.env.RUNNER,
            record_image: process.env.RECORD_IMAGE,
            replay_image: process.env.REPLAY_IMAGE,
          };

          const rows = [];
          for (const batchIndex of batchIndices) {
            const batchInputs = {...baseInputs, batch_index: String(batchIndex), auto_combine: String(batchIndex === coordinatorBatch)};
            rows.push({batchIndex, ref: workerRef, inputs: batchInputs});
            if (!dryRun) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id,
                ref: workerRef,
                inputs: batchInputs,
              });
            }
          }

          const mode = dryRun ? 'Would dispatch' : 'Dispatched';
          await core.summary
            .addHeading('Replay validation batch dispatcher')
            .addRaw(`**${mode} ${rows.length} worker batch(s).**\n\n`)
            .addTable([
              [
                {data: 'Batch', header: true},
                {data: 'Worker ref', header: true},
                {data: 'Mode', header: true},
                {data: 'Max targets', header: true},
                {data: 'Seed caches', header: true},
              ],
              ...rows.map(row => [
                `${row.batchIndex} of ${batchCount}`,
                `\`${row.ref}\``,
                `\`${row.inputs.mode}\``,
                `\`${row.inputs.max_targets}\``,
                `\`${row.inputs.seed_missing_caches}\``,
              ]),
            ])
            .addRaw('\n')
            .addRaw(`Run group: \`${runGroup}\`\n`)
            .addRaw(`Coordinator batch: \`${coordinatorBatch}\`\n`)
            .addRaw(`Worker workflow: \`${workflow_id}\`\n`)
            .write();

          return rows;

  compute-matrix:
    name: Compute replay validation matrix
    if: ${{ !inputs.dispatch_batches && !inputs.combine_reports }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      count: ${{ steps.count.outputs.count }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Validate workflow inputs
      run: |
        python - <<'PY'
        import os
        import re
        import sys

        values = {
            'base_ref': os.environ['BASE_REF'],
            'target_ref': os.environ['TARGET_REF'],
        }
        pattern = re.compile(r'^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$')
        for name, value in values.items():
            if not pattern.fullmatch(value) or '..' in value or value.endswith('/'):
                print(f'Invalid {name}: {value!r}', file=sys.stderr)
                sys.exit(2)
        PY
      env:
        BASE_REF: ${{ inputs.base_ref }}
        TARGET_REF: ${{ inputs.target_ref }}

    - name: Fetch base ref for changed mode
      if: inputs.mode == 'changed'
      run: git fetch --no-tags --filter=blob:none origin "$BASE_REF"
      env:
        BASE_REF: ${{ inputs.base_ref }}

    - name: Compute matrix
      id: compute
      run: |
        extra_args=()
        if [[ "${{ inputs.allow_truncation }}" == "true" ]]; then
          extra_args+=(--allow-truncation)
        fi

        python .github/workflows/scripts/replay-pbt-matrix.py \
          --mode "${{ inputs.mode }}" \
          --ref "${{ inputs.base_ref }}" \
          --target-ref "${{ inputs.target_ref }}" \
          --readings "${{ inputs.readings }}" \
          --max-targets "${{ inputs.max_targets }}" \
          --batch-index "${{ inputs.batch_index }}" \
          --batch-count "${{ inputs.batch_count }}" \
          --runner "${{ inputs.runner }}" \
          --record-image "${{ inputs.record_image }}" \
          --replay-image "${{ inputs.replay_image }}" \
          "${extra_args[@]}" \
          > /tmp/replay-pbt-matrix.json
        cat /tmp/replay-pbt-matrix.json
        echo "matrix=$(cat /tmp/replay-pbt-matrix.json)" >> "$GITHUB_OUTPUT"

    - name: Count targets
      id: count
      run: |
        count=$(python - <<'PY'
        import json
        print(len(json.load(open('/tmp/replay-pbt-matrix.json'))))
        PY
        )
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "Replay validation target count: $count"

    - name: Scan matrix artifact
      run: python .github/workflows/scripts/replay-pbt-secret-scan.py /tmp/replay-pbt-matrix.json

    - name: Upload matrix
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-matrix
        path: /tmp/replay-pbt-matrix.json
        retention-days: 1

  replay-pbt:
    name: ${{ matrix.name }}
    needs: compute-matrix
    if: ${{ !inputs.dispatch_batches && !inputs.combine_reports && needs.compute-matrix.outputs.matrix != '[]' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    permissions:
      contents: read
    env:
      REPLAY_PBT_INTEGRATION: ${{ matrix.integration }}
      REPLAY_PBT_ENVIRONMENT: ${{ matrix.environment }}
      REPLAY_PBT_FIXTURE_REF: ${{ matrix.fixture_ref }}
      REPLAY_PBT_TARGET_REF: ${{ matrix.target_ref }}
      REPLAY_PBT_READINGS: ${{ matrix.readings }}
      REPLAY_PBT_CACHE_KEY: ${{ matrix.cache_key }}
      REPLAY_PBT_ARTIFACT_SLUG: ${{ matrix.artifact_slug }}
      REPLAY_PBT_MODE: ${{ inputs.mode }}
      REPLAY_PBT_BATCH_INDEX: ${{ inputs.batch_index }}
      REPLAY_PBT_BATCH_COUNT: ${{ inputs.batch_count }}
      REPLAY_PBT_RESULT_DIR: /tmp/replay-pbt-result
      REPLAY_PBT_ARTIFACTS: /tmp/replay-pbt-artifacts
      REPLAY_PBT_ADAPTERS: requests,subprocess,process,psycopg,clickhouse-connect
      REPLAY_PBT_RUNNER: ${{ matrix.runner }}
      REPLAY_PBT_RECORD_IMAGE: ${{ matrix.record_image }}
      REPLAY_PBT_REPLAY_IMAGE: ${{ matrix.replay_image }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install workflow scripts
      uses: ./.github/actions/setup-test-target-scripts

    - name: Install ddev from local folder
      uses: ./.github/actions/setup-ddev
      with:
        install-mode: local
        cache-profile: local-ddev-base

    - name: Configure ddev
      run: |
        ddev config set upgrade_check false
        ddev config set repos.core .
        ddev config set repo core

    - name: Prepare integration test dependencies
      run: ddev ci setup "$REPLAY_PBT_INTEGRATION:$REPLAY_PBT_ENVIRONMENT"

    - name: Pull Agent images (agent runner only)
      if: env.REPLAY_PBT_RUNNER == 'agent'
      run: |
        docker pull "$REPLAY_PBT_RECORD_IMAGE"
        if [[ "$REPLAY_PBT_REPLAY_IMAGE" != "$REPLAY_PBT_RECORD_IMAGE" ]]; then
          docker pull "$REPLAY_PBT_REPLAY_IMAGE"
        fi

    - name: Restore replay cache (agent runner only)
      if: env.REPLAY_PBT_RUNNER == 'agent'
      id: replay-cache-agent
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Seed cache if missing (agent runner only)
      # ``continue-on-error: true`` is intentional: a failed seed must not
      # skip the ``Run compare-agent`` step, which has a record-mode
      # fallback when the cache is unavailable. The seed step's exit code
      # is captured via the ``seeded`` output and consumed by the
      # compare-agent step's branching logic.
      if: env.REPLAY_PBT_RUNNER == 'agent' && steps.replay-cache-agent.outputs.cache-hit != 'true'
      id: seed-agent
      continue-on-error: true
      run: |
        set -uo pipefail
        bash .github/workflows/scripts/ensure-docker.sh
        if [[ "${{ inputs.seed_missing_caches }}" != "true" ]]; then
          echo "No suitable cache and seed_missing_caches=false; will run compare-agent in fresh record mode."
          echo "seeded=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "Seeding cache from $REPLAY_PBT_FIXTURE_REF via compare-check."
        if ddev env compare-check "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --record-ref "$REPLAY_PBT_FIXTURE_REF" \
          --replay-ref "$REPLAY_PBT_TARGET_REF" \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS"; then
          echo "seeded=true" >> "$GITHUB_OUTPUT"
        else
          echo "compare-check seed failed; compare-agent will fall back to fresh record mode."
          echo "seeded=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    - name: Run compare-agent (agent runner only)
      # Use ``always()`` so this step runs even when the seed step
      # ``continue-on-error``'d. The branching inside the script decides
      # whether to use the cache or fall back to fresh record mode.
      if: env.REPLAY_PBT_RUNNER == 'agent' && always() && (steps.replay-cache-agent.conclusion == 'success' || steps.seed-agent.conclusion == 'success' || steps.seed-agent.conclusion == 'failure')
      run: |
        set +e
        set -uo pipefail
        bash .github/workflows/scripts/ensure-docker.sh
        mkdir -p "$REPLAY_PBT_RESULT_DIR"

        # Decide whether to pass --replay-cache. Cache is present if the
        # restore step hit OR the seed step produced one.
        use_cache="false"
        if [[ "${{ steps.replay-cache-agent.outputs.cache-hit }}" == "true" ]]; then
          use_cache="true"
        elif [[ "${{ steps.seed-agent.outputs.seeded }}" == "true" ]]; then
          use_cache="true"
        fi

        compare_args=(
          "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT"
          --record-image "$REPLAY_PBT_RECORD_IMAGE"
          --replay-image "$REPLAY_PBT_REPLAY_IMAGE"
          --readings "$REPLAY_PBT_READINGS"
          --probes freeze,inventory,check
          --adapters "$REPLAY_PBT_ADAPTERS"
          --artifacts "$REPLAY_PBT_ARTIFACTS"
          --overwrite
        )

        if [[ "$use_cache" == "true" ]]; then
          compare_args+=(--replay-cache latest --no-environment)
        else
          # Fall back to fresh record mode: start dd_environment first.
          ddev env start "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" || true
        fi

        log_path="$REPLAY_PBT_RESULT_DIR/compare_agent.log"
        ddev env compare-agent "${compare_args[@]}" 2>&1 | tee "$log_path"
        rc=${PIPESTATUS[0]}
        if [[ "$use_cache" != "true" ]]; then
          ddev env stop "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" || true
        fi
        python - <<PY > "$REPLAY_PBT_RESULT_DIR/result.json"
        import glob
        import json
        import os

        latest = None
        base = os.path.join(
            os.environ['REPLAY_PBT_ARTIFACTS'],
            os.environ['REPLAY_PBT_INTEGRATION'],
            os.environ['REPLAY_PBT_ENVIRONMENT'],
        )
        diff_files = sorted(glob.glob(os.path.join(base, '*', 'freeze.diff.json')))
        if diff_files:
            latest = os.path.dirname(diff_files[-1])
        else:
            candidates = sorted(path for path in glob.glob(os.path.join(base, '*')) if os.path.isdir(path))
            if candidates:
                latest = candidates[-1]

        diff_summary = {}
        if latest:
            for probe, fname in (
                ('freeze', 'freeze.diff.json'),
                ('inventory', 'inventory.diff.json'),
                ('check', 'check.diff.json'),
            ):
                path = os.path.join(latest, fname)
                if not os.path.isfile(path):
                    continue
                try:
                    with open(path) as f:
                        data = json.load(f)
                except Exception:
                    continue
                if probe == 'freeze':
                    diff_summary[probe] = {
                        'equal': data.get('equal'),
                        'added': data.get('added', []),
                        'removed': data.get('removed', []),
                        'changed_count': len(data.get('changed') or []),
                    }
                elif probe == 'inventory':
                    diff_summary[probe] = {
                        'equal': data.get('equal'),
                        'changed_check_names': data.get('changed_check_names', {}),
                    }
                elif probe == 'check':
                    metrics = data.get('metrics', {}) or {}
                    service_checks = data.get('service_checks', {}) or {}
                    diff_summary[probe] = {
                        'equal': data.get('equal'),
                        'metrics_added': metrics.get('added_total', 0),
                        'metrics_removed': metrics.get('removed_total', 0),
                        'service_checks_added': len(service_checks.get('added') or []),
                        'service_checks_removed': len(service_checks.get('removed') or []),
                    }

        result = {
            'runner': 'agent',
            'status': 'passed' if $rc == 0 else 'failed',
            'exit_code': $rc,
            'integration': os.environ['REPLAY_PBT_INTEGRATION'],
            'environment': os.environ['REPLAY_PBT_ENVIRONMENT'],
            'record_image': os.environ['REPLAY_PBT_RECORD_IMAGE'],
            'replay_image': os.environ['REPLAY_PBT_REPLAY_IMAGE'],
            'readings': os.environ['REPLAY_PBT_READINGS'],
            'target_ref': os.environ['REPLAY_PBT_TARGET_REF'],
            'batch_index': os.environ['REPLAY_PBT_BATCH_INDEX'],
            'batch_count': os.environ['REPLAY_PBT_BATCH_COUNT'],
            'cache_key': os.environ['REPLAY_PBT_CACHE_KEY'],
        }
        if diff_summary:
            result['diff_summary'] = diff_summary
        print(json.dumps(result, sort_keys=True))
        PY
        exit "$rc"

    - name: Save replay cache (agent runner only)
      if: success() && env.REPLAY_PBT_RUNNER == 'agent' && steps.seed-agent.outputs.seeded == 'true'
      uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Restore replay cache
      if: env.REPLAY_PBT_RUNNER != 'agent'
      id: replay-cache
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Probe or seed replay cache
      if: env.REPLAY_PBT_RUNNER != 'agent'
      id: prepare
      run: |
        set -euo pipefail
        mkdir -p "$REPLAY_PBT_RESULT_DIR"
        exec > >(tee "$REPLAY_PBT_RESULT_DIR/prepare.log") 2>&1
        result="$REPLAY_PBT_RESULT_DIR/result.json"

        if ddev env replay-pbt "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --fixture-ref "$REPLAY_PBT_FIXTURE_REF" \
          --target-ref "$REPLAY_PBT_TARGET_REF" \
          --replay-cache latest \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS" \
          --check-cache-only; then
          echo "run_pbt=true" >> "$GITHUB_OUTPUT"
          echo "cache_ready=true" >> "$GITHUB_OUTPUT"
          echo '{"status":"cache-hit"}' > "$result"
          exit 0
        fi

        if [[ "${{ inputs.seed_missing_caches }}" != "true" ]]; then
          echo "No suitable replay cache restored; skipping replay-backed validations because seed_missing_caches=false"
          echo "Running static asset/metadata validations that do not require a replay cache"
          ddev env replay-pbt "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
            --fixture-ref "$REPLAY_PBT_FIXTURE_REF" \
            --target-ref "$REPLAY_PBT_TARGET_REF" \
            --replay-cache latest \
            --property asset-query-metrics-in-metadata \
            --artifacts "$REPLAY_PBT_ARTIFACTS" \
            --overwrite || true
          echo "run_pbt=false" >> "$GITHUB_OUTPUT"
          echo "cache_ready=false" >> "$GITHUB_OUTPUT"
          python - <<PY > "$result"
        import json, os
        print(json.dumps({
            "status": "skipped-missing-cache",
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "batch_index": os.environ["REPLAY_PBT_BATCH_INDEX"],
            "batch_count": os.environ["REPLAY_PBT_BATCH_COUNT"],
        }, sort_keys=True))
        PY
          exit 0
        fi

        echo "No suitable replay cache restored; seeding from $REPLAY_PBT_FIXTURE_REF"
        bash .github/workflows/scripts/ensure-docker.sh
        ddev env compare-check "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --record-ref "$REPLAY_PBT_FIXTURE_REF" \
          --replay-ref "$REPLAY_PBT_TARGET_REF" \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS"

        echo "run_pbt=true" >> "$GITHUB_OUTPUT"
        echo "cache_ready=true" >> "$GITHUB_OUTPUT"
        echo '{"status":"seeded-cache"}' > "$result"

    - name: Run replay PBT
      if: env.REPLAY_PBT_RUNNER != 'agent' && steps.prepare.outputs.run_pbt == 'true'
      run: |
        set +e
        set -uo pipefail
        log_path="$REPLAY_PBT_RESULT_DIR/replay_pbt.log"
        ddev env replay-pbt "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --fixture-ref "$REPLAY_PBT_FIXTURE_REF" \
          --target-ref "$REPLAY_PBT_TARGET_REF" \
          --replay-cache latest \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS" \
          --artifacts "$REPLAY_PBT_ARTIFACTS" \
          --overwrite 2>&1 | tee "$log_path"
        rc=${PIPESTATUS[0]}
        set -e
        export REPLAY_PBT_EXIT_CODE="$rc"

        python - <<'PY' > "$REPLAY_PBT_RESULT_DIR/result.json"
        import json
        import os
        import re
        from pathlib import Path

        rc = int(os.environ['REPLAY_PBT_EXIT_CODE'])
        log_path = Path(os.environ['REPLAY_PBT_RESULT_DIR']) / 'replay_pbt.log'
        text = log_path.read_text(errors='replace') if log_path.is_file() else ''
        failed_tests = []
        short_errors = []
        for line in text.splitlines():
            if line.startswith('FAILED '):
                failed_tests.append(line.removeprefix('FAILED ').strip())
            elif 'AssertionError:' in line or 'Error:' in line or 'Traceback' in line:
                stripped = re.sub(r'\x1b\[[0-9;]*m', '', line).strip()
                if stripped and len(short_errors) < 20:
                    short_errors.append(stripped[:500])

        print(json.dumps({
            "status": "passed" if rc == 0 else "failed",
            "exit_code": rc,
            "failed_tests": failed_tests,
            "short_errors": short_errors,
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "batch_index": os.environ["REPLAY_PBT_BATCH_INDEX"],
            "batch_count": os.environ["REPLAY_PBT_BATCH_COUNT"],
        }, sort_keys=True))
        PY
        exit "$rc"

    - name: Save replay cache
      if: success() && steps.prepare.outputs.cache_ready == 'true' && steps.replay-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Record failure result
      if: failure()
      run: |
        mkdir -p "$REPLAY_PBT_RESULT_DIR"
        if [[ -f "$REPLAY_PBT_RESULT_DIR/result.json" ]] && python - <<'PY'
        import json
        import os
        from pathlib import Path

        result_path = Path(os.environ['REPLAY_PBT_RESULT_DIR']) / 'result.json'
        status = json.loads(result_path.read_text()).get('status')
        raise SystemExit(0 if status not in {'cache-hit', 'seeded-cache'} else 1)
        PY
        then
          echo "Preserving replay validation result written by failed command"
          exit 0
        fi
        python - <<'PY' > "$REPLAY_PBT_RESULT_DIR/result.json"
        import json
        import os
        import re
        from pathlib import Path

        log_path = Path(os.environ["REPLAY_PBT_RESULT_DIR"]) / "prepare.log"
        text = log_path.read_text(errors="replace") if log_path.is_file() else ""
        short_errors = []
        for line in text.splitlines():
            clean = re.sub(r'\x1b\[[0-9;]*m', '', line).strip()
            if not clean:
                continue
            lowered = clean.lower()
            if (
                "error:" in lowered
                or "traceback" in lowered
                or "failed" in lowered
                or "did not produce capture.json" in lowered
                or "unable to find a suitable replay cache" in lowered
            ):
                short_errors.append(clean[:500])
            if len(short_errors) >= 12:
                break

        print(json.dumps({
            "status": "failed-before-replay-pbt",
            "short_errors": short_errors,
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "batch_index": os.environ["REPLAY_PBT_BATCH_INDEX"],
            "batch_count": os.environ["REPLAY_PBT_BATCH_COUNT"],
        }, sort_keys=True))
        PY

    - name: Collect lightweight property artifacts
      if: always()
      run: |
        python - <<'PY'
        import json
        import os
        import shutil
        from pathlib import Path

        source_root = Path(os.environ['REPLAY_PBT_ARTIFACTS'])
        output_root = Path('/tmp/replay-pbt-findings')
        output_root.mkdir(parents=True, exist_ok=True)
        target = {
            'integration': os.environ['REPLAY_PBT_INTEGRATION'],
            'environment': os.environ['REPLAY_PBT_ENVIRONMENT'],
            'fixture_ref': os.environ['REPLAY_PBT_FIXTURE_REF'],
            'cache_key': os.environ['REPLAY_PBT_CACHE_KEY'],
            'mode': os.environ['REPLAY_PBT_MODE'],
            'readings': os.environ['REPLAY_PBT_READINGS'],
            'target_ref': os.environ['REPLAY_PBT_TARGET_REF'],
            'batch_index': os.environ['REPLAY_PBT_BATCH_INDEX'],
            'batch_count': os.environ['REPLAY_PBT_BATCH_COUNT'],
        }
        (output_root / 'target.json').write_text(json.dumps(target, indent=2, sort_keys=True) + '\n')

        if not source_root.is_dir():
            raise SystemExit(0)

        for manifest_path in source_root.glob('**/property-result.json'):
            rel_dir = manifest_path.parent.relative_to(source_root)
            out_dir = output_root / rel_dir
            out_dir.mkdir(parents=True, exist_ok=True)
            shutil.copy2(manifest_path, out_dir / manifest_path.name)
            try:
                manifest = json.loads(manifest_path.read_text())
            except Exception:
                continue
            for artifact in manifest.get('artifacts', []):
                # Defense in depth: only collect schema-known lightweight JSON
                # artifacts. Never copy arbitrary property artifact paths into
                # the cross-job summary inputs.
                if artifact.get('kind') not in {'findings', 'coverage', 'summary'} or artifact.get('format') != 'json':
                    continue
                rel_path = artifact.get('path')
                if not isinstance(rel_path, str) or rel_path.startswith('/') or '..' in Path(rel_path).parts:
                    continue
                source = manifest_path.parent / rel_path
                if not source.is_file():
                    continue
                destination = out_dir / rel_path
                destination.parent.mkdir(parents=True, exist_ok=True)
                shutil.copy2(source, destination)
        PY

    - name: Stage compare-agent diff bundle (agent runner only)
      if: env.REPLAY_PBT_RUNNER == 'agent' && always()
      run: |
        set -uo pipefail
        bundle="$REPLAY_PBT_RESULT_DIR/diffs"
        mkdir -p "$bundle"
        latest=$(find "$REPLAY_PBT_ARTIFACTS" -mindepth 3 -maxdepth 3 -type d 2>/dev/null | sort | tail -1 || true)
        if [[ -n "$latest" ]]; then
          for name in summary.md freeze.diff.json inventory.diff.json check.diff.json refs.json run_summary.json; do
            [[ -f "$latest/$name" ]] && cp "$latest/$name" "$bundle/" || true
          done
          [[ -f "$latest/record/freeze.txt" ]] && cp "$latest/record/freeze.txt" "$bundle/record.freeze.txt" || true
          [[ -f "$latest/replay/freeze.txt" ]] && cp "$latest/replay/freeze.txt" "$bundle/replay.freeze.txt" || true
        fi

    - name: Scan lightweight artifacts
      if: always()
      run: python .github/workflows/scripts/replay-pbt-secret-scan.py /tmp/replay-pbt-findings /tmp/replay-pbt-result

    - name: Build job report
      if: always()
      run: |
        python .github/workflows/scripts/replay-pbt-report.py \
          --results /tmp/replay-pbt-result \
          --findings /tmp/replay-pbt-findings \
          --out-dir /tmp/replay-pbt-job-report \
          --zip /tmp/replay-pbt-job-report.zip \
          --mode "${{ inputs.mode }}" \
          --batch "${{ inputs.batch_index }} of ${{ inputs.batch_count }}" \
          --target-count "1" \
          --artifact-name "replay-pbt-job-report-${{ matrix.artifact_slug }}" \
          | tee "$GITHUB_STEP_SUMMARY"

    - name: Scan job report
      if: always()
      run: python .github/workflows/scripts/replay-pbt-secret-scan.py /tmp/replay-pbt-job-report /tmp/replay-pbt-job-report.zip

    - name: Upload job report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-job-report-${{ matrix.artifact_slug }}
        path: /tmp/replay-pbt-job-report.zip
        if-no-files-found: warn
        retention-days: 1

    - name: Upload property findings
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-findings-${{ matrix.artifact_slug }}
        path: /tmp/replay-pbt-findings
        if-no-files-found: ignore
        retention-days: 1

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-result-${{ matrix.artifact_slug }}
        path: /tmp/replay-pbt-result
        if-no-files-found: warn
        retention-days: 1


  summarize:
    name: Collect replay validation results
    needs:
    - compute-matrix
    - replay-pbt
    if: ${{ !inputs.dispatch_batches && !inputs.combine_reports && always() && needs.compute-matrix.outputs.matrix != '[]' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Download result artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: replay-pbt-result-*
        path: replay-pbt-results
        merge-multiple: false

    - name: Download property finding artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: replay-pbt-findings-*
        path: replay-pbt-findings
        merge-multiple: false

    - name: Build Replay validation report
      run: |
        python .github/workflows/scripts/replay-pbt-report.py \
          --results replay-pbt-results \
          --findings replay-pbt-findings \
          --out-dir replay-pbt-report \
          --zip replay-pbt-report.zip \
          --mode "${{ inputs.mode }}" \
          --batch "${{ inputs.batch_index }} of ${{ inputs.batch_count }}" \
          --target-count "${{ needs.compute-matrix.outputs.count }}" \
          | tee "$GITHUB_STEP_SUMMARY"

    - name: Scan report bundle
      run: python .github/workflows/scripts/replay-pbt-secret-scan.py replay-pbt-report replay-pbt-report.zip

    - name: Upload report bundle
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-report
        path: replay-pbt-report.zip
        if-no-files-found: error
        retention-days: 1

  auto-combine:
    name: Dispatch combined Replay validation report
    needs:
    - summarize
    if: ${{ !inputs.dispatch_batches && !inputs.combine_reports && inputs.auto_combine && always() }}
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
    - name: Wait for sibling batches and dispatch combiner
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        RUN_GROUP: ${{ inputs.run_group }}
        EXPECTED_BATCHES: ${{ inputs.run_group_expected_batches }}
        WORKER_REF: ${{ github.ref_name }}
      with:
        script: |
          const runGroup = process.env.RUN_GROUP;
          const expected = Number(process.env.EXPECTED_BATCHES || '0');
          if (!runGroup || expected < 1) {
            core.info('No run_group or expected batch count; skipping auto-combine.');
            return;
          }
          const workflow_id = 'zz-test-worker-poc.yaml';
          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          const deadline = Date.now() + 4 * 60 * 60 * 1000;
          let matched = [];
          while (Date.now() < deadline) {
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id,
              branch: process.env.WORKER_REF,
              per_page: 100,
            });
            matched = response.data.workflow_runs.filter(run =>
              run.display_title &&
              run.display_title.includes(runGroup) &&
              run.display_title.includes('batch ') &&
              !run.display_title.includes('dispatch') &&
              !run.display_title.includes('combine')
            );
            core.info(`Found ${matched.length}/${expected} batch run(s) for ${runGroup}: ${matched.map(run => `${run.id}:${run.status}`).join(', ')}`);
            const completeEnough = matched.every(run => run.status === 'completed' || run.id === context.runId);
            if (matched.length >= expected && completeEnough) {
              break;
            }
            await sleep(60_000);
          }
          if (matched.length < expected || !matched.every(run => run.status === 'completed' || run.id === context.runId)) {
            throw new Error(`Timed out waiting for ${expected} completed batch runs for ${runGroup}`);
          }
          const runIds = matched
            .sort((a, b) => a.display_title.localeCompare(b.display_title))
            .map(run => String(run.id))
            .join(',');
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id,
            ref: process.env.WORKER_REF,
            inputs: {
              mode: 'all-declared',
              seed_missing_caches: 'false',
              target_ref: 'HEAD',
              base_ref: 'origin/master',
              max_targets: '1',
              allow_truncation: 'true',
              batch_index: '0',
              batch_count: '1',
              readings: '2',
              dispatch_batches: 'false',
              worker_ref: '',
              dry_run: 'false',
              batch_indices: '',
              run_group: runGroup,
              run_group_expected_batches: String(expected),
              auto_combine: 'false',
              combine_reports: 'true',
              report_run_ids: runIds,
            },
          });
          await core.summary
            .addHeading('Replay validation auto-combine')
            .addRaw(`Dispatched combiner for run group \`${runGroup}\`.\n\n`)
            .addTable([
              [
                {data: 'Batch run', header: true},
                {data: 'Conclusion', header: true},
                {data: 'Link', header: true},
              ],
              ...matched
                .sort((a, b) => a.display_title.localeCompare(b.display_title))
                .map(run => [
                  `\`${run.id}\` ${run.display_title}`,
                  `\`${run.conclusion || run.status}\``,
                  `<a href="${run.html_url}">Open batch</a>`,
                ]),
            ])
            .write();

  combine-reports:
    name: Combine Replay validation batch reports
    if: ${{ inputs.combine_reports }}
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Build combined Replay validation report
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        python .github/workflows/scripts/replay-pbt-combine-reports.py \
          --run-ids "${{ inputs.report_run_ids }}" \
          --out-dir replay-pbt-combined-report \
          --zip replay-pbt-combined-report.zip \
          --mode "${{ inputs.mode }}" \
          --run-group "${{ inputs.run_group }}" \
          | tee "$GITHUB_STEP_SUMMARY"

    - name: Scan combined report bundle
      run: python .github/workflows/scripts/replay-pbt-secret-scan.py replay-pbt-combined-report replay-pbt-combined-report.zip

    - name: Upload combined report bundle
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-combined-report
        path: replay-pbt-combined-report.zip
        if-no-files-found: error
        retention-days: 1
