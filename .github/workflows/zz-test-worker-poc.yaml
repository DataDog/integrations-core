name: Replay PBT POC
run-name: >-
  Replay PBT POC / ${{ inputs.mode }} /
  shard ${{ inputs.shard_index }} of ${{ inputs.shard_count }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which integration/env targets to include
        required: true
        default: all-declared
        type: choice
        options:
        - changed
        - all-cached
        - all-declared
      seed_missing_caches:
        description: Start E2E envs and seed compare-check caches when no suitable cache is restored
        required: true
        default: false
        type: boolean
      target_ref:
        description: Git ref under test
        required: true
        default: HEAD
        type: string
      base_ref:
        description: Base ref for mode=changed
        required: true
        default: origin/master
        type: string
      max_targets:
        description: Maximum targets in this dispatch after sharding
        required: true
        default: 200
        type: number
      allow_truncation:
        description: Allow dropping targets after max_targets. Keep false for full coverage runs.
        required: true
        default: false
        type: boolean
      shard_index:
        description: Zero-based shard index
        required: true
        default: 0
        type: number
      shard_count:
        description: Total shard count
        required: true
        default: 1
        type: number
      readings:
        description: Number of check readings to replay
        required: true
        default: 2
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.mode }}-${{ inputs.shard_index }}-${{ inputs.shard_count }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  compute-matrix:
    name: Compute replay-PBT matrix
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      count: ${{ steps.count.outputs.count }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Validate workflow inputs
      run: |
        python - <<'PY'
        import os
        import re
        import sys

        values = {
            'base_ref': os.environ['BASE_REF'],
            'target_ref': os.environ['TARGET_REF'],
        }
        pattern = re.compile(r'^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$')
        for name, value in values.items():
            if not pattern.fullmatch(value) or '..' in value or value.endswith('/'):
                print(f'Invalid {name}: {value!r}', file=sys.stderr)
                sys.exit(2)
        PY
      env:
        BASE_REF: ${{ inputs.base_ref }}
        TARGET_REF: ${{ inputs.target_ref }}

    - name: Fetch base ref for changed mode
      if: inputs.mode == 'changed'
      run: git fetch --no-tags --filter=blob:none origin "$BASE_REF"
      env:
        BASE_REF: ${{ inputs.base_ref }}

    - name: Compute matrix
      id: compute
      run: |
        extra_args=()
        if [[ "${{ inputs.allow_truncation }}" == "true" ]]; then
          extra_args+=(--allow-truncation)
        fi

        python .github/workflows/scripts/replay-pbt-matrix.py \
          --mode "${{ inputs.mode }}" \
          --ref "${{ inputs.base_ref }}" \
          --target-ref "${{ inputs.target_ref }}" \
          --readings "${{ inputs.readings }}" \
          --max-targets "${{ inputs.max_targets }}" \
          --shard-index "${{ inputs.shard_index }}" \
          --shard-count "${{ inputs.shard_count }}" \
          "${extra_args[@]}" \
          > /tmp/replay-pbt-matrix.json
        cat /tmp/replay-pbt-matrix.json
        echo "matrix=$(cat /tmp/replay-pbt-matrix.json)" >> "$GITHUB_OUTPUT"

    - name: Count targets
      id: count
      run: |
        count=$(python - <<'PY'
        import json
        print(len(json.load(open('/tmp/replay-pbt-matrix.json'))))
        PY
        )
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "Replay PBT target count: $count"

    - name: Upload matrix
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-matrix
        path: /tmp/replay-pbt-matrix.json

  replay-pbt:
    name: ${{ matrix.name }}
    needs: compute-matrix
    if: needs.compute-matrix.outputs.matrix != '[]'
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    permissions:
      contents: read
    env:
      REPLAY_PBT_INTEGRATION: ${{ matrix.integration }}
      REPLAY_PBT_ENVIRONMENT: ${{ matrix.environment }}
      REPLAY_PBT_FIXTURE_REF: ${{ matrix.fixture_ref }}
      REPLAY_PBT_TARGET_REF: ${{ matrix.target_ref }}
      REPLAY_PBT_READINGS: ${{ matrix.readings }}
      REPLAY_PBT_CACHE_KEY: ${{ matrix.cache_key }}
      REPLAY_PBT_ARTIFACT_SLUG: ${{ matrix.artifact_slug }}
      REPLAY_PBT_MODE: ${{ inputs.mode }}
      REPLAY_PBT_SHARD_INDEX: ${{ inputs.shard_index }}
      REPLAY_PBT_SHARD_COUNT: ${{ inputs.shard_count }}
      REPLAY_PBT_RESULT_DIR: /tmp/replay-pbt-result
      REPLAY_PBT_ARTIFACTS: /tmp/replay-pbt-artifacts
      REPLAY_PBT_ADAPTERS: requests,subprocess,process,psycopg
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install workflow scripts
      uses: ./.github/actions/setup-test-target-scripts

    - name: Install ddev from local folder
      uses: ./.github/actions/setup-ddev
      with:
        install-mode: local
        cache-profile: local-ddev-base

    - name: Configure ddev
      run: |
        ddev config set upgrade_check false
        ddev config set repos.core .
        ddev config set repo core

    - name: Restore replay cache
      id: replay-cache
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Probe or seed replay cache
      id: prepare
      run: |
        set -euo pipefail
        mkdir -p "$REPLAY_PBT_RESULT_DIR"
        result="$REPLAY_PBT_RESULT_DIR/result.json"

        if ddev env replay-pbt "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --fixture-ref "$REPLAY_PBT_FIXTURE_REF" \
          --target-ref "$REPLAY_PBT_TARGET_REF" \
          --replay-cache latest \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS" \
          --check-cache-only; then
          echo "run_pbt=true" >> "$GITHUB_OUTPUT"
          echo "cache_ready=true" >> "$GITHUB_OUTPUT"
          echo '{"status":"cache-hit"}' > "$result"
          exit 0
        fi

        if [[ "${{ inputs.seed_missing_caches }}" != "true" ]]; then
          echo "No suitable replay cache restored; skipping target because seed_missing_caches=false"
          echo "run_pbt=false" >> "$GITHUB_OUTPUT"
          echo "cache_ready=false" >> "$GITHUB_OUTPUT"
          python - <<PY > "$result"
        import json, os
        print(json.dumps({
            "status": "skipped-missing-cache",
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "shard_index": os.environ["REPLAY_PBT_SHARD_INDEX"],
            "shard_count": os.environ["REPLAY_PBT_SHARD_COUNT"],
        }, sort_keys=True))
        PY
          exit 0
        fi

        echo "No suitable replay cache restored; seeding from $REPLAY_PBT_FIXTURE_REF"
        bash .github/workflows/scripts/ensure-docker.sh
        ddev ci setup "$REPLAY_PBT_INTEGRATION:$REPLAY_PBT_ENVIRONMENT"
        ddev env compare-check "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --record-ref "$REPLAY_PBT_FIXTURE_REF" \
          --replay-ref "$REPLAY_PBT_TARGET_REF" \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS"

        echo "run_pbt=true" >> "$GITHUB_OUTPUT"
        echo "cache_ready=true" >> "$GITHUB_OUTPUT"
        echo '{"status":"seeded-cache"}' > "$result"

    - name: Run replay PBT
      if: steps.prepare.outputs.run_pbt == 'true'
      run: |
        set +e
        set -uo pipefail
        log_path="$REPLAY_PBT_RESULT_DIR/replay-pbt.log"
        ddev env replay-pbt "$REPLAY_PBT_INTEGRATION" "$REPLAY_PBT_ENVIRONMENT" \
          --fixture-ref "$REPLAY_PBT_FIXTURE_REF" \
          --target-ref "$REPLAY_PBT_TARGET_REF" \
          --replay-cache latest \
          --readings "$REPLAY_PBT_READINGS" \
          --adapters "$REPLAY_PBT_ADAPTERS" \
          --artifacts "$REPLAY_PBT_ARTIFACTS" \
          --overwrite 2>&1 | tee "$log_path"
        rc=${PIPESTATUS[0]}
        set -e
        export REPLAY_PBT_EXIT_CODE="$rc"

        python - <<'PY' > "$REPLAY_PBT_RESULT_DIR/result.json"
        import json
        import os
        import re
        from pathlib import Path

        rc = int(os.environ['REPLAY_PBT_EXIT_CODE'])
        log_path = Path(os.environ['REPLAY_PBT_RESULT_DIR']) / 'replay-pbt.log'
        text = log_path.read_text(errors='replace') if log_path.is_file() else ''
        failed_tests = []
        short_errors = []
        for line in text.splitlines():
            if line.startswith('FAILED '):
                failed_tests.append(line.removeprefix('FAILED ').strip())
            elif 'AssertionError:' in line or 'Error:' in line or 'Traceback' in line:
                stripped = re.sub(r'\x1b\[[0-9;]*m', '', line).strip()
                if stripped and len(short_errors) < 20:
                    short_errors.append(stripped[:500])

        print(json.dumps({
            "status": "passed" if rc == 0 else "failed",
            "exit_code": rc,
            "failed_tests": failed_tests,
            "short_errors": short_errors,
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "shard_index": os.environ["REPLAY_PBT_SHARD_INDEX"],
            "shard_count": os.environ["REPLAY_PBT_SHARD_COUNT"],
        }, sort_keys=True))
        PY
        exit "$rc"

    - name: Save replay cache
      if: success() && steps.prepare.outputs.cache_ready == 'true' && steps.replay-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        key: ${{ matrix.cache_key }}

    - name: Record failure result
      if: failure()
      run: |
        mkdir -p "$REPLAY_PBT_RESULT_DIR"
        if [[ -f "$REPLAY_PBT_RESULT_DIR/result.json" ]] && python - <<'PY'
        import json
        import os
        from pathlib import Path

        result_path = Path(os.environ['REPLAY_PBT_RESULT_DIR']) / 'result.json'
        status = json.loads(result_path.read_text()).get('status')
        raise SystemExit(0 if status not in {'cache-hit', 'seeded-cache'} else 1)
        PY
        then
          echo "Preserving replay-PBT result written by failed command"
          exit 0
        fi
        python - <<'PY' > "$REPLAY_PBT_RESULT_DIR/result.json"
        import json, os
        print(json.dumps({
            "status": "failed-before-replay-pbt",
            "integration": os.environ["REPLAY_PBT_INTEGRATION"],
            "environment": os.environ["REPLAY_PBT_ENVIRONMENT"],
            "fixture_ref": os.environ["REPLAY_PBT_FIXTURE_REF"],
            "cache_key": os.environ["REPLAY_PBT_CACHE_KEY"],
            "mode": os.environ["REPLAY_PBT_MODE"],
            "readings": os.environ["REPLAY_PBT_READINGS"],
            "target_ref": os.environ["REPLAY_PBT_TARGET_REF"],
            "shard_index": os.environ["REPLAY_PBT_SHARD_INDEX"],
            "shard_count": os.environ["REPLAY_PBT_SHARD_COUNT"],
        }, sort_keys=True))
        PY

    - name: Collect lightweight property artifacts
      if: always()
      run: |
        python - <<'PY'
        import json
        import os
        import shutil
        from pathlib import Path

        source_root = Path(os.environ['REPLAY_PBT_ARTIFACTS'])
        output_root = Path('/tmp/replay-pbt-findings')
        output_root.mkdir(parents=True, exist_ok=True)
        target = {
            'integration': os.environ['REPLAY_PBT_INTEGRATION'],
            'environment': os.environ['REPLAY_PBT_ENVIRONMENT'],
            'fixture_ref': os.environ['REPLAY_PBT_FIXTURE_REF'],
            'cache_key': os.environ['REPLAY_PBT_CACHE_KEY'],
            'mode': os.environ['REPLAY_PBT_MODE'],
            'readings': os.environ['REPLAY_PBT_READINGS'],
            'target_ref': os.environ['REPLAY_PBT_TARGET_REF'],
            'shard_index': os.environ['REPLAY_PBT_SHARD_INDEX'],
            'shard_count': os.environ['REPLAY_PBT_SHARD_COUNT'],
        }
        (output_root / 'target.json').write_text(json.dumps(target, indent=2, sort_keys=True) + '\n')

        if not source_root.is_dir():
            raise SystemExit(0)

        for manifest_path in source_root.glob('**/property-result.json'):
            rel_dir = manifest_path.parent.relative_to(source_root)
            out_dir = output_root / rel_dir
            out_dir.mkdir(parents=True, exist_ok=True)
            shutil.copy2(manifest_path, out_dir / manifest_path.name)
            try:
                manifest = json.loads(manifest_path.read_text())
            except Exception:
                continue
            for artifact in manifest.get('artifacts', []):
                rel_path = artifact.get('path')
                if not isinstance(rel_path, str) or rel_path.startswith('/') or '..' in Path(rel_path).parts:
                    continue
                source = manifest_path.parent / rel_path
                if not source.is_file():
                    continue
                destination = out_dir / rel_path
                destination.parent.mkdir(parents=True, exist_ok=True)
                shutil.copy2(source, destination)
        PY

    - name: Upload property findings
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-findings-${{ matrix.artifact_slug }}
        path: /tmp/replay-pbt-findings
        if-no-files-found: ignore

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-result-${{ matrix.artifact_slug }}
        path: /tmp/replay-pbt-result
        if-no-files-found: warn

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-artifacts-${{ matrix.artifact_slug }}
        path: |
          /tmp/replay-pbt-artifacts
          .ddev/replay/${{ matrix.integration }}/${{ matrix.environment }}
        if-no-files-found: ignore

  summarize:
    name: Collect replay-PBT results
    needs:
    - compute-matrix
    - replay-pbt
    if: always() && needs.compute-matrix.outputs.matrix != '[]'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    - name: Download result artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: replay-pbt-result-*
        path: replay-pbt-results
        merge-multiple: false

    - name: Download property finding artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: replay-pbt-findings-*
        path: replay-pbt-findings
        merge-multiple: false

    - name: Build result table
      run: |
        python - <<'PY' | tee "$GITHUB_STEP_SUMMARY"
        import json
        from collections import Counter
        from pathlib import Path

        rows = []
        for path in Path('replay-pbt-results').glob('**/result.json'):
            rows.append(json.loads(path.read_text()))
        rows.sort(
            key=lambda row: (
                row.get('status', ''),
                row.get('integration', ''),
                row.get('environment', ''),
            )
        )
        counts = Counter(row.get('status', 'unknown') for row in rows)
        Path('replay-pbt-summary.json').write_text(json.dumps(rows, indent=2, sort_keys=True) + '\n')
        tsv_columns = (
            'status',
            'mode',
            'integration',
            'environment',
            'fixture_ref',
            'target_ref',
            'readings',
            'exit_code',
            'failed_tests',
            'short_errors',
            'shard_index',
            'shard_count',
            'cache_key',
        )
        with Path('replay-pbt-summary.tsv').open('w') as f:
            f.write('\t'.join(tsv_columns) + '\n')
            for row in rows:
                f.write('\t'.join(str(row.get(key, '')) for key in tsv_columns) + '\n')

        print('# Replay PBT summary')
        print()
        print(f'- Mode: ${{ inputs.mode }}')
        print(f'- Shard: ${{ inputs.shard_index }} of ${{ inputs.shard_count }}')
        print(f'- Targets in matrix: ${{ needs.compute-matrix.outputs.count }}')
        print(f'- Result files collected: {len(rows)}')
        for status, count in sorted(counts.items()):
            print(f'- {status}: {count}')
        print()
        print('## Results')
        print()
        print('| status | mode | integration | environment | fixture ref | target ref | failures |')
        print('|---|---|---|---|---|---|---|')
        for row in rows:
            print(
                f"| {row.get('status', '')} | {row.get('mode', '')} | "
                f"{row.get('integration', '')} | {row.get('environment', '')} | "
                f"{row.get('fixture_ref', '')} | {row.get('target_ref', '')} | "
                f"{'<br>'.join(row.get('failed_tests') or row.get('short_errors') or [])[:1000]} |"
            )
        PY

    - name: Build property findings table
      run: |
        python - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
        import csv
        import json
        from pathlib import Path

        root = Path('replay-pbt-findings')

        def load_json(path):
            try:
                return json.loads(path.read_text())
            except Exception:
                return None

        def find_target(path):
            for parent in [path, *path.parents]:
                target_path = parent / 'target.json'
                if target_path.is_file():
                    target = load_json(target_path)
                    if isinstance(target, dict):
                        return target
            return {}

        property_results = []
        findings = []
        coverages = []

        for manifest_path in sorted(root.glob('**/property-result.json')):
            manifest = load_json(manifest_path)
            if not isinstance(manifest, dict):
                continue
            target = find_target(manifest_path.parent)
            property_name = manifest.get('property') or manifest_path.parent.name
            property_results.append({**target, **manifest})
            for artifact in manifest.get('artifacts', []):
                if not isinstance(artifact, dict):
                    continue
                rel_path = artifact.get('path')
                kind = artifact.get('kind')
                if not isinstance(rel_path, str) or rel_path.startswith('/') or '..' in Path(rel_path).parts:
                    continue
                artifact_path = manifest_path.parent / rel_path
                if not artifact_path.is_file():
                    continue
                data = load_json(artifact_path) if artifact.get('format') == 'json' else None
                if kind == 'findings' and isinstance(data, list):
                    for finding in data:
                        if isinstance(finding, dict):
                            findings.append({**target, 'property': property_name, **finding})
                elif kind == 'coverage' and isinstance(data, dict):
                    observed = data.get('observed_to_emitted') or {}
                    supported = data.get('supported_to_emitted') or {}
                    coverages.append(
                        {
                            **target,
                            'property': property_name,
                            'observed_count': observed.get('observed_count'),
                            'observed_covered_count': observed.get('covered_count'),
                            'observed_missing_count': observed.get('missing_count'),
                            'observed_coverage': observed.get('coverage'),
                            'supported_count': supported.get('supported_count'),
                            'supported_emitted_count': supported.get('emitted_count'),
                            'supported_unemitted_count': supported.get('unemitted_count'),
                            'supported_coverage': supported.get('coverage'),
                        }
                    )

        Path('replay-pbt-property-results.json').write_text(json.dumps(property_results, indent=2, sort_keys=True) + '\n')
        Path('replay-pbt-findings.json').write_text(json.dumps(findings, indent=2, sort_keys=True) + '\n')
        Path('replay-pbt-coverage-summary.json').write_text(json.dumps(coverages, indent=2, sort_keys=True) + '\n')

        finding_columns = ('level', 'property', 'check', 'integration', 'environment', 'metric', 'tag_key', 'path', 'message', 'query')
        with Path('replay-pbt-findings.tsv').open('w', newline='') as f:
            writer = csv.DictWriter(f, fieldnames=finding_columns, delimiter='\t', extrasaction='ignore')
            writer.writeheader()
            writer.writerows(findings)

        coverage_columns = (
            'property',
            'integration',
            'environment',
            'observed_count',
            'observed_covered_count',
            'observed_missing_count',
            'observed_coverage',
            'supported_count',
            'supported_emitted_count',
            'supported_unemitted_count',
            'supported_coverage',
        )
        with Path('replay-pbt-coverage-summary.tsv').open('w', newline='') as f:
            writer = csv.DictWriter(f, fieldnames=coverage_columns, delimiter='\t', extrasaction='ignore')
            writer.writeheader()
            writer.writerows(coverages)

        lines = ['# Replay PBT property findings', '']
        if not findings:
            lines.append('No findings reported by property artifacts.')
        else:
            for finding in findings[:200]:
                lines.append(
                    f"- **{finding.get('level', '').upper()}** `{finding.get('property', '')}` "
                    f"{finding.get('integration', '')}:{finding.get('environment', '')} — "
                    f"{finding.get('message', '')}"
                )
                if finding.get('metric'):
                    lines.append(f"  - metric: `{finding['metric']}`")
                if finding.get('tag_key'):
                    lines.append(f"  - tag key: `{finding['tag_key']}`")
                if finding.get('path'):
                    lines.append(f"  - path: `{finding['path']}`")
            if len(findings) > 200:
                lines.append(f"- ... {len(findings) - 200} more findings")
        Path('replay-pbt-findings.md').write_text('\n'.join(lines) + '\n')

        print('\n# Replay PBT property artifact summary')
        print()
        print(f'- Property result manifests collected: {len(property_results)}')
        print(f'- Findings collected: {len(findings)}')
        print(f'- Coverage reports collected: {len(coverages)}')
        PY

    - name: Upload summary artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: replay-pbt-summary
        path: |
          replay-pbt-summary.json
          replay-pbt-summary.tsv
          replay-pbt-property-results.json
          replay-pbt-findings.json
          replay-pbt-findings.tsv
          replay-pbt-findings.md
          replay-pbt-coverage-summary.json
          replay-pbt-coverage-summary.tsv
        if-no-files-found: error
