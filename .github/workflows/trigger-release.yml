name: Trigger Wheel Builds

# Thin wrapper — all tagging and dispatch logic lives in dispatch-release.yml.
# The pipeline can build wheels for any Python package in the repo.

on:
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+.x"
    paths:
      - "*/CHANGELOG.md"
      - "*/src/datadog_checks/*/__about__.py"
  workflow_dispatch:
    inputs:
      packages:
        description: >-
          Packages to release. JSON array (e.g. '["postgres","datadog_checks_base"]'),
          'all' to release every Python package in the repo, or omit to auto-detect from new tags.
        required: false
        type: string
      source-repo-ref:
        description: "Commit SHA or ref to build from"
        required: true
        type: string
      target:
        description: "Target environment (dev or prod)"
        required: false
        type: choice
        options:
          - dev
          - prod
        default: dev
      dry-run:
        description: "Print what would be released without pushing tags or starting builds"
        required: false
        type: boolean
        default: false
      ddev-version:
        description: "ddev version specifier (e.g. ==14.3.2). Defaults to latest."
        required: false
        type: string

jobs:
  dispatch:
    name: Release
    uses: ./.github/workflows/dispatch-release.yml
    with:
      source-repo: integrations-core
      packages: ${{ inputs.packages || '' }}
      source-repo-ref: ${{ inputs.source-repo-ref || github.sha }}
      target: ${{ inputs.target || 'dev' }} # TODO: switch default to prod once the new pipeline is validated
      dry-run: ${{ inputs.dry-run || false }}
      ddev-version: ${{ inputs.ddev-version || '' }}
    permissions:
      id-token: write
      contents: write
