name: Trigger Wheel Builds

# Thin wrapper — all tagging and dispatch logic lives in dispatch-release.yml.

on:
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+.x"
  workflow_dispatch:
    inputs:
      integrations:
        description: "JSON array of integration names (optional — auto-detected if omitted)"
        required: false
        type: string
      source-repo-ref:
        description: "Commit SHA or ref to build from"
        required: true
        type: string
  pull_request:

jobs:
  dispatch:
    uses: ./.github/workflows/dispatch-release.yml
    with:
      source-repo: integrations-core
      integrations: ${{ inputs.integrations || '' }}
      source-repo-ref: ${{ inputs.source-repo-ref || github.sha }}
    permissions:
      id-token: write
      contents: write
