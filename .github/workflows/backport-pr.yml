name: Backport PR
on:
  pull_request_target:
    types:
      - closed
      - labeled

jobs:
  backport:
    name: Backport PR
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC token federation with dd-octo-sts
      contents: read
    if: >
      github.event.pull_request.merged
      && (
        github.event.action == 'closed'
        || (
          github.event.action == 'labeled'
          && contains(github.event.label.name, 'backport')
        )
      )
    steps:
      - name: Get GitHub token via dd-octo-sts
        uses: DataDog/dd-octo-sts-action@acaa02eee7e3bb0839e4272dacb37b8f3b58ba80 # v1.0.3
        id: octo-sts
        with:
          scope: DataDog/integrations-core
          policy: self.backport.pull-request-target
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Backport to release branches
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          EVENT_ACTION: ${{ github.event.action }}
          ADDED_LABEL: ${{ github.event.label.name }}
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: .github/workflows/scripts/backport.sh
