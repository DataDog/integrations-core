name: Dispatch Release

on:
  workflow_call:
    inputs:
      source-repo:
        description: "Source repo name (integrations-extras or marketplace)"
        required: false
        type: string
      integrations:
        description: >-
          Integration list to release. Accepts a JSON array (e.g. '["postgres","mysql"]'),
          'all' to release every integration in the repo, or omit to auto-detect from new tags.
        required: false
        type: string
      source-repo-ref:
        description: "Commit SHA or ref to build from"
        required: false
        type: string
      target:
        description: "Target environment (dev = no tag push, dev S3; prod = push tags, prod S3)"
        required: false
        type: string
        default: dev # TODO: switch default to prod once the new pipeline is validated

permissions:
  id-token: write
  contents: write # ddev needs to push tags

jobs:
  dispatch:
    name: Tag releases and dispatch wheel builds
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # ddev needs full tag history

      - name: Install ddev
        run: pip install ddev==14.3.2

      - name: Tag releases
        if: inputs.integrations == ''
        id: tag
        env:
          TARGET: ${{ inputs.target }}
        run: python .github/workflows/scripts/tag-releases.py

      - name: Detect integration list
        if: inputs.integrations != '' || steps.tag.outcome == 'success'
        id: detect
        env:
          MANUAL_INTEGRATIONS: ${{ inputs.integrations }}
        run: python .github/workflows/scripts/detect-integrations.py

      - name: Get GitHub token via dd-octo-sts
        if: >-
          steps.detect.outputs.integrations != '' &&
          steps.detect.outputs.integrations != '[]'
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@08f2144903ced3254a3dafec2592563409ba2aa0 # v1.0.1
        with:
          scope: DataDog/agent-integration-wheels-release
          policy: integrations-core.dispatch-wheel-builds

      - name: Dispatch release
        if: >-
          steps.detect.outputs.integrations != '' &&
          steps.detect.outputs.integrations != '[]'
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          INTEGRATIONS: ${{ steps.detect.outputs.integrations }}
          SOURCE_REPO: ${{ inputs.source-repo || 'integrations-core' }}
          REF: ${{ inputs.source-repo-ref || github.sha }}
          TARGET: ${{ inputs.target }}
        run: python .github/workflows/scripts/dispatch-release.py
