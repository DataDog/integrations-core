name: TEST Release dry run (all packages)

# Validates the full release pipeline end-to-end without pushing tags or
# triggering wheel builds. Remove this workflow once the pipeline is validated.
# Runs inline (no environment gate) because dry-run never touches prod.

on:
  pull_request:
    paths:
      - ".github/workflows/scripts/**"
      - ".github/workflows/dispatch-release.yml"
      - ".github/workflows/trigger-release.yml"

jobs:
  dry-run:
    name: Dry run
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install ddev
        run: pip install ddev

      - name: Configure ddev
        run: |
          ddev config set upgrade_check false
          ddev config set repos.core .
          ddev config set repo core

      - name: Tag releases
        id: tag
        env:
          TARGET: dev
          DRY_RUN: "true"
          MANUAL_PACKAGES: "all"
        run: python .github/workflows/scripts/tag_releases.py

      - name: Detect package list
        if: steps.tag.outcome == 'success'
        id: detect
        env:
          MANUAL_PACKAGES: "all"
        run: python .github/workflows/scripts/detect_packages.py

      - name: Validate release readiness
        if: steps.detect.outputs.has_packages == 'true'
        env:
          PACKAGES: ${{ steps.detect.outputs.packages }}
          SOURCE_REPO: integrations-core
          REF: ${{ github.event.pull_request.head.sha }}
          TARGET: dev
          DRY_RUN: "true"
          MODE: ${{ steps.detect.outputs.mode }}
        run: python .github/workflows/scripts/validate_release.py

      - name: Dispatch release
        if: steps.detect.outputs.has_packages == 'true'
        env:
          PACKAGES: ${{ steps.detect.outputs.packages }}
          SOURCE_REPO: integrations-core
          REF: ${{ github.event.pull_request.head.sha }}
          TARGET: dev
          DRY_RUN: "true"
        run: python .github/workflows/scripts/dispatch_release.py
