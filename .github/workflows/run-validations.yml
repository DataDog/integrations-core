name: Run validations

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string

      ddev-version:
        required: false
        type: string
      agent-reqs:
        required: false
        default: false
        type: boolean
      ci:
        required: false
        default: false
        type: boolean
      codeowners:
        required: false
        default: false
        type: boolean
      config:
        required: false
        default: false
        type: boolean
      dashboards:
        required: false
        default: false
        type: boolean
      dep:
        required: false
        default: false
        type: boolean
      eula:
        required: false
        default: false
        type: boolean
      http:
        required: false
        default: false
        type: boolean
      imports:
        required: false
        default: false
        type: boolean
      integration-style:
        required: false
        default: false
        type: boolean
      jmx-metrics:
        required: false
        default: false
        type: boolean
      labeler:
        required: false
        default: false
        type: boolean
      legacy-signature:
        required: false
        default: false
        type: boolean
      license-headers:
        required: false
        default: false
        type: boolean
      licenses:
        required: false
        default: false
        type: boolean
      metadata:
        required: false
        default: false
        type: boolean
      models:
        required: false
        default: false
        type: boolean
      openmetrics:
        required: false
        default: false
        type: boolean
      package:
        required: false
        default: false
        type: boolean
      readmes:
        required: false
        default: false
        type: boolean
      saved-views:
        required: false
        default: false
        type: boolean
      service-checks:
        required: false
        default: false
        type: boolean
      typos:
        required: false
        default: false
        type: boolean
      version:
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  run:
    name: Validate
    # Avoid blocking merge queues by validations that can break with false positives
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.13"
      TARGET: ${{ github.event_name == 'pull_request' && 'changed' || '' }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: "0"

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "${{ env.PYTHON_VERSION }}"

    - name: Install ddev from local folder
      if: inputs.repo == 'core'
      run: |-
        pip install -e ./datadog_checks_dev[cli]
        pip install -e ./ddev

    - name: Install ddev from PyPI
      if: inputs.repo != 'core'
      # When ddev version is empty we install the latest released ddev.
      run: pip install ddev${{ inputs.ddev-version }}

    - name: Configure ddev
      run: |
        ddev config set upgrade_check false
        ddev config set repos.${{ inputs.repo }} .
        ddev config set repo ${{ inputs.repo }}
        ddev config set orgs.ci.dd_url "https://app.datadoghq.com"
        ddev config set org ci

    - name: Validate Agent integration version requirements
      if: ${{ !cancelled() && inputs.agent-reqs }}
      run: ddev validate agent-reqs $TARGET

    - name: Validate CI configuration
      if: ${{ !cancelled() && inputs.ci }}
      run: ddev validate ci

    - name: Validate default configuration files
      if: ${{ !cancelled() && inputs.config }}
      run: ddev validate config $TARGET

    - name: Validate dashboards
      if: ${{ !cancelled() && inputs.dashboards }}
      run: ddev validate dashboards $TARGET

    - name: Validate dependencies
      if: ${{ !cancelled() && inputs.dep }}
      run: ddev validate dep

    - name: Validate EULA files
      if: ${{ !cancelled() && inputs.eula }}
      run: ddev validate eula $TARGET

    - name: Validate usage of HTTP(S) utilities
      if: ${{ !cancelled() && inputs.http }}
      run: ddev validate http $TARGET

    - name: Validate proper modern importing of core packages
      if: ${{ !cancelled() && inputs.imports }}
      run: ddev validate imports $TARGET

    - name: Validate coding conventions
      if: ${{ !cancelled() && inputs.integration-style }}
      run: ddev validate integration-style $TARGET

    - name: Validate default JMX metric files
      if: ${{ !cancelled() && inputs.jmx-metrics }}
      run: ddev validate jmx-metrics $TARGET

    - name: Validate signatures of check classes
      if: ${{ !cancelled() && inputs.legacy-signature }}
      run: ddev validate legacy-signature $TARGET

    - name: Validate all shipped files have license headers
      if: ${{ !cancelled() && inputs.license-headers }}
      run: ddev validate license-headers $TARGET

    - name: Validate metric metadata
      if: ${{ !cancelled() && inputs.metadata }}
      run: ddev validate metadata $TARGET

    - name: Validate configuration models
      if: ${{ !cancelled() && inputs.models }}
      run: ddev validate models $TARGET

    - name: Validate openmetrics metric limit
      if: ${{ !cancelled() && inputs.openmetrics }}
      run: ddev validate openmetrics $TARGET

    - name: Validate Python project metadata
      if: ${{ !cancelled() && inputs.package }}
      run: ddev validate package $TARGET

    - name: Validate README files
      if: ${{ !cancelled() && inputs.readmes }}
      run: ddev validate readmes $TARGET

    - name: Validate saved views
      if: ${{ !cancelled() && inputs.saved-views }}
      run: ddev validate saved-views $TARGET

    - name: Validate service check metadata
      if: ${{ !cancelled() && inputs.service-checks }}
      run: ddev validate service-checks $TARGET

    - name: Validate spelling
      if: ${{ !cancelled() && inputs.typos }}
      run: ddev validate typos $TARGET

    - name: Validate labeler configuration
      if: ${{ !cancelled() && inputs.labeler }}
      run: ddev validate labeler

    - name: Validate target version
      if: ${{ !cancelled() && inputs.version }}
      run: ddev validate version $TARGET

    # Every validation below here is sorted by increasing runtime rather than alphabetically
    - name: Validate third-party license metadata
      if: ${{ !cancelled() && inputs.licenses }}
      env:
        DD_GITHUB_USER: "${{ github.actor }}"
        DD_GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      run: ddev validate licenses

    - name: Validate the CODEOWNERS file
      if: ${{ !cancelled() && inputs.codeowners }}
      run: ddev validate codeowners

    # Auto-fix: re-checkout the PR branch, run fixable validators with --sync/--fix,
    # commit and push if anything changed. Same-repo PRs only (forks lack push access).
    - name: Checkout PR branch for auto-fix
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: "0"

    - name: Re-configure ddev for auto-fix
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      run: |
        ddev config set upgrade_check false
        ddev config set repos.${{ inputs.repo }} .
        ddev config set repo ${{ inputs.repo }}

    - name: Auto-fix validation issues
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      run: |
        ddev validate ci --sync || true
        ddev validate config $TARGET --sync || true
        ddev validate dashboards $TARGET --fix || true
        ddev validate labeler --sync || true
        ddev validate license-headers $TARGET --fix || true
        ddev validate metadata $TARGET --sync || true
        ddev validate models $TARGET --sync || true
        ddev validate service-checks $TARGET --sync || true
        ddev validate typos $TARGET --fix || true

    - name: Push auto-fixes
      id: push-fixes
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      run: |
        if git diff --quiet; then
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          echo "No auto-fixable changes detected"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Auto-fix validation issues"
        git push
        echo "fixed=true" >> "$GITHUB_OUTPUT"

    - name: Comment PR with auto-fix result
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { issue: { number: issue_number }, repo: { owner, repo } } = context;
          const fixed = '${{ steps.push-fixes.outputs.fixed }}' === 'true';
          const body = fixed
            ? 'Validation issues have been auto-fixed and pushed. Please `git pull` to get the latest changes before pushing again.'
            : 'The `validations` job has failed; please review the `Files changed` tab for possible suggestions to resolve.';
          github.rest.issues.createComment({ issue_number, owner, repo, body });

    - name: Comment PR on failure (forks)
      if: ${{ failure() && github.event_name == 'pull_request' && github.event.pull_request.merged != true && github.event.pull_request.head.repo.full_name != github.repository }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { issue: { number: issue_number }, repo: { owner, repo } } = context;
          github.rest.issues.createComment({ issue_number, owner, repo, body: "The `validations` job has failed; please review the `Files changed` tab for possible suggestions to resolve." });
