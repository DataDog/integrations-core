name: Weekly latest product version tests

on:
  schedule:
  # Weekly on Sunday night (America/New_York)
  - cron: "0 5 * * 1"

jobs:
  test:
    uses: ./.github/workflows/test-all.yml
    with:
      repo: core

      # Options
      latest: true
      context: "weekly-latest"
    secrets: inherit
    permissions:
      # needed for compute-matrix in test-target.yml
      contents: read
