name: Save GitHub event

on:
  workflow_call:
    inputs:
      retention-days:
        required: false
        default: 1
        type: number

jobs:
  save-event:
    name: Save event
    runs-on: ubuntu-22.04

    steps:
    - name: Upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: github-event
        path: ${{ github.event_path }}
        retention-days: ${{ inputs.retention-days }}
