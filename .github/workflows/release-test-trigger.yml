name: Release Test Trigger

# Temporary workflow for testing the release-dispatch pipeline on PRs.
# Triggers a dry-run dispatch for a fixed set of packages so CI exercises
# the prepare → validate → dispatch flow end-to-end without pushing tags
# or triggering real wheel builds.

on:
  push:
    branches:
      - dk/test-release-trigger

jobs:
  trigger:
    name: Dry-run release trigger
    uses: ./.github/workflows/release-dispatch.yml
    with:
      source-repo: integrations-core
      packages: '["active_directory","activemq","airflow"]'
      target: dev
      dry-run: true
      is-stable-release: "true"
