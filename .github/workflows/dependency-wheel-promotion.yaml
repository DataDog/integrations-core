name: Dependency Wheel Promotion
run-name: "Promote wheels for PR #${{ inputs.pr_number }} (${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to promote wheels for
        required: true
        type: number
      head_sha:
        description: Head SHA of the PR branch
        required: true
        type: string

jobs:
  promote:
    name: Promote dependency wheels from dev to stable
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      statuses: write
      pull-requests: write

    steps:
    - name: Checkout trusted code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Find existing lifecycle comment
      id: find_comment
      uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
      with:
        issue-number: ${{ inputs.pr_number }}
        body-includes: "<!-- dependency-wheel-promotion pr=${{ inputs.pr_number }} sha=${{ inputs.head_sha }} -->"

    - name: Post lifecycle comment (started)
      id: started_comment
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.pr_number }}
        comment-id: ${{ steps.find_comment.outputs.comment-id }}
        edit-mode: replace
        body: |
          <!-- dependency-wheel-promotion pr=${{ inputs.pr_number }} sha=${{ inputs.head_sha }} -->
          Wheel promotion started for commit `${{ inputs.head_sha }}` by @${{ github.actor }}.
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Checkout PR lockfiles only
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.head_sha }}
        path: pr
        sparse-checkout: |
          .deps/resolved
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: pip install -r .builders/deps/host_dependencies.txt

    - name: Get credentials
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        project_id: datadog-agent-int-build
        workload_identity_provider: projects/574011472402/locations/global/workloadIdentityPools/github/providers/integrations-core

    - name: Promote wheels
      env:
        PROMOTE_LOCKFILE_DIR: pr/.deps/resolved
      run: python .builders/promote.py

    - name: Clean up credentials
      if: always()
      run: rm -f ${{ steps.auth.outputs.credentials_file_path }}

    - name: Set dependency-wheel-promotion status to success
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        HEAD_SHA: ${{ inputs.head_sha }}
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: process.env.HEAD_SHA,
            state: 'success',
            context: 'dependency-wheel-promotion',
            description: 'Wheels promoted to stable storage.',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });

    - name: Update lifecycle comment (success)
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.pr_number }}
        comment-id: ${{ steps.started_comment.outputs.comment-id }}
        edit-mode: replace
        body: |
          <!-- dependency-wheel-promotion pr=${{ inputs.pr_number }} sha=${{ inputs.head_sha }} -->
          Wheels promoted to stable storage for commit `${{ inputs.head_sha }}` by @${{ github.actor }}.
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Set dependency-wheel-promotion status to error
      if: failure()
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        HEAD_SHA: ${{ inputs.head_sha }}
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: process.env.HEAD_SHA,
            state: 'error',
            context: 'dependency-wheel-promotion',
            description: 'Wheel promotion failed. Check the Actions tab for details.',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });

    - name: Update lifecycle comment (failure)
      if: failure()
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.pr_number }}
        comment-id: ${{ steps.started_comment.outputs.comment-id }}
        edit-mode: replace
        body: |
          <!-- dependency-wheel-promotion pr=${{ inputs.pr_number }} sha=${{ inputs.head_sha }} -->
          Wheel promotion failed for commit `${{ inputs.head_sha }}` by @${{ github.actor }}.
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Check the workflow logs before retrying.
