name: Fix validations

on:
  issue_comment:
    types: [created]

defaults:
  run:
    shell: bash

jobs:
  fix:
    name: Auto-fix validations
    # Only on PRs, same-repo only, triggered by /fix-validations comment
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '/fix-validations')
      && github.event.issue.state == 'open'
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.13"

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Get PR details
      id: pr
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });

          // Only allow same-repo PRs (forks lack push access)
          if (pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
            core.setFailed('Cannot auto-fix PRs from forks');
            return;
          }

          core.setOutput('ref', pr.data.head.ref);
          core.setOutput('sha', pr.data.head.sha);

    - name: React to comment
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          await github.rest.reactions.createForIssueComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: context.payload.comment.id,
            content: 'rocket',
          });

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ steps.pr.outputs.ref }}
        fetch-depth: "0"

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "${{ env.PYTHON_VERSION }}"

    - name: Install ddev
      run: |-
        pip install -e ./datadog_checks_dev[cli]
        pip install -e ./ddev

    - name: Configure ddev
      run: |
        ddev config set upgrade_check false
        ddev config set repos.core .
        ddev config set repo core

    - name: Run fixable validators
      env:
        TARGET: changed
      run: |
        ddev validate ci --sync || true
        ddev validate config $TARGET --sync || true
        ddev validate dashboards $TARGET --fix || true
        ddev validate labeler --sync || true
        ddev validate license-headers $TARGET --fix || true
        ddev validate metadata $TARGET --sync || true
        ddev validate models $TARGET --sync || true
        ddev validate service-checks $TARGET --sync || true
        ddev validate typos $TARGET --fix || true

    - name: Commit and push fixes
      id: push
      run: |
        if git diff --quiet; then
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          echo "No auto-fixable changes detected"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Auto-fix validation issues"
        git push
        echo "fixed=true" >> "$GITHUB_OUTPUT"

    - name: Comment result
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const fixed = '${{ steps.push.outputs.fixed }}' === 'true';
          const body = fixed
            ? 'Validation issues have been auto-fixed and pushed. Please `git pull` to get the latest changes before pushing again.'
            : 'No auto-fixable issues found. The remaining failures need to be resolved manually.';
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
