name: "[TEST] Update the Agent changelog (dd-octo-sts)"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Simulated tag (e.g. 7.56.0) — used in PR title/body only, no actual tag needed'
        required: true
        type: string

jobs:
  update_agent_changelog:
    name: Update the Agent Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: master
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.13
    - name: Install ddev from local folder
      run: |-
        pip install -e ./datadog_checks_dev[cli]
        pip install -e ./ddev
    - name: Configure ddev
      run: |-
        ddev config set upgrade_check false
        ddev config set repos.core .
        ddev config set repo core
    - name: Update the Agent changelog
      run: |-
        ddev release agent changelog --write --force
    - name: Update the Agent integrations file
      run: |-
        ddev release agent integrations --write --force
    - name: Update the integration changelogs
      run: |-
        ddev release agent integrations-changelog --write
    - name: Get token via dd-octo-sts
      uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
      id: token-generator
      with:
        scope: DataDog/integrations-core
        policy: self.update-agent-changelog.tag-push
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
      with:
        token: ${{ steps.token-generator.outputs.token }}
        commit-message: "[TEST] Finalize Agent release ${{ inputs.tag }}"
        body: |
          ### What does this PR do?
          **THIS IS A TEST PR — DO NOT MERGE**

          Finalize Agent release ${{ inputs.tag }} updating the changelog files.

          ### Motivation

          Testing dd-octo-sts migration for update-agent-changelog workflow.

          ### Additional Notes

          This PR was automatically generated by the test workflow:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        title: "[TEST] Finalize Agent release ${{ inputs.tag }}"
        branch: bot/test-update-agent-changelog-${{ inputs.tag }}
        branch-suffix: timestamp
        delete-branch: true
        base: master
        labels: bot,qa/skip-qa
        draft: true
