name: "[TEST] Resolve build deps PR creation (dd-octo-sts)"

on:
  workflow_dispatch:

jobs:
  publish:
    name: Test dd-octo-sts token + PR creation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Get token via dd-octo-sts
      uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
      id: token-generator
      with:
        scope: DataDog/integrations-core
        policy: self.resolve-build-deps.push

    - name: Find triggering PR
      id: find-pr
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ steps.token-generator.outputs.token }}
        script: |
          const { data: commit } = await github.rest.repos.getCommit({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
          });
          const message = commit.commit.message;
          const match = message.match(/#(\d+)/);
          const prs = match ? [{ number: parseInt(match[1]), html_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${match[1]}` }] : [];
          if (prs.length > 0) {
            const pr = prs[0];
            core.setOutput('pr_ref', `[#${pr.number}](${pr.html_url})`);
          } else {
            core.setOutput('pr_ref', '');
          }

    - name: Create dummy change
      run: |
        echo "# dd-octo-sts test run $(date -u +%Y%m%d%H%M%S)" >> .test-resolve-deps

    - name: Create pull request
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
      with:
        token: ${{ steps.token-generator.outputs.token }}
        title: "[TEST] Update dependency resolution"
        commit-message: "[TEST] Update dependency resolution"
        branch: bot/test-update-dependency-resolution
        branch-suffix: timestamp
        delete-branch: true
        labels: bot,qa/skip-qa
        draft: true
        body: |-
          **THIS IS A TEST PR — DO NOT MERGE**

          Testing dd-octo-sts migration for resolve-build-deps workflow.

          This PR was automatically generated by the test workflow:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
