version: "3"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: datadog
      POSTGRES_PASSWORD: datadog
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datadog -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 10
