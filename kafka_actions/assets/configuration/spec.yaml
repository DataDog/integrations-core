name: Kafka Actions
files:
- name: kafka_actions.yaml
  options:
  - template: init_config
    options:
    - template: init_config/default
  - template: instances
    options:
    - name: remote_config_id
      description: |
        Remote configuration ID for tracking purposes.
        This ID is automatically set by the Datadog backend via remote configuration.
        This parameter is REQUIRED - the integration will not start without it.
      required: true
      value:
        type: string
        example: kafka-read-1732128000
    
    - name: kafka_connect_str
      description: |
        The Kafka connection string (bootstrap servers).
      required: true
      value:
        type: string
        example: localhost:9092
    
    - name: security_protocol
      description: |
        Protocol used to communicate with brokers.
        Valid values: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
      value:
        type: string
        example: PLAINTEXT
    
    - name: sasl_mechanism
      description: |
        SASL mechanism to use for authentication.
        Valid values: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
      value:
        type: string
        example: PLAIN
    
    - name: sasl_plain_username
      description: Username for SASL PLAIN authentication
      value:
        type: string
    
    - name: sasl_plain_password
      description: Password for SASL PLAIN authentication
      secret: true
      value:
        type: string
    
    # ========================================================================
    # Action #1: read_messages
    # ========================================================================
    - name: read_messages
      description: |
        Configuration for reading messages from Kafka topics.
        Fetches messages with optional jq-style filtering and emits them as Datadog events.
        Supports JSON, Protobuf, and Avro with optional Schema Registry integration.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: topic
          type: string
          required: true
          description: Topic to read messages from
          example: orders
        - name: partition
          type: integer
          description: Specific partition to read from (-1 for all partitions)
          default: -1
          example: -1
        - name: start_offset
          type: integer
          description: Starting offset (-1 for latest, -2 for earliest, or specific offset)
          default: -1
          example: -1
        - name: n_messages
          type: integer
          description: Number of messages to fetch (max 100)
          default: 10
          example: 10
        - name: filter
          type: string
          description: |
            jq expression to filter messages (optional).
            Filtering happens AFTER deserialization.
            Examples: '.value.price > 100', '.value.user.country == "US"'
          example: '.value.status == "failed"'
        - name: value_format
          type: string
          description: |
            Message value format:
            - json: JSON data
            - string: Plain UTF-8 string (not JSON)
            - protobuf: Protocol Buffers
            - avro: Apache Avro
          default: json
          example: json
        - name: value_schema
          type: string
          description: Schema definition for protobuf/avro value
        - name: value_uses_schema_registry
          type: boolean
          description: Whether value uses Schema Registry format
          default: false
        - name: key_format
          type: string
          description: |
            Message key format:
            - string: Plain UTF-8 string (most common for keys)
            - json: JSON data
            - protobuf: Protocol Buffers
            - avro: Apache Avro
          default: json
          example: json
        - name: key_schema
          type: string
          description: Schema definition for protobuf/avro key
        - name: key_uses_schema_registry
          type: boolean
          description: Whether key uses Schema Registry format
          default: false
        - name: consumer_group_id
          type: string
          description: Consumer group ID (optional, auto-generated if not provided)
    
    # Schema Registry authentication (for read_messages)
    - name: schema_registry_url
      description: Schema Registry URL (for reading messages with Schema Registry)
      value:
        type: string
        example: https://schema-registry:8081
    
    - name: schema_registry_username
      description: Username for Schema Registry Basic Authentication
      value:
        type: string
    
    - name: schema_registry_password
      description: Password for Schema Registry Basic Authentication
      secret: true
      value:
        type: string
    
    - name: schema_registry_tls_verify
      description: Whether to verify Schema Registry TLS certificate
      value:
        type: boolean
        example: true
      display_default: true
    
    - name: schema_registry_tls_ca_cert
      description: Path to custom CA certificate for Schema Registry
      value:
        type: string
    
    - name: schema_registry_tls_cert
      description: Path to client certificate for Schema Registry mutual TLS
      value:
        type: string
    
    - name: schema_registry_tls_key
      description: Path to client private key for Schema Registry mutual TLS
      value:
        type: string
    
    # ========================================================================
    # Action #2: create_topic
    # ========================================================================
    - name: create_topic
      description: |
        Configuration for creating a new Kafka topic.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: topic
          type: string
          required: true
          description: Topic name to create
          example: orders-v2
        - name: num_partitions
          type: integer
          required: true
          description: Number of partitions
          example: 6
        - name: replication_factor
          type: integer
          required: true
          description: Replication factor
          example: 3
        - name: configs
          type: object
          description: |
            Topic configuration parameters.
            Common configs: retention.ms, compression.type, min.insync.replicas, etc.
          example:
            retention.ms: "604800000"
            compression.type: "snappy"
    
    # ========================================================================
    # Action #3: update_topic_config
    # ========================================================================
    - name: update_topic_config
      description: |
        Configuration for updating an existing topic's configuration.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: topic
          type: string
          required: true
          description: Topic name to update
          example: orders
        - name: num_partitions
          type: integer
          description: New partition count (can only increase, cannot decrease)
          example: 12
        - name: configs
          type: object
          description: Configuration parameters to update
          example:
            retention.ms: "1209600000"
            max.message.bytes: "2097152"
        - name: delete_configs
          type: array
          items:
            type: string
          description: Configuration keys to reset to defaults
          example:
            - retention.bytes
            - compression.type
    
    # ========================================================================
    # Action #4: delete_topic
    # ========================================================================
    - name: delete_topic
      description: |
        Configuration for deleting a Kafka topic.
        WARNING: This operation is irreversible and will cause data loss.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: topic
          type: string
          required: true
          description: Topic name to delete
          example: old-orders
    
    # ========================================================================
    # Action #5: delete_consumer_group
    # ========================================================================
    - name: delete_consumer_group
      description: |
        Configuration for deleting a consumer group.
        The consumer group must have no active members.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: consumer_group
          type: string
          required: true
          description: Consumer group ID to delete
          example: old-service-v1
    
    # ========================================================================
    # Action #6: update_consumer_group_offsets
    # ========================================================================
    - name: update_consumer_group_offsets
      description: |
        Configuration for updating consumer group offsets.
        WARNING: Can cause duplicate processing or data loss.
        Consumer group should be stopped (no active members).
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: consumer_group
          type: string
          required: true
          description: Consumer group ID to update
          example: order-processor
        - name: offsets
          type: array
          required: true
          description: List of topic-partition-offset tuples to update
          items:
            type: object
            properties:
            - name: topic
              type: string
              required: true
              description: Topic name
            - name: partition
              type: integer
              required: true
              description: Partition number
            - name: offset
              type: integer
              required: true
              description: New offset value
          example:
            - topic: orders
              partition: 0
              offset: 1000
            - topic: orders
              partition: 1
              offset: 1500
    
    # ========================================================================
    # Action #7: produce_message
    # ========================================================================
    - name: produce_message
      description: |
        Configuration for producing a message to a Kafka topic.
      value:
        type: object
        properties:
        - name: cluster
          type: string
          required: true
          description: Kafka cluster identifier
          example: prod-kafka-1
        - name: topic
          type: string
          required: true
          description: Topic to produce to
          example: test-topic
        - name: key
          type: string
          description: Message key (optional)
          example: "12345"
        - name: value
          type: string
          required: true
          description: Message value
          example: '{"order_id": "12345", "status": "pending"}'
        - name: partition
          type: integer
          description: Specific partition (-1 for automatic partitioning)
          default: -1
          example: -1
        - name: headers
          type: object
          description: Message headers (metadata)
          example:
            source: datadog-agent
    
    - template: instances/default
