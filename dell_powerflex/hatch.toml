[env.collectors.datadog-checks]
check-types = true

[[envs.default.matrix]]
python = ["3.13"]
setup = ["caddy"]

[[envs.default.matrix]]
python = ["3.13"]
setup = ["lab"]

[envs.default.overrides]
name."caddy".e2e-env = { value = true }
matrix.setup.e2e-env = { value = true, if = ["lab"], env = ["POWERFLEX_GATEWAY_URL", "POWERFLEX_USERNAME", "POWERFLEX_PASSWORD"] }
matrix.setup.env-vars = [
  { key = "USE_POWERFLEX_LAB", value = "True", if = ["lab"] },
]

[envs.default]
e2e-env = false

[envs.default.env-vars]
DDEV_SKIP_GENERIC_TAGS_CHECK = "true"
