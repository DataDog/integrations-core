name: kyverno
fleet_configurable: true
files:
- name: kyverno.yaml
  discovery:
    strategies:
    - template: discovery/openmetrics_from_named_ports
      overrides:
        port_names:
        - metrics-port
        - metrics
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.display_priority: 3
        openmetrics_endpoint.value.example: http://localhost:8000/metrics
        openmetrics_endpoint.description: |
          Endpoint exposing the Kyverno Controller's Prometheus metrics. For more information refer to:
          https://kyverno.io/docs/monitoring/
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - kyverno
      - background-controller
      - cleanup-controller
      - reports-controller
  - template: auto_conf/cel_selector
    overrides:
      cel_selector.value.example:
        containers:
        # Narrow down matching containers since some controller names are generic
        # and don't identify the container as being part of Kyverno.
        - container.image.reference.contains("kyverno/")
  - template: auto_conf/discovery
