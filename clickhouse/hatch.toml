[env.collectors.datadog-checks]
base-package-features = ["deps", "db"]

[envs.default.env-vars]
CLICKHOUSE_REPOSITORY = "clickhouse/clickhouse-server"
COMPOSE_FILE = "docker-compose.yaml"

[[envs.default.matrix]]
python = ["3.13"]
version = ["18", "19", "20", "21.8", "22.7", "23.2", "23.8", "24.8", "25.3"]

[[envs.default.matrix]]
python = ["3.13"]
version = ["24.8"]
flavor = ["tls"]

[envs.default.overrides]
matrix.version.env-vars = [
    { key = "CLICKHOUSE_VERSION" },
    { key = "CLICKHOUSE_REPOSITORY", value = "yandex/clickhouse-server", if = ["18", "19", "20", "21.8"] },
]
matrix.flavor.env-vars = [
    { key = "COMPOSE_FILE", value = "docker-compose-tls.yaml", if = ["tls"] },
]

[envs.latest.env-vars]
CLICKHOUSE_VERSION = "latest"
CLICKHOUSE_REPOSITORY = "clickhouse/clickhouse-server"
COMPOSE_FILE = "docker-compose.yaml"
