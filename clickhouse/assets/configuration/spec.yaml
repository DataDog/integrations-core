name: ClickHouse
fleet_configurable: true
files:
- name: clickhouse.yaml
  options:
  - template: init_config
    options:
    - template: init_config/db
      overrides:
        global_custom_queries.value.example:
          - query: <QUERY>
            columns: <COLUMNS>
            tags: <TAGS>
    - template: init_config/default
  - template: instances
    options:
    - name: server
      fleet_configurable: true
      required: true
      description: The hostname used to connect to the system.
      value:
        type: string
    - name: reported_hostname
      description: |
        Set the reported hostname for this instance. Overrides the default hostname resolution,
        which uses the `server` value. Useful when the agent connects via localhost or 127.0.0.1
        (e.g., co-located with ClickHouse in the same pod) to avoid reporting a non-unique hostname.
      value:
        type: string
      fleet_configurable: false
    - name: port
      description: |
        The port used to connect to the system.
        This integration uses the HTTP interface, so the default is 8123 (HTTP port).
        Note: Port 9000 is for ClickHouse's native TCP protocol, which is not used by this integration.
      fleet_configurable: true
      value:
        type: integer
        example: 8123
    - name: username
      description: The database user to authenticate as.
      fleet_configurable: true
      value:
          type: string
          example: default
    - name: password
      description: The password of `username`.
      fleet_configurable: true
      secret: true
      value:
        type: string
        default: ''
    - name: db
      description: The database to connect to.
      fleet_configurable: true
      value:
        type: string
        display_default: default
    - name: connect_timeout
      description: The timeout for connecting to the `server`.
      fleet_configurable: true
      value:
        type: integer
        example: 10
    - name: read_timeout
      description: The timeout for reading from the `server`.
      fleet_configurable: true
      value:
        type: integer
        example: 10
    - name: compression
      description: |
        The compression algorithm to use. The default is no compression.
        If br is specified, the brotli library must be installed separately.

        Valid values are:
          - lz4
          - zstd
          - br
          - gzip
      fleet_configurable: true
      value:
        type: string
    - name: tls_ca_cert
      description: The path to the CA certificate file.
      value:
        type: string
        require_trusted_provider: true
      fleet_configurable: false
    - name: tls_verify
      description: Whether or not to connect securely using TLS. The server must also support this.
      value:
        type: boolean
        example: False
      fleet_configurable: false
    - name: verify
      description: Indicates if a certificate is required and if it will be validated after a connection is established.
      value:
        type: boolean
        example: True
      fleet_configurable: false
    - name: dbm
      description: |
        Enable Database Monitoring (DBM) to collect query samples, metrics, and completions.
        This feature provides deep observability into query performance.
      value:
        type: boolean
        example: false
      fleet_configurable: false
    - name: database_identifier
      description: |
        Controls how the database is identified. Each unique value of this identifier will appear in DBM as a separate
        billable instance.

        The default value is "$server:$port:$db" which uniquely identifies a ClickHouse database by its server, port,
        and database name.

        This value will be used as-is for the display name of the instance but will be normalized
        when applied as the `database_instance` tag. Please see https://docs.datadoghq.com/getting_started/tagging/
        for more details on Datadog tag normalization.
      options:
        - name: template
          description: |
            The template string for the database identifier. Supports variable substitution using $variable syntax.
            Available variables: $server, $port, $db, plus any custom tags (e.g., $env, $region).
          value:
            type: string
            display_default: "$server:$port:$db"
            example: "$env-$server:$port:$db"
          fleet_configurable: false
    - name: single_endpoint_mode
      description: Set to `true` when connecting through a single endpoint for ClickHouse Cloud.
      value:
        type: boolean
        example: false
      fleet_configurable: false
    - name: use_legacy_queries
      description: Enable the legacy query set for collecting metrics. Set to `false` to disable.
      value:
        type: boolean
        example: true
      fleet_configurable: false
    - name: use_advanced_queries
      description: Enable the advanced query set for collecting metrics. Set to `false` to disable.
      value:
        type: boolean
        example: true
      fleet_configurable: false
    - name: query_samples
      description: Configure collection of database samples snapshots from system.processes
      options:
        - name: enabled
          description: |
            Enable collection of database samples snapshots. Requires `dbm: true`.
            Samples snapshots show currently executing queries and connection counts.
          value:
            type: boolean
            example: true
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the samples snapshot collection interval (in seconds). Each collection involves a single query to
            `system.processes` to capture currently executing queries.
          value:
            type: number
            example: 1
          fleet_configurable: false
        - name: payload_row_limit
          description: |
            Set the maximum number of active sessions to include in each samples snapshot.
          value:
            type: integer
            example: 1000
          fleet_configurable: false
        - name: run_sync
          hidden: true
          description: |
            Run the samples collection synchronously. This is useful for testing purposes, but should not be used
            in production as it can block the main thread and cause performance issues.
          value:
            type: boolean
            example: false
          fleet_configurable: false
    - name: query_metrics
      description: Configure collection of query metrics
      options:
        - name: enabled
          description: |
            Enable collection of query metrics. Requires `dbm: true`.
          value:
            type: boolean
            example: true
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the query metric collection interval (in seconds). Each collection involves a single query to
            `system.query_log`. If a non-default value is chosen then that exact same value must be used for *every*
            check instance. Running different instances with different collection intervals is not supported.
          value:
            type: number
            example: 10
          fleet_configurable: false
        - name: run_sync
          hidden: true
          description: |
            Run the query metrics collection synchronously. This is useful for testing purposes, but should not be used
            in production as it can block the main thread and cause performance issues.
          value:
            type: boolean
            example: false
          fleet_configurable: false
        - name: full_statement_text_cache_max_size
          hidden: true
          description: |
            Set the max size of the cache used for the full statement text.
          value:
            type: number
            default: 10000
          fleet_configurable: false
        - name: full_statement_text_samples_per_hour_per_query
          hidden: true
          description: |
            Set the max number of full statement text samples to collect per hour per query.
          value:
            type: number
            default: 1
          fleet_configurable: false
    - name: query_completions
      description: Configure collection of query completions from system.query_log
      options:
        - name: enabled
          description: |
            Enable collection of query completions. Requires `dbm: true`.
            These samples represent individual completed queries and appear on the DBM Query Samples page.
          value:
            type: boolean
            example: true
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the query completions collection interval (in seconds).
            Lower values show more recent queries but increase collection overhead.
          value:
            type: number
            example: 10
          fleet_configurable: false
        - name: samples_per_hour_per_query
          description: |
            Set the maximum number of samples to collect per hour per unique query signature.
            This rate limiting prevents excessive data collection for frequently executed queries.
          value:
            type: number
            example: 15
          fleet_configurable: false
        - name: seen_samples_cache_maxsize
          hidden: true
          description: |
            Set the max size of the cache used for rate limiting samples.
          value:
            type: number
            default: 10000
          fleet_configurable: false
        - name: max_samples_per_collection
          hidden: true
          description: |
            Maximum number of samples to collect in a single run (applies LIMIT in SQL).
            Prevents overwhelming the agent with too many samples at once.
          value:
            type: number
            default: 1000
          fleet_configurable: false
        - name: explained_queries_per_hour_per_query
          hidden: true
          description: |
            Set the maximum number of explain plans to collect per hour per unique query signature.
            This rate limits EXPLAIN PLAN execution to avoid overhead on frequently executed queries.
          value:
            type: number
            default: 60
            minimum: 1
          fleet_configurable: false
        - name: explained_queries_cache_maxsize
          hidden: true
          description: |
            Set the max size of the cache used for rate limiting explain plan collection.
          value:
            type: number
            default: 5000
          fleet_configurable: false
        - name: run_sync
          hidden: true
          description: |
            Run the query completions collection synchronously. For testing only.
          value:
            type: boolean
            example: false
          fleet_configurable: false
    - name: async_insert_flushes
      description: Configure collection of async insert flush events from system.asynchronous_insert_log.
      options:
        - name: enabled
          description: |
            Enable collection of async insert flushes. Requires `dbm: true`.
            These records represent individual flush events (dbm_type="async_inserts_flush"), including flush
            status, exception (if any), bytes, and row count per flush.
          value:
            type: boolean
            example: false
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the flush log collection interval (in seconds). Each collection runs a single
            query against system.asynchronous_insert_log.
          value:
            type: number
            example: 60
          fleet_configurable: false
        - name: max_samples_per_collection
          description: |
            Maximum number of flush records to collect in a single run (applies LIMIT in SQL).
          value:
            type: integer
            example: 1000
          fleet_configurable: false
    - name: query_errors
      description: Configure collection of query errors from system.query_log
      options:
        - name: enabled
          description: |
            Enable collection of query errors. Requires `dbm: true`.
            Collects ExceptionBeforeStart and ExceptionWhileProcessing events, which include
            exception message, error code, and stack trace.
          value:
            type: boolean
            example: true
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the query errors collection interval (in seconds).
          value:
            type: number
            example: 10
          fleet_configurable: false
        - name: samples_per_hour_per_query
          description: |
            Set the maximum number of error samples to collect per hour per unique query signature.
          value:
            type: number
            example: 60
          fleet_configurable: false
        - name: seen_samples_cache_maxsize
          hidden: true
          description: |
            Set the max size of the cache used for rate limiting error samples.
          value:
            type: number
            default: 10000
          fleet_configurable: false
        - name: max_samples_per_collection
          hidden: true
          description: |
            Maximum number of error samples to collect in a single run (applies LIMIT in SQL).
          value:
            type: number
            default: 1000
          fleet_configurable: false
        - name: run_sync
          hidden: true
          description: |
            Run the query errors collection synchronously. For testing only.
          value:
            type: boolean
            example: false
          fleet_configurable: false
    - name: schema_metrics
      description: |
        Configure per-table size and per-view refresh gauges derived from
        `system.tables` and `system.view_refreshes`. Independent of
        `collect_schemas` (which controls catalog structure collection)
        so users can dashboard table sizes without enabling Schema Explorer.
        Requires `dbm: true`.
      options:
        - name: enabled
          description: |
            Enable collection of per-table size and per-view refresh gauges.
          value:
            type: boolean
            example: false
        - name: collection_interval
          description: |
            Set the schema metrics collection interval (in seconds). These
            gauges change continuously, so 60s is a reasonable default.
          value:
            type: number
            example: 60
        - name: run_sync
          hidden: true
          description: |
            Run the schema metrics collection synchronously. For testing only.
          value:
            type: boolean
            example: false
    - name: collect_schemas
      description: |
        Configure collection of ClickHouse catalog metadata (databases,
        tables, views, columns) for Database Monitoring's Schema Explorer.
        Requires `dbm: true`.
      options:
        - name: enabled
          description: |
            Enable collection of catalog metadata. When enabled, the agent
            polls `system.tables`, `system.columns`, and
            `system.view_refreshes` (ClickHouse 24.3+) and emits one
            `kind=clickhouse_databases` payload per cycle.
          value:
            type: boolean
            example: false
        - name: collection_interval
          description: |
            Set the schema collection interval (in seconds). Catalog data
            changes slowly; 600s (10 min) is a reasonable default.
          value:
            type: number
            example: 600
        - name: max_tables
          description: |
            Maximum number of tables plus views to collect per cycle
            across all databases.
          value:
            type: integer
            example: 300
        - name: max_columns
          description: |
            Maximum number of columns to collect per table/view.
          value:
            type: integer
            example: 1000
        - name: max_query_duration
          description: |
            Maximum duration of the schema collection queries in seconds.
            Applied to each query via the `max_execution_time` ClickHouse setting.
          value:
            type: integer
            example: 60
        - name: include_databases
          description: |
            A list of regex patterns to include databases. Any database whose
            name matches any one of these patterns will be included. If empty,
            all databases (other than those excluded) are included.
          value:
            type: array
            items:
              type: string
            example:
              - "mydb"
        - name: exclude_databases
          description: |
            A list of regex patterns to exclude databases. Any database whose
            name matches any one of these patterns will be excluded. The
            ClickHouse system databases (`system`, `INFORMATION_SCHEMA`,
            `information_schema`) are always excluded regardless of this setting.
          value:
            type: array
            items:
              type: string
            example:
              - "tmp_.*"
        - name: include_tables
          description: |
            A list of regex patterns to include tables. Any table whose name
            matches any one of these patterns will be included. If empty, all
            tables (other than those excluded) are included.
          value:
            type: array
            items:
              type: string
            example:
              - "events.*"
        - name: exclude_tables
          description: |
            A list of regex patterns to exclude tables. Any table whose name
            matches any one of these patterns will be excluded.
          value:
            type: array
            items:
              type: string
            example:
              - ".*_tmp"
        - name: run_sync
          hidden: true
          description: |
            Run the metadata collection synchronously. For testing only.
          value:
            type: boolean
            example: false
    - name: parts_and_merges
      description: Configure parts and merges monitoring
      options:
        - name: enabled
          description: |
            Enable collection of parts and merges monitoring. Requires `dbm: true`.
            Emits per-table gauge metrics (clickhouse.table.parts.*, clickhouse.merges.*, clickhouse.mutations.*,
            clickhouse.replication.*) for trend dashboards and alerting, plus a row-level event payload per
            collection cycle consumed by the DBM Storage Health timeline view.
          value:
            type: boolean
            example: true
          fleet_configurable: false
        - name: collection_interval
          description: |
            Set the parts and merges collection interval (in seconds). All four system tables
            (parts, merges, mutations, replication_queue) are queried on each run.
          value:
            type: number
            example: 60
          fleet_configurable: false
        - name: max_parts_rows
          description: |
            Maximum number of rows to include in the per-cycle event payload from system.parts,
            ordered by active_part_count descending. With `table_metrics_include_partition_tag`
            disabled (default) rows are aggregated per-table server-side, so this caps tables.
            When partition tagging is enabled, rows are per-partition and this caps partitions.
          value:
            type: integer
            example: 500
          fleet_configurable: false
        - name: max_mutations_rows
          description: |
            Maximum number of rows to include in the per-cycle event payload from system.mutations,
            ordered by create_time ascending. Caps payload size when many mutations are pending.
          value:
            type: integer
            example: 200
          fleet_configurable: false
        - name: max_detached_parts_rows
          description: |
            Maximum number of rows returned from system.detached_parts per cycle.
            Applied as a raw SQL LIMIT; increase only if your cluster has a pathological number
            of (database, table, reason) combinations in detached storage.
          value:
            type: integer
            example: 1000
          fleet_configurable: false
        - name: max_replication_queue_rows
          description: |
            Maximum number of rows returned from system.replication_queue per cycle,
            ordered by position ascending. Busy replicated clusters can exceed the default
            during incidents; raise this if replication queue backlogs are being truncated.
          value:
            type: integer
            example: 1000
          fleet_configurable: false
        - name: table_metrics_include_partition_tag
          description: |
            Add a partition tag to parts gauges (clickhouse.table.parts.*).
            Disabled by default to avoid high cardinality: a table partitioned by day over two years
            yields ~730 partitions and hundreds of additional metric series per table.
            Enable only when per-partition alerting is explicitly needed.
          value:
            type: boolean
            example: false
          fleet_configurable: false
        - name: table_metrics_max_tables
          description: |
            Cap per-table gauge emission to the top N tables by active part count.
            Guards against pathological schemas with very large numbers of tables or partitions.
          value:
            type: integer
            example: 200
          fleet_configurable: false
        - name: stalled_merge_elapsed_threshold_seconds
          description: |
            Number of seconds a merge must be running before it is counted as stalled
            in the `clickhouse.merges.stalled` gauge. Raise this threshold if long-running
            merges are expected in your environment (e.g. large Wide-part merges on spinning
            disks) to avoid false-positive stall alerts.
          value:
            type: integer
            example: 3600
          fleet_configurable: false
        - name: stuck_replication_num_tries
          description: |
            Minimum number of failed attempts (num_tries) before a replication queue entry
            is counted as stuck in the `clickhouse.replication.stuck` gauge. Entries below
            this threshold are still counted in `clickhouse.replication.queue.depth`.
            Increase this value if transient failures routinely exceed the default before
            self-healing.
          value:
            type: integer
            example: 3
          fleet_configurable: false
        - name: run_sync
          hidden: true
          description: |
            Run the parts and merges collection synchronously. For testing only.
          value:
            type: boolean
            example: false
          fleet_configurable: false
    - template: instances/db
      overrides:
        custom_queries.value.example:
          - query: SELECT foo, COUNT(*) FROM table.events GROUP BY foo
            columns:
              - name: foo
                type: tag
              - name: event.total
                type: gauge
            tags:
              - test:clickhouse
            metric_prefix: clickhouse
    - template: instances/default
  - template: logs
    example:
    - source: clickhouse
      service: clickhouse
      type: file
      path:  /var/log/clickhouse-server/clickhouse-server.log
      tags:
        - format:plain
      log_processing_rules:
        - type: multi_line
          name: new_log_start_with_date
          pattern: '\d{4}\.\d{2}\.\d{2}'
    - source: clickhouse
      service: clickhouse
      type: file
      path: /var/log/clickhouse-server/clickhouse-server.err.log
      tags:
        - format:plain
      log_processing_rules:
        - type: multi_line
          name: new_log_start_with_date
          pattern: '\d{4}\.\d{2}\.\d{2}'
    - source: clickhouse
      service: clickhouse
      type: file
      path:  /var/log/clickhouse-server/clickhouse-server.log
      tags:
        - format:json
      log_processing_rules:
        - type: multi_line
          name: new_log_start_with_json
          pattern: '\{'
    - source: clickhouse
      service: clickhouse
      type: file
      path: /var/log/clickhouse-server/clickhouse-server.err.log
      tags:
        - format:json
      log_processing_rules:
        - type: multi_line
          name: new_log_start_with_json
          pattern: '\{'
