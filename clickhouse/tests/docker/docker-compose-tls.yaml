services:
  clickhouse-tls:
    image: ${CLICKHOUSE_REPOSITORY}:${CLICKHOUSE_VERSION}
    hostname: clickhouse-tls
    container_name: clickhouse-tls
    ports:
      - "8134:8443"
    volumes:
      - ./tls_config.xml:/etc/clickhouse-server/config.d/tls.xml
      - ./certs/server.crt:/etc/clickhouse-server/ssl/server.crt
      - ./certs/server.key:/etc/clickhouse-server/ssl/server.key
      - ./users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # The private key is created 600 on the host; chmod it so the clickhouse process can read it.
    entrypoint: ["/bin/bash", "-c", "chmod 644 /etc/clickhouse-server/ssl/server.key && exec /entrypoint.sh"]
