services:
  lighttpd:
    image: ${LIGHTTPD_IMAGE}
    ports:
      - "9449:9449"
    volumes:
      - ./lighttpd.conf:/etc/lighttpd/lighttpd.conf
      - ./passwd:/etc/lighttpd/passwd
      - ${DD_LOG_1:-/dev/null}:/var/log/lighttpd/access.log
      - ${DD_LOG_2:-/dev/null}:/var/log/lighttpd/error.log
