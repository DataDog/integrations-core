name: Lighttpd
fleet_configurable: true
files:
- name: lighttpd.yaml
  discovery:
    strategies:
    - strategy: from_ports
      port_hints:
      - 80
      candidates:
      - lighttpd_status_url: "http://{service.host}:{port.number}/server-status"
  options:
  - template: init_config
    options:
      - template: init_config/http
      - template: init_config/default
  - template: instances
    options:
    - name: lighttpd_status_url
      description: Status url of your Lighttpd server.
      fleet_configurable: true
      required: true
      value:
        example: http://localhost/server-status?auto
        type: string
    - template: instances/http
    - template: instances/default
  - template: logs
    example:
      - type: file
        path: /var/log/lighttpd/access.log
        source: lighttpd
        service: lighttpd
      - type: file
        path: /var/log/lighttpd/error.log
        source: lighttpd
        service: lighttpd
- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - lighttpd
  - template: auto_conf/discovery
