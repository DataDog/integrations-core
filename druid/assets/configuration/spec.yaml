name: Druid
fleet_configurable: true
files:
- name: druid.yaml
  discovery:
    strategies:
      - strategy: from_ports
        port_hints:
          - 8081
          - 8082
        candidates:
          - url: "http://{service.host}:{port.number}"
  options:
  - template: init_config
    options:
    - template: init_config/http
    - template: init_config/default
  - template: instances
    options:
    - name: url
      description: coordinator url used to connect to the Druid instance.
      fleet_configurable: true
      formats: ["url"]
      required: true
      value:
        type: string
        example: <DRUID_COORDINATOR_URL>
    - template: instances/http
    - template: instances/default
  - template: logs
    example:
    - type: file
      path: <PATH_TO_DRUID_DIR>/var/sv/*.log
      source: druid
      service: <SERVICE_NAME>
      log_processing_rules:
        - type: multi_line
          name: new_log_start_with_date
          pattern: \d{4}\-\d{2}\-\d{2}

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - druid
  - template: auto_conf/discovery
