services:

  zookeeper:
    image: zookeeper:3.4.11

  druid-broker:
    build:
      dockerfile_inline: |
        FROM datadog/docker-library:druid_0_16
    image: druid:0.16
    command: "broker"
    depends_on:
      - zookeeper
    ports:
      - 8082:8082

  druid-coordinator:
    image: druid:0.16
    command: "coordinator-overlord"
    depends_on:
      - zookeeper
      - druid-broker
    ports:
      - 8081:8081
