name: Ray
fleet_configurable: true
files:
- name: ray.yaml
  discovery:
    strategies:
      - strategy: from_ports
        port_hints:
          - 8080
        candidates:
          - openmetrics_endpoint: "http://{service.host}:{port.number}"
  options:
  - template: init_config
    options:
    - template: init_config/openmetrics
  - template: instances
    options:
    - template: instances/openmetrics
      overrides:
        openmetrics_endpoint.display_priority: 3
  - template: logs
    example:
    - type: file
      path: /tmp/ray/session_latest/logs/dashboard.log
      source: ray
      service: <SERVICE>
    - type: file
      path: /tmp/ray/session_latest/logs/dashboard.err
      source: ray
      service: <SERVICE>
    - type: file
      path: /tmp/ray/session_latest/logs/gcs_server.out
      source: ray
      service: <SERVICE>
    - type: file
      path: /tmp/ray/session_latest/logs/gcs_server.err
      source: ray
      service: <SERVICE>

- name: auto_conf.yaml
  options:
  - template: ad_identifiers
    overrides:
      value.example:
      - ray
  - template: auto_conf/discovery
