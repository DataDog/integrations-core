[build-system]
requires = [
    "hatchling>=0.11.2",
]
build-backend = "hatchling.build"

[project]
name = "datadog-snowflake"
description = "The Snowflake check (deprecated)"
requires-python = ">=3.8"
authors = [
    { name = "Datadog", email = "packages@datadoghq.com" },
]
classifiers = [
    "Development Status :: 7 - Inactive",
    "Private :: Do Not Upload",
]
dependencies = [
    "datadog-checks-base",
]
dynamic = [
    "version",
]
license = "BSD-3-Clause"

[project.urls]
Source = "https://github.com/DataDog/integrations-core"

[tool.hatch.version]
path = "datadog_checks/snowflake/__about__.py"

[tool.hatch.build.targets.wheel]
include = [
    "/datadog_checks",
]
dev-mode-dirs = [
    ".",
]
