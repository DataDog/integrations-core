services:
  pinot:
    image: apachepinot/pinot:${PINOT_VERSION:-1.4.0}
    container_name: pinot
    hostname: pinot
    ports:
      # ZooKeeper
      - "12123:2123"
      # Controller
      - "19000:9000"
      # Broker
      - "18000:8000"
      # Server
      - "17050:7050"
      # Minion
      - "16000:6000"
      # JMX Prometheus exporter
      - "18009:8009"
    environment:
      JAVA_OPTS: >-
        -javaagent:/opt/pinot/etc/jmx_prometheus_javaagent/jmx_prometheus_javaagent.jar=8009:/opt/pinot/etc/jmx_prometheus_javaagent/configs/pinot.yml
        -Xms512m
        -Xmx1g
    command: ["QuickStart", "-type", "batch"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
