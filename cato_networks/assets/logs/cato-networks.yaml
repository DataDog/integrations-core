pipeline:
  type: pipeline
  name: Cato Networks
  enabled: true
  filter:
    query: source:cato-networks
  processors:
    - type: pipeline
      name: Parsing events
      enabled: true
      filter:
        query: -service:audit-logs
      processors:
        - type: string-builder-processor
          name: Set `service` to events
          enabled: true
          template: events
          target: service
          replaceMissing: true
    - type: service-remapper
      name: Define `service` as the official service of the log
      enabled: true
      sources:
        - service
    - type: date-remapper
      name: Define `fieldsMap.insertion_date`, `time` as the official date of the log
      enabled: true
      sources:
        - fieldsMap.insertion_date
        - time
    - type: pipeline
      name: Audit Logs
      enabled: true
      filter:
        query: service:audit-logs
      processors:
        - type: attribute-remapper
          name: Map `fieldsMap.admin_id` to `usr.id`
          enabled: true
          sources:
            - fieldsMap.admin_id
          sourceType: attribute
          target: usr.id
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `fieldsMap.admin` to `usr.name`
          enabled: true
          sources:
            - fieldsMap.admin
          sourceType: attribute
          target: usr.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
    - type: pipeline
      name: Events
      enabled: true
      filter:
        query: service:events
      processors:
        - type: attribute-remapper
          name: Map `event_type` to `evt.name`
          enabled: true
          sources:
            - event_type
          sourceType: attribute
          target: evt.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `src_ip` to `network.client.ip`
          enabled: true
          sources:
            - src_ip
          sourceType: attribute
          target: network.client.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `src_port` to `network.client.port`
          enabled: true
          sources:
            - src_port
          sourceType: attribute
          target: network.client.port
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `dest_ip` to `network.destination.ip`
          enabled: true
          sources:
            - dest_ip
          sourceType: attribute
          target: network.destination.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `dest_port` to `network.destination.port`
          enabled: true
          sources:
            - dest_port
          sourceType: attribute
          target: network.destination.port
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `user_id` to `usr.id`
          enabled: true
          sources:
            - user_id
          sourceType: attribute
          target: usr.id
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `user_name` to `usr.name`
          enabled: true
          sources:
            - user_name
          sourceType: attribute
          target: usr.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `vpn_user_email` to `usr.email`
          enabled: true
          sources:
            - vpn_user_email
          sourceType: attribute
          target: usr.email
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `domain_name` to `dns.question.name`
          enabled: true
          sources:
            - domain_name
          sourceType: attribute
          target: dns.question.name
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: geo-ip-parser
          name: GeoIP Parser for `network.client.ip`
          enabled: true
          sources:
            - network.client.ip
          target: network.client.geoip
          ip_processing_behavior: do-nothing
        - type: geo-ip-parser
          name: GeoIP Parser for `network.destination.ip`
          enabled: true
          sources:
            - network.destination.ip
          target: network.destination.geoip
          ip_processing_behavior: do-nothing
        - type: string-builder-processor
          name: Set `event_status` to info
          enabled: true
          template: info
          target: event_status
          replaceMissing: true
        - type: status-remapper
          name: Define `event_status` as the official status of the log
          enabled: true
          sources:
            - event_status
    - type: pipeline
      name: OCSF pre transformations
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "*"
      processors:
        - type: string-builder-processor
          name: Add product name
          enabled: true
          template: "Cato Networks SASE Platform"
          target: ocsf.metadata.product.name
          replaceMissing: false
        - type: string-builder-processor
          name: Add product vendor
          enabled: true
          template: "Cato Networks"
          target: ocsf.metadata.product.vendor_name
          replaceMissing: false
        - type: attribute-remapper
          name: Map `event_type` to `ocsf.metadata.event_code`
          enabled: true
          sources:
            - event_type
          sourceType: attribute
          target: ocsf.metadata.event_code
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `time`, `fieldsMap.creation_date` to `ocsf.time`
          enabled: true
          sources:
            - time
            - fieldsMap.creation_date
          sourceType: attribute
          target: ocsf.time
          targetFormat: integer
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
    - type: pipeline
      name: OCSF sub pipeline for class Detection Finding [2004]
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: '@ocsf.metadata.event_code:"Detection and Response"'
      processors:
        - type: schema-processor
          name: Apply OCSF schema for 2004
          enabled: true
          mappers:
            - type: schema-category-mapper
              name: ocsf.activity_id
              categories:
                - filter:
                    query: '@trigger:"Story Created"'
                  name: Create
                  id: 1
                - filter:
                    query: "@status:Closed"
                  name: Close
                  id: 3
                - filter:
                    query: "*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.activity_name
                id: ocsf.activity_id
              fallback:
                values:
                  ocsf.activity_name: Other
                  ocsf.activity_id: "99"
                sources:
                  ocsf.activity_name:
                    - trigger
            - type: schema-category-mapper
              name: ocsf.severity_id
              categories:
                - filter:
                    query: "@criticality:[9 TO *]"
                  name: Critical
                  id: 5
                - filter:
                    query: "@criticality:[7 TO 8]"
                  name: High
                  id: 4
                - filter:
                    query: "@criticality:[5 TO 6]"
                  name: Medium
                  id: 3
                - filter:
                    query: "@criticality:[3 TO 4]"
                  name: Low
                  id: 2
                - filter:
                    query: "@criticality:[1 TO 2]"
                  name: Informational
                  id: 1
                - filter:
                    query: "@criticality:*"
                  name: Informational
                  id: 1
              targets:
                name: ocsf.severity
                id: ocsf.severity_id
            - type: schema-category-mapper
              name: ocsf.status_id
              categories:
                - filter:
                    query: "@status:Open"
                  name: New
                  id: 1
                - filter:
                    query: "@status:Closed"
                  name: Closed
                  id: 4
                - filter:
                    query: "@status:*"
                  name: Other
                  id: 99
              targets:
                name: ocsf.status
                id: ocsf.status_id
              fallback:
                values:
                  ocsf.status: Other
                  ocsf.status_id: "99"
                sources:
                  ocsf.status:
                    - status
            - type: schema-category-mapper
              name: ocsf.confidence_id
              categories:
                - filter:
                    query: "@criticality:[8 TO *]"
                  name: High
                  id: 3
                - filter:
                    query: "@criticality:[5 TO 7]"
                  name: Medium
                  id: 2
                - filter:
                    query: "@criticality:[1 TO 4]"
                  name: Low
                  id: 1
                - filter:
                    query: "@criticality:*"
                  name: Unknown
                  id: 0
              targets:
                name: ocsf.confidence
                id: ocsf.confidence_id
            - type: schema-remapper
              name: Map `indication` to `ocsf.finding_info.title`
              sources:
                - indication
              target: ocsf.finding_info.title
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `story_id` to `ocsf.finding_info.uid`
              sources:
                - story_id
              target: ocsf.finding_info.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `indication` to `ocsf.finding_info.desc`
              sources:
                - indication
              target: ocsf.finding_info.desc
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `rule_name` to `ocsf.finding_info.analytic.name`
              sources:
                - rule_name
              target: ocsf.finding_info.analytic.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `rule_id` to `ocsf.finding_info.analytic.uid`
              sources:
                - rule_id
              target: ocsf.finding_info.analytic.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-category-mapper
              name: ocsf.finding_info.analytic.type_id
              categories:
                - filter:
                    query: "@rule_name:*"
                  name: Rule
                  id: 1
                - filter:
                    query: "*"
                  name: Unknown
                  id: 2
              targets:
                name: ocsf.finding_info.analytic.type
                id: ocsf.finding_info.analytic.type_id
            - type: schema-remapper
              name: Map `indication` to `ocsf.message`
              sources:
                - indication
              target: ocsf.message
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `event_id` to `ocsf.metadata.uid`
              sources:
                - event_id
              target: ocsf.metadata.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `src_ip` to `ocsf.device.ip`
              sources:
                - src_ip
              target: ocsf.device.ip
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `device_name` to `ocsf.device.hostname`
              sources:
                - device_name
              target: ocsf.device.hostname
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `device_name` to `ocsf.device.name`
              sources:
                - device_name
              target: ocsf.device.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-category-mapper
              name: ocsf.device.type_id
              categories:
                - filter:
                    query: "@device_name:Desktop*"
                  name: Desktop
                  id: 2
                - filter:
                    query: "*"
                  name: Unknown
                  id: 0
              targets:
                name: ocsf.device.type
                id: ocsf.device.type_id
            - type: schema-remapper
              name: Map `producer` to `ocsf.finding_info.product.name`
              sources:
                - producer
              target: ocsf.finding_info.product.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.product.name` to `ocsf.metadata.product.name`
              sources:
                - ocsf.metadata.product.name
              target: ocsf.metadata.product.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.product.vendor_name` to `ocsf.metadata.product.vendor_name`
              sources:
                - ocsf.metadata.product.vendor_name
              target: ocsf.metadata.product.vendor_name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.metadata.event_code` to `ocsf.metadata.event_code`
              sources:
                - ocsf.metadata.event_code
              target: ocsf.metadata.event_code
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `ocsf.time` to `ocsf.time`
              sources:
                - ocsf.time
              target: ocsf.time
              preserveSource: true
              overrideOnConflict: true
          schema:
            schemaType: ocsf
            version: 1.5.0
            className: Detection Finding
            classUid: 2004
            extensions: []
            profiles: []
    - type: pipeline
      name: OCSF sub pipeline for class Authentication - Logon/Logoff [3002]
      enabled: true
      ocsf:
        isOcsf: true
      filter:
        query: "@ocsf.metadata.event_code:Connectivity AND (@event_sub_type:(Authenticated OR Connected OR Disconnected) OR @login_type:API)"
      processors:
        - type: string-builder-processor
          name: Add ocsf.service.name
          enabled: true
          template: "Cato VPN"
          target: ocsf.service.name
          replaceMissing: false
        - type: schema-processor
          name: Apply OCSF schema for 3002
          enabled: true
          mappers:
            - type: schema-category-mapper
              name: ocsf.activity_id
              categories:
                - filter:
                    query: "@event_sub_type:Disconnected"
                  name: Logoff
                  id: 2
                - filter:
                    query: "*"
                  name: Logon
                  id: 1
              targets:
                name: ocsf.activity_name
                id: ocsf.activity_id
            - type: schema-category-mapper
              name: ocsf.status_id
              categories:
                - filter:
                    query: "@action:Succeeded"
                  name: Success
                  id: 1
                - filter:
                    query: "@action:Failed"
                  name: Failure
                  id: 2
                - filter:
                    query: "@action:*"
                  name: Other
                  id: 99
                - filter:
                    query: "*"
                  name: Success
                  id: 1
              targets:
                name: ocsf.status
                id: ocsf.status_id
              fallback:
                values:
                  ocsf.status: Other
                  ocsf.status_id: "99"
                sources:
                  ocsf.status:
                    - action
            - type: schema-category-mapper
              name: ocsf.severity_id
              categories:
                - filter:
                    query: "@action:Succeeded"
                  name: Informational
                  id: 1
                - filter:
                    query: "@action:Failed"
                  name: Medium
                  id: 3
                - filter:
                    query: "@action:*"
                  name: Other
                  id: 99
                - filter:
                    query: "*"
                  name: Informational
                  id: 1
